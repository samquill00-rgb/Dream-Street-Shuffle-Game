<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Pillars Shop Name Test</title></head>
<body style="background:#111;padding:40px;">
<h2 style="color:#c8a050;font-family:Georgia,serif;">Shop Fascia Text Test</h2>
<canvas id="leftShop" width="512" height="48" style="border:1px solid #333;display:block;margin:20px 0;"></canvas>
<canvas id="rightShop" width="512" height="48" style="border:1px solid #333;display:block;margin:20px 0;"></canvas>
<script>
// Left shop - ATLAS' MAPS
var lc = document.getElementById('leftShop');
var lfctx = lc.getContext('2d');
lfctx.fillStyle = '#1e3020'; lfctx.fillRect(0, 0, 512, 48);
lfctx.fillStyle = '#c8b888'; lfctx.font = '22px Georgia, serif'; lfctx.textAlign = 'center';
lfctx.fillText('ATLAS\u0027  MAPS', 256, 33);

// Right shop - جَبَل طَارِق
var rc = document.getElementById('rightShop');
var rfctx = rc.getContext('2d');
rfctx.fillStyle = '#2a1a18'; rfctx.fillRect(0, 0, 512, 48);
rfctx.fillStyle = '#cc8855'; rfctx.font = '24px serif'; rfctx.textAlign = 'center';
rfctx.fillText('\u062C\u064E\u0628\u064E\u0644 \u0637\u064E\u0627\u0631\u0650\u0642', 256, 35);
</script>
</body>
</html>
