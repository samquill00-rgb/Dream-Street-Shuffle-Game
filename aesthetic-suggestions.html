<textarea id="md-source" style="display:none;"># Aesthetic suggestions — Dream Street Shuffle

Audit done 2026-05-27, ~30 min, while you slept. Playthrough screenshots
informed the call-outs below. No code changed — these are decisions for
you to make. Ordered by what I'd recommend tackling first.

## TL;DR — the three things I'd actually do

1. **Soften the header lily scribble (A1).** It reads as draft rather
   than ornament. 10 min change, biggest perceived-quality lift.
2. **Extract the duplicated `.cecil-rule` SVG into a reusable
   `(display:)` passage (D5).** Lets you refine the art once. 10 min.
3. **Add CSS variables for the palette (C2).** ~30 min find-and-
   replace. Tightens visual identity, makes future colour tweaks
   one-line changes.

Everything else is optional polish — described in sections A–G below.

---

## Top-level read

The game has a strong, consistent voice: **Playfair Display + Crimson
Text + Courier New** anchoring a warm-earthy 1973-Soho palette of golds,
creams, deep browns, and the occasional steel-blue accent. The strongest
moments are the *parchment-grid notebook*, the *Soho 1973 map*, the
*opening typewriter page*, and the *Ginger Light street scene*. The
weakest read is **the stats header** — the cigarette/cork metaphor is
clever but the lily scribble in the corner reads as draft rather than
deliberate, and the gold OPUS bar still has slight visual quirks.

Twelve Three.js scenes (French, Pillars, Ronnie's, Colony, Coach,
Trisha's, Lackland, Cecil Court, Coppers, Ginger Light, Centre Point,
plus the Oxford-Street iframe) deliver real production value. 169
CSS keyframes — many are excellent, a few may now be orphaned.

---

## A. High-impact, low-effort

### A1. The stats-header lily scribble

The hand-drawn lily/buds in the top-left of the stat bar (the
`.header-lily` SVG) reads as ink-blot draft rather than illuminated
manuscript. Three options:

- **Soften it**: drop the stroke-width from ~3px to ~1.4px, change
  `#0a0a0a` to a sepia (`#3a2818`), and reduce overall opacity to
  ~0.55. The fade-mask on the right already exists — extend it leftward
  so the lily emerges from nothing rather than starting hard at x=0.
- **Replace with something woodcut-like**: a tiny single botanical line
  drawing, deliberately archaic, matching the William Morris / Beardsley
  vein the rest of the game's borders hint at.
- **Hide it altogether** at narrow widths (it's already half-cropped by
  the fade-mask) and let the stats stand alone.

I'd pick option 1 — minimal change, makes the header read as parchment
margin doodle rather than placeholder.

**Reference**: you already have the *good* version of this lily on the
**title screen** — the mirrored blue-grey lily-of-the-valley uses
`stroke="#6a94c8"` at the same widths but feels dreamy and refined.
The header lily uses identical paths with `stroke="#0a0a0a"` (near-
black), which is what makes it land hard. Just substituting `#3a2818`
or even just inheriting the title's `#6a94c8` blue would harmonize
header and title screens.

### A2. OPUS-state stat bars — finish the polish

After the fix I just made, both gold bars now match in width. But:
- The two bars currently sit on different vertical centrelines because
  the first row's `.stat-bar` was 22px tall and the second 14px. With
  the height now forced to 14px on both, double-check the rolled-note /
  lipstick decorations aren't half-hanging (they should be hidden, but
  worth a glance).
- Consider a single subtle gold *separator line* under the OPUS row, or
  letting both rows breathe with `gap: 4px` — right now they touch.
- The `pct-opus` "100%" colour `#c8a010` is the same on both rows but
  reads slightly different against gold (top) vs the dark cigarette
  base (when not in opus). Consider making it cream-white in opus to
  contrast against the gold fill.

### A3. Body-text rag

`tw-passage` is already max-width 650px (hub 780px), so readability is
controlled — disregard my earlier note about flooding wide viewports.
The rag itself looks fine. **No change recommended here**; leaving the
note as a record of what I checked.

### A4. The "Approach Centre Point" caption typography

"EVERY MAN AND EVERY WOMAN IS A STAR." now sits above CLIMB IT in gold
Playfair caps — good. But the letter-spacing is at the high end (0.18em)
which makes it feel slightly *more* declarative than mysterious. Try
0.14em or 0.12em — still ceremonial, less stentorian. Also consider
introducing the tiniest gold separator dot (·) on either side, as a
quiet ornament.

### A5. Link styling on hover

You already have a great hover state (cream-gold colour shift with
multi-layer text-shadow glow on `tw-link:hover`). My earlier instinct
that links lacked affordance was wrong — the static state is
intentionally subtle (a quiet 0.3 text-shadow halo) and the hover
blooms gold. **No change recommended.** Mentioning it so the audit is
honest about what I verified.

---

## B. Medium-effort, big payoff

### B1. Consistent **passage opening rhythm**

Different passages open in different ways:
- Some have an ornamental divider at the top (.cecil-rule / .french-rule)
- Some have a 3D scene + caption
- Some just drop straight into prose
- A few use a typewriter SVG header

This variety is largely a strength, but the *unornamented prose-only*
passages can feel like the visual system suddenly went away. Two
options:

1. Give every venue-tagged passage a tiny standard ornament — a single
   gold rule, a vertical bar, a botanical drop-cap — so visitors always
   know "you've entered somewhere."
2. Make the absence intentional: when the passage is on the street
   between venues, **center-align** the body text and use a slightly
   smaller font, so the visual cue is "you are walking, not arrived."

Either disambiguates the in-between vs in-venue states without saying
so.

### B2. The notebook's tab strip

The five tabs (FINDS, EFFECTS, LILIES, POEM, MAP) are currently the
same plain rectangular shape with no iconography. Two ideas:

- **Tiny glyph above each tab name**: a haunted diamond above FINDS,
  a cigarette above EFFECTS, a lily above LILIES, a quill above POEM,
  a compass-rose above MAP. Even at 12px these would lift the chrome.
- **Subtle parchment edge curl** on the active tab — a 2px ::after with
  a darker gradient at the top, suggesting a page being lifted.

Optional but visually elevating.

### B3. Drink-popup choreography

When you click for a drink, the pour + glass-clink fires nicely. The
modal itself though uses simple opacity transitions. Consider:
- A brief gold *bottle-glow* sweep across the drink during the pour
  (CSS animation on the modal backdrop)
- The "you drink it" gesture could have a quick ripple emanating from
  the glass — already have `dssSpawnMotes` infrastructure for this.

### B4. The Ginger Light street scene

It's beautiful but feels *static* — the lamp glow is on but nothing
breathes. Two micro-additions:
- A very slow filter on the lamp's halo (3.6s gentle scale 1.0 →
  1.04 → 1.0) — like flame movement seen through glass.
- A barely-there rain particle (CSS or SVG) drifting in 1-2 lines
  across the scene. Matches the "heavy afternoon lingers in rainfall"
  opening line of Dean Street.

### B5. Approach Centre Point — 3D ladder

The ladder rising into the dark with the camera at street level is
striking. Two ideas:
- The "EVERY MAN AND EVERY WOMAN IS A STAR" caption could **type itself
  out** rather than fade in, like an inscription being chiselled —
  matching the typewriter opening of the game.
- Add a subtle vignette around the edges of the scene (radial gradient
  overlay) — currently the scene fills the full viewport with sharp
  edges. A vignette would frame it like a film still.

---

## C. Stylistic decisions worth considering

### C1. Reduce text-shadow density

You currently use multi-layer text-shadows on **stat labels, MORALE/OPUS
labels, alba jewels, delta numbers, AND on the gawain caption AND the
"Every man…" caption AND MALKUTH/KETHER**. This is fine but on
text-heavy passages with a lot of state, GPU paint time adds up. Audit
which ones are *load-bearing* (the dawn-approach captions definitely
are) and which could revert to a single shadow layer.

### C1b. The Alba lines font

`.alba-final .alba-line` uses `font-family: Georgia, 'Times New Roman',
serif` — NOT Playfair Display. Everywhere else gold-cap reveals use
Playfair. This may be a deliberate "the poem has its own voice"
distinction, or it may be drift. If deliberate, fine; if accidental,
swapping to Playfair would tighten the family.

The alba lines are at 1.25em, weight 700, letter-spacing 0.12em,
uppercase — they hit *very* hard visually. Consider:
- Lowering weight to 600 (Playfair's display 700 reads slightly
  ink-clogged at 1.25em)
- Or swap to Crimson Text small-caps for a softer, more lyrical feel
  (the lines are poetry, not declarations)

### C2. Colour palette consolidation

The audit found ~9 near-duplicate colour values in the gold/cream
family (`#c8a050`, `#c8a86a`, `#c8b860`, `#cfa050`, `#d4a574`, etc.).
Some are intentional but most read as drift. Consider defining ~6 CSS
custom properties at the top of the stylesheet:

```css
:root {
  --gold-bright: #f5d070;
  --gold-warm: #d4a574;
  --gold-deep: #a87800;
  --cream-light: #f4edd8;
  --cream-text: #e8d5b7;
  --ink-shadow: rgba(10,9,8,0.85);
}
```

Then go through (over time) replacing direct hex values. Tightens the
visual identity and makes future palette tweaks one-line changes.

### C3. The font-quoting inconsistency

`'Playfair Display'` vs `"Playfair Display"` vs `Playfair Display`
appears throughout. Pick one (recommend the unquoted form where
possible — fewer characters, valid CSS for single-word families) and
sweep. Low priority but reduces visual diff noise.

### C4. The 4 near-identical haunt background gradients

These four backgrounds (lines around 38038–38041) differ by only a
couple of percentage points each, virtually indistinguishable when
rendered. Either:
- Make them more distinct (deepen progressively from neutral → warm
  → cool → rich)
- Or collapse to two states (early-night vs late-night) for sharper
  visual progression as the player catches more haunts.

### C5. The 169 keyframes

The audit suggests some may be orphaned. A small cleanup pass —
grep each keyframe name for usage, drop the unused ones — would shave a
chunk off the stylesheet and the compiled HTML. Risk-free, but
time-consuming.

---

## D. Endgame-specific notes

### D1. The pent SVG corner area

In the Dawn Approach sequence with the iframe city behind, the pent
sits exactly center-frame. The composition is balanced but feels
slightly *too centred* — like a logo overlay rather than an
emanation. Consider:
- A very subtle drift / scale (`transform: scale(1.0) → scale(1.02)`
  over 8s, infinite) on the .centre-pent-overlay so it breathes very
  slowly, like the camera is in micro-motion.
- The gawain caption appears at fixed position. If you slowed the SVG
  breathing to a near-imperceptible drift, the caption staying still
  would feel intentional.

### D2. The white / black wash transition

The wash currently uses a 70%-hold dawnFadeWhite/Black animation —
holds transparent then fades. The fade itself is straight linear
opacity over the cigarette filter. Consider:
- An *uneven* wash: starting from the centre of the screen and
  spreading outward, so the city dissolves rather than is veiled.
  Achievable with `radial-gradient` background with animated
  background-size or background-position.
- Or a *vertical* wash from top, like dawn light rising.

Either would feel more like a moment in time than a flat opacity
transition.

### D3. The "THE END" text at the petal storm climax

Currently appears as plain Playfair Display caps at fixed
position:fixed bottom:7vh. Could:
- Have it appear with a *bloom* — start at scale(0.7) opacity 0, animate
  to scale(1) opacity 1 over 3s with ease-out.
- Add a thin gold horizontal rule above and below it — ornament for
  the moment.

### D4. The Dawn passage with Ripley's Wheel

The wheel reveals on entry now, with conditional stage writing. The
wheel itself is gold-line work, very fine. Two small upgrades:
- The Sol glyph at the centre could pulse once on initial reveal —
  acknowledge the moment of arrival.
- The Ouroboros serpent biting its tail at 6 o'clock currently sits
  flat. A very subtle scale-pulse (1s, infinite, 0.99 → 1.01) would
  give it life without being distracting.

---

## D-extra. Code-shape niggles that have aesthetic implications

### D5. The duplicated cecil-rule SVG

The `.cecil-rule` ornamental SVG (the beautiful inline illustration of
bookshop ephemera — jars, vials, an eye amulet, etc.) is inlined
verbatim in **two passages** (lines 32741 + 34680), ~500 chars each.
Two consequences:

- If you ever want to refine the art, you have to find both copies and
  keep them in sync.
- The compiled HTML pays the cost twice.

Suggest extracting to a single hidden passage (e.g. `:: Cecil Rule SVG`)
that other passages `(display:)` — the same pattern already used by
`French Rule SVG h24` / `French Rule SVG h60`. About 10 min of work.

### D5b. The Dawn corner ornament SVGs

Same duplication pattern as D5 but x4: the four Dawn corners
(`.dawn-corner-tl/tr/bl/br`) are FOUR copies of the same SVG markup in
the Dawn passage, with the only difference being a CSS `transform`
class. The body of each SVG is identical (~50 chars of paths).

Extract to a single SVG with a `&lt;defs&gt;&lt;g id="dawnCornerArt"&gt;…&lt;/g&gt;&lt;/defs&gt;`
and reference via `&lt;use href="#dawnCornerArt"/&gt;` four times. Saves ~3KB
in the compiled HTML and means future tweaks happen once.

### D6. The map's SMIL animations

The map's "current location" pulsing rings (the `&lt;animate&gt;` elements
inside each `(if: _xHere)` venue marker) use SVG SMIL animations rather
than CSS keyframes. SMIL is deprecated in Chrome's roadmap (though
still working). Worth migrating to CSS `@keyframes` over time for
future-proofing. Not urgent.

### D7. Map venue markers — the `_xHere` pulse

The pulsing ring is a nice signal but the `r='12;32;12'` jump from 12px
to 32px is big — at the map's actual rendered size that's a substantial
visual movement. Consider tightening to `12;22;12` for a subtler
"heartbeat" feel rather than a "lighthouse beam."

---

## E. Audio (since it's part of the aesthetic experience)

### E1. The piano loop gap

The 5-second silence between iterations works — good call. Consider
making the gap slightly variable (4.5s → 5.5s, random) so it doesn't
feel mechanical on long listens.

### E2. Bed crossfades

When the player transitions between venues, the current bed-stop is
immediate (with the 1.2s fade-in on the next bed). Consider also
adding a 0.6s fade-OUT on the outgoing bed for smoother venue-to-venue
audio transitions. Currently they overlap with a bit of a click as the
previous bed cuts.

### E3. The Dean Street music

I noticed Dean Street has a `hub` tag and triggers `startMusic`. Worth
verifying this still plays cleanly given all the recent bed work. It's
the player's home base — should feel distinct from venue ambience.

---

## F. The Dawn page Art Nouveau corners

The four Whitechapel-style whiplash-curve corner ornaments
(`.dawn-corner-tl/tr/bl/br`) on the Dawn ending are gorgeous —
single SVG flipped via CSS scaleX/scaleY/scale(-1,-1) for the other
three corners. Smart and beautiful.

One micro-thought: the corners currently fade in over 3.4s with a 0.8s
delay (`dawnCornerFade`). The animation is opacity-only. Adding a
*draw-in* — a thin gold whiplash line emerges from each corner and
unfurls — would make the Dawn arrival feel ceremonial. This is non-
trivial (stroke-dasharray on multiple paths) but it'd be a strong
upgrade to the climax.

Smaller idea, simpler: scale them from 0.85 to 1.0 alongside the fade
so they "settle" onto the page rather than appearing pre-formed.

```css
.dawn-corner {
  opacity: 0;
  transform: scale(0.88);
  animation: dawnCornerFade 3.4s ease-out 0.8s forwards;
}
.dawn-corner-tl { ... }  /* keep mirroring transforms but layer scale */
@keyframes dawnCornerFade {
  0% { opacity: 0; }
  100% { opacity: 1; }
}
```

Note: this conflicts with the existing flipping transforms (scaleX(-1)
etc.). You'd need to use `transform: scaleX(-1) scale(0.88)` and
animate to `scaleX(-1) scale(1)` per-corner, which is messy. The
simpler "fade only" might be the right call — leave it.

---

## G. Things that work well — keep

- The **opening typewriter page** with the wine ring is gorgeous and
  shouldn't be touched
- The **Soho 1973 map** is one of the strongest single visual elements
  — the LBRP banishing-ritual italics at the bottom are a perfect
  esoteric grace note
- The **notebook's parchment grid** with horizontal lines + red margin
  is a beautiful imitation of a school exercise book
- The **CLIMB IT button** glowing white-gold against the dark sky
  reads as an inscription, not a UI element
- The **alchemy wheel** rendering with conditional stage writing is
  elegant — empty spokes for uncollected haunts make the wheel
  personal to each player

---

## Pacing for tomorrow

If you want a sequence to attack:

1. **A1** (lily scribble softening) — 10 min
2. **A2** (opus bar polish verification) — 5 min, playtest-driven
3. **A4** (CLIMB IT caption letter-spacing) — 2 min
4. **D5** (extract duplicate `.cecil-rule` SVG into a reusable
   passage) — 10 min
5. **C1b** (Alba lines font reconsideration) — 5 min, mostly a
   decision rather than work
6. Pick one of **B** items based on what felt thinnest in your last
   playtest — I'd suggest **B1** (consistent passage opening rhythm)
   as the highest narrative-cohesion payoff

Total: a focused 60-min session lands all the small wins without
restructuring anything substantial.

**Optional bigger bet:** **C2** (CSS custom properties for the
palette) — 30 min find-and-replace, tightens the visual identity
and makes future palette tweaks one-line changes. Best done before
any further refactors.

---

(function() {
  var md = document.getElementById('md-source').value;

  // Auto-build a simple ToC of H2 sections, insert right after H1
  var doc = document.getElementById('doc');
  var h1 = doc.querySelector('h1');
  var h2s = doc.querySelectorAll('h2');
  if (h1 && h2s.length > 1) {
    var toc = document.createElement('nav');
    toc.className = 'toc';
    var title = document.createElement('div');
    title.className = 'toc-title';
    title.textContent = 'Contents';
    toc.appendChild(title);
    var ul = document.createElement('ul');
    h2s.forEach(function(h2, i) {
      var slug = 'sec-' + i;
      h2.id = slug;
      var li = document.createElement('li');
      var a = document.createElement('a');
      a.href = '#' + slug;
      a.textContent = h2.textContent;
      li.appendChild(a);
      ul.appendChild(li);
    });
    toc.appendChild(ul);
    h1.insertAdjacentElement('afterend', toc);
  }
})();
