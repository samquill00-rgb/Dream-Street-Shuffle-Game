<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oxford Street from Centre Point — Dawn, London, 1973</title>
<style>
* { margin: 0; padding: 0; }
body { background: #08101c; overflow: hidden; }
canvas { display: block; }
#datestamp {
  position: absolute; top: 18px; right: 24px;
  font: 14px monospace; color: rgba(232,170,110,0.55);
  pointer-events: none;
}
#location {
  position: absolute; bottom: 18px; left: 50%;
  transform: translateX(-50%);
  font: 12px 'Courier New', monospace; color: rgba(210,190,160,0.42);
  letter-spacing: 2px; pointer-events: none;
}
</style>
</head>
<body>
<div id="datestamp">23.11.73</div>
<div id="location">OXFORD STREET FROM CENTRE POINT — LONDON</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// ============================================================
// HELPERS
// ============================================================
function makeCanvasTexture(w, h, drawFunc) {
  var c = document.createElement('canvas');
  c.width = w; c.height = h;
  var cx = c.getContext('2d');
  drawFunc(cx, w, h);
  var tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  return tex;
}

// Seeded pseudo-random so the city stays stable across reloads
var seed = 1973;
function rand() {
  seed = (seed * 9301 + 49297) % 233280;
  return seed / 233280;
}

// ============================================================
// SCENE SETUP
// ============================================================
//
// Camera sits on the roof of Centre Point (~height 100m in reality,
// here at y = 34, since 1 unit ≈ 3m), looking roughly WEST-SOUTH-WEST
// down Oxford Street. BT Tower (Post Office Tower in 1973) sits to
// the right at about 800m NNW of Centre Point.
//
// Scene axis convention:
//   +X  = East        -X = West
//   +Z  = South       -Z = North
//   Oxford Street runs from viewer (near, +Z) into distance (-Z, slightly -X)
//   BT Tower sits to the NORTH, i.e. -Z, +X — "right of frame"
//
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a2038);
// Fog: slightly sulphurous grey-mauve — 1973 London air was still dirty
// enough for a visible smog layer at dawn, blending toward the warmer
// horizon. Picks up a brown-yellow cast from the Belt-of-Venus band.
scene.fog = new THREE.FogExp2(0x5e4e58, 0.0048);

var camera = new THREE.PerspectiveCamera(62, window.innerWidth / window.innerHeight, 0.1, 900);
// Roof of Centre Point — looking slightly down and forward
camera.position.set(0, 34, 6);
camera.lookAt(-6, 22, -90);

var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.02;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// DAWN SKY — gradient dome
// ============================================================
// Palette (top → horizon):
//   deep indigo:  #0a1628
//   steel blue:   #1a2b48
//   dusty mauve:  #48384e
//   rose/salmon:  #a06860
//   peach glow:   #d69068
//   warm gold:    #e0a474
// WESTERN sky at dawn — sun is BEHIND the viewer (east), so this sky has:
//   - cool blue zenith
//   - cool blue/lilac mid-sky
//   - a soft pink "Belt of Venus" band above the horizon
//   - a darker muted horizon (Earth's shadow) with a slight warm kiss
var skyTex = makeCanvasTexture(256, 512, function(cx, w, h) {
  var grad = cx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0.00, '#0a1428');   // zenith — deep cool indigo
  grad.addColorStop(0.25, '#152038');
  grad.addColorStop(0.45, '#2a2e4a');   // cool slate-blue
  grad.addColorStop(0.60, '#423856');   // cool mauve
  grad.addColorStop(0.72, '#6a5070');   // soft pink-mauve (Belt of Venus begins)
  grad.addColorStop(0.80, '#9a6878');   // rose pink band
  grad.addColorStop(0.86, '#b07878');   // warmest point of Belt of Venus
  grad.addColorStop(0.92, '#8c6070');   // darker again (Earth's shadow beneath)
  grad.addColorStop(0.97, '#584858');
  grad.addColorStop(1.00, '#423848');   // subdued horizon
  cx.fillStyle = grad;
  cx.fillRect(0, 0, w, h);
  // Very faint warm kiss along the horizon line (sunlight scattered round)
  var horizonKiss = cx.createLinearGradient(0, h * 0.94, 0, h);
  horizonKiss.addColorStop(0, 'rgba(220, 140, 110, 0)');
  horizonKiss.addColorStop(1, 'rgba(200, 130, 100, 0.12)');
  cx.fillStyle = horizonKiss;
  cx.fillRect(0, h * 0.94, w, h * 0.06);
  // Scattered soft cloud bands across the upper sky
  cx.fillStyle = 'rgba(30, 40, 60, 0.12)';
  for (var cb = 0; cb < 6; cb++) {
    var cy = h * (0.15 + Math.random() * 0.35);
    cx.fillRect(0, cy, w, 3 + Math.random() * 8);
  }
  // Morning stars — pre-dawn field across the upper sky, fading down into
  // the Belt of Venus. A few are bright (Venus-style) with a soft bloom.
  for (var s = 0; s < 70; s++) {
    var sx = Math.random() * w;
    // Star density falls off as we descend toward the Belt of Venus band
    var syFrac = Math.pow(Math.random(), 1.6) * 0.42;
    var sy = syFrac * h;
    var bright = Math.random();
    // Faint field stars
    if (bright < 0.85) {
      var alpha = 0.35 + Math.random() * 0.35;
      // Fade toward horizon
      alpha *= (1 - syFrac / 0.42) * 0.9 + 0.1;
      cx.fillStyle = 'rgba(240,240,255,' + alpha.toFixed(2) + ')';
      var sr = 0.4 + Math.random() * 0.8;
      cx.beginPath();
      cx.arc(sx, sy, sr, 0, Math.PI * 2);
      cx.fill();
    } else {
      // Brighter "morning star" — soft halo bloom
      var bloom = cx.createRadialGradient(sx, sy, 0, sx, sy, 4);
      bloom.addColorStop(0,    'rgba(255,255,250,1.0)');
      bloom.addColorStop(0.25, 'rgba(230,230,250,0.55)');
      bloom.addColorStop(0.60, 'rgba(200,210,240,0.18)');
      bloom.addColorStop(1,    'rgba(180,200,240,0)');
      cx.fillStyle = bloom;
      cx.fillRect(sx - 4, sy - 4, 8, 8);
      cx.fillStyle = 'rgba(255,255,255,1)';
      cx.beginPath();
      cx.arc(sx, sy, 0.9, 0, Math.PI * 2);
      cx.fill();
    }
  }
});
var skyGeo = new THREE.SphereGeometry(500, 32, 20);
var skyMat = new THREE.MeshBasicMaterial({ map: skyTex, side: THREE.BackSide, fog: false });
var sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// ============================================================
// LIGHTING — looking WEST at dawn. Sun is behind the viewer in the
// east (+Z direction in scene, because camera looks toward -Z).
// Warm directional light therefore comes from BEHIND and kisses the
// west-facing tops of the buildings and the top of BT Tower.
//
// DRAMATIC DAWN: low-angle raking warm key, deep cool shadows, limited
// ambient fill so that the contrast between sunlit rooftops and blue-
// grey shaded faces is strong (the classic "dawn in the East End" look).
// ============================================================
// Ambient: deep, cool, low intensity — lets shadows get dark without
// going black.
scene.add(new THREE.AmbientLight(0x24324c, 0.48));

// Dawn sun — low, strong, deep orange-red. Low Y and high +Z means a
// raking angle from behind the camera: only rooftops and west-facing
// upper walls catch the warm light.
var dawnLight = new THREE.DirectionalLight(0xff7a3c, 2.10);
dawnLight.position.set(22, 12, 58);
scene.add(dawnLight);

// Secondary warm rim from directly behind camera — softer, pinker. Adds
// a bloom-like lift to the very tops of tall buildings (BT Tower, Centre
// Point's neighbours) without polluting the shadows below.
var rimLight = new THREE.DirectionalLight(0xffb890, 0.50);
rimLight.position.set(-5, 38, 72);
scene.add(rimLight);

// Cool sky-fill from the west — picks up the plum/indigo sky colour on
// the east-facing (shadowed) facades.
var skyFill = new THREE.DirectionalLight(0x5c74a8, 0.42);
skyFill.position.set(-15, 24, -60);
scene.add(skyFill);

// Low horizon-glow fill — a faint warm wash at ground level, from the
// east, to keep the near street surface and pavements from going murky.
var horizonGlow = new THREE.HemisphereLight(0xff9a68, 0x1a1420, 0.22);
scene.add(horizonGlow);

// ============================================================
// MATERIALS — rooftops, brick, stucco, tarred flat roofs
// ============================================================

// London brick — heavily sooted. Pre-1956 Clean Air Act accumulated grime,
// coal smoke staining, blackened at the top and streaked down.
function makeBrickTexture(variantHue) {
  return makeCanvasTexture(128, 128, function(cx, w, h) {
    // Darker base palette — century of soot baked in
    var base = '#785240';                            // London red brick, lightly sooted
    if (variantHue === 'pale')   base = '#b0a48c';   // Portland stone / pale stucco, gently grimed
    if (variantHue === 'yellow') base = '#a89368';   // London stock brick — still reads golden
    if (variantHue === 'sooty')  base = '#4c4034';   // old soot-brown, not near-black
    cx.fillStyle = base;
    cx.fillRect(0, 0, w, h);
    // Brick rows
    var rowH = 10;
    for (var y = 0; y < h; y += rowH) {
      var offset = (y / rowH) % 2 === 0 ? 0 : 14;
      for (var x = -14; x < w; x += 28) {
        var bx = x + offset;
        cx.fillStyle = 'rgba(0,0,0,' + (0.15 + Math.random() * 0.22) + ')';
        cx.fillRect(bx + 26, y, 2, rowH);
        cx.fillRect(bx, y + rowH - 1, 28, 1);
      }
    }
    // Individual brick tone variation — some bricks darker, some lighter
    for (var by = 0; by < h; by += rowH) {
      for (var bx = -14; bx < w; bx += 28) {
        if (Math.random() < 0.35) {
          var darkness = 0.08 + Math.random() * 0.28;
          cx.fillStyle = 'rgba(0,0,0,' + darkness + ')';
          var off = (by / rowH) % 2 === 0 ? 0 : 14;
          cx.fillRect(bx + off, by, 26, rowH - 1);
        }
      }
    }
    // Heavy top-down soot — especially concentrated at the top third
    var soot = cx.createLinearGradient(0, 0, 0, h);
    soot.addColorStop(0,    'rgba(18,15,10,0.45)');
    soot.addColorStop(0.25, 'rgba(20,16,12,0.22)');
    soot.addColorStop(0.55, 'rgba(22,18,14,0.10)');
    soot.addColorStop(1,    'rgba(24,20,16,0.04)');
    cx.fillStyle = soot;
    cx.fillRect(0, 0, w, h);
    // Vertical soot streaks running down from the top — rain-washed grime
    cx.strokeStyle = 'rgba(10,8,6,0.35)';
    for (var rs = 0; rs < 14; rs++) {
      cx.lineWidth = 1 + Math.random() * 2.2;
      cx.beginPath();
      var rx = Math.random() * w;
      cx.moveTo(rx, 0);
      var segs = 6 + Math.floor(Math.random() * 6);
      for (var ss = 1; ss <= segs; ss++) {
        rx += (Math.random() - 0.5) * 3;
        cx.lineTo(rx, (h * ss) / segs);
      }
      cx.stroke();
    }
    // Occasional darker smudge patches
    for (var pp = 0; pp < 6; pp++) {
      var px = Math.random() * w;
      var py = Math.random() * h;
      var pr = 6 + Math.random() * 14;
      var grad = cx.createRadialGradient(px, py, 0, px, py, pr);
      grad.addColorStop(0, 'rgba(8,6,4,0.35)');
      grad.addColorStop(1, 'rgba(8,6,4,0)');
      cx.fillStyle = grad;
      cx.beginPath();
      cx.arc(px, py, pr, 0, Math.PI * 2);
      cx.fill();
    }
  });
}
var brickRed    = new THREE.MeshStandardMaterial({ map: makeBrickTexture('red'), roughness: 0.95 });
var brickYellow = new THREE.MeshStandardMaterial({ map: makeBrickTexture('yellow'), roughness: 0.95 });
var brickPale   = new THREE.MeshStandardMaterial({ map: makeBrickTexture('pale'), roughness: 0.9 });
var brickSooty  = new THREE.MeshStandardMaterial({ map: makeBrickTexture('sooty'), roughness: 0.95 });

// Stucco / painted plaster — was once Portland-stone cream; a hundred
// years of coal smoke has turned it grey-brown, blackening at the top
// and streaking downward.
var stuccoTex = makeCanvasTexture(128, 128, function(cx, w, h) {
  cx.fillStyle = '#c0b4a0';
  cx.fillRect(0, 0, w, h);
  for (var i = 0; i < 450; i++) {
    cx.fillStyle = 'rgba(0,0,0,' + (Math.random() * 0.18) + ')';
    cx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
  }
  // Heavy top-concentrated soot shading
  var soot = cx.createLinearGradient(0, 0, 0, h);
  soot.addColorStop(0,    'rgba(22,18,14,0.48)');
  soot.addColorStop(0.25, 'rgba(26,22,16,0.26)');
  soot.addColorStop(0.6,  'rgba(32,26,20,0.12)');
  soot.addColorStop(1,    'rgba(38,30,22,0.04)');
  cx.fillStyle = soot;
  cx.fillRect(0, 0, w, h);
  // Black vertical streaks
  cx.strokeStyle = 'rgba(10,8,6,0.40)';
  for (var rs = 0; rs < 10; rs++) {
    cx.lineWidth = 1 + Math.random() * 2.5;
    cx.beginPath();
    var rx = Math.random() * w;
    cx.moveTo(rx, 0);
    for (var ss = 1; ss <= 6; ss++) {
      rx += (Math.random() - 0.5) * 4;
      cx.lineTo(rx, (h * ss) / 6);
    }
    cx.stroke();
  }
  // Peeling paint / damp patches
  for (var pp = 0; pp < 4; pp++) {
    var px = Math.random() * w, py = Math.random() * h;
    var pr = 6 + Math.random() * 12;
    var grad = cx.createRadialGradient(px, py, 0, px, py, pr);
    grad.addColorStop(0, 'rgba(40,32,22,0.4)');
    grad.addColorStop(1, 'rgba(40,32,22,0)');
    cx.fillStyle = grad;
    cx.beginPath();
    cx.arc(px, py, pr, 0, Math.PI * 2);
    cx.fill();
  }
});
var stuccoMat = new THREE.MeshStandardMaterial({ map: stuccoTex, roughness: 0.9 });

// Department-store concrete / dressed stone — pale warm grey for big
// Oxford Street slabs (Selfridges-era Portland stone, John Lewis postwar
// rebuild, C&A, DH Evans). Lighter than BT Tower concrete because these
// fronts were re-faced or regularly cleaned.
var deptStoneTex = makeCanvasTexture(128, 256, function(cx, w, h) {
  cx.fillStyle = '#bdb4a4';
  cx.fillRect(0, 0, w, h);
  // Horizontal course lines — dressed stone / concrete panels
  cx.strokeStyle = 'rgba(55,48,38,0.32)';
  cx.lineWidth = 1;
  for (var cyy = 16; cyy < h; cyy += 16) {
    cx.beginPath(); cx.moveTo(0, cyy); cx.lineTo(w, cyy); cx.stroke();
  }
  // Subtle vertical panel divisions
  cx.strokeStyle = 'rgba(55,48,38,0.18)';
  for (var ccxx = 32; ccxx < w; ccxx += 32) {
    cx.beginPath(); cx.moveTo(ccxx, 0); cx.lineTo(ccxx, h); cx.stroke();
  }
  // Peppered noise
  for (var ni = 0; ni < 600; ni++) {
    var tn = 160 + Math.random() * 40;
    cx.fillStyle = 'rgba(' + tn + ',' + (tn-4) + ',' + (tn-12) + ',0.3)';
    cx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
  }
  // Vertical weather streaks — subtler than brick
  cx.strokeStyle = 'rgba(50,42,32,0.15)';
  for (var ws = 0; ws < 8; ws++) {
    cx.lineWidth = 0.8 + Math.random() * 1.4;
    cx.beginPath();
    var wx = Math.random() * w;
    cx.moveTo(wx, 0);
    for (var wss = 1; wss <= 4; wss++) {
      wx += (Math.random() - 0.5) * 3;
      cx.lineTo(wx, (h * wss) / 4);
    }
    cx.stroke();
  }
  // Top-weighted soot — lighter than brick soot
  var ds = cx.createLinearGradient(0, 0, 0, h);
  ds.addColorStop(0,    'rgba(30,24,18,0.35)');
  ds.addColorStop(0.3,  'rgba(34,28,20,0.18)');
  ds.addColorStop(0.7,  'rgba(40,32,24,0.08)');
  ds.addColorStop(1,    'rgba(45,35,26,0.03)');
  cx.fillStyle = ds;
  cx.fillRect(0, 0, w, h);
});
var concreteMat = new THREE.MeshStandardMaterial({ map: deptStoneTex, roughness: 0.85 });

// Tarred flat roof — dark, oil-stained
var tarTex = makeCanvasTexture(128, 128, function(cx, w, h) {
  cx.fillStyle = '#2a2620';
  cx.fillRect(0, 0, w, h);
  for (var i = 0; i < 300; i++) {
    cx.fillStyle = 'rgba(' + (20 + Math.random()*20) + ',' + (18 + Math.random()*18) + ',' + (14 + Math.random()*14) + ',0.6)';
    cx.fillRect(Math.random() * w, Math.random() * h, 1 + Math.random()*2, 1);
  }
});
var tarMat = new THREE.MeshStandardMaterial({ map: tarTex, roughness: 0.9 });

// Slate roof — dark Welsh slate, heavily sooted. Individual tiles vary
// in tone from near-black to dark grey-green.
var slateTex = makeCanvasTexture(128, 128, function(cx, w, h) {
  cx.fillStyle = '#202428';
  cx.fillRect(0, 0, w, h);
  // Slate tiles with tonal variation
  for (var y = 0; y < h; y += 8) {
    for (var x = 0; x < w; x += 12) {
      var offset = (y / 8) % 2 === 0 ? 0 : 6;
      // Tile base — subtly different tone per tile
      var tileTone = 32 + Math.random() * 24;
      cx.fillStyle = 'rgb(' + tileTone + ',' + (tileTone+2) + ',' + (tileTone+4) + ')';
      cx.fillRect(x + offset, y, 12, 8);
      // Tile edge shadow
      cx.fillStyle = 'rgba(0,0,0,0.45)';
      cx.fillRect(x + offset, y + 7, 12, 1);
      cx.fillStyle = 'rgba(0,0,0,0.3)';
      cx.fillRect(x + offset + 11, y, 1, 8);
    }
  }
  // Soot dustings across the roof
  for (var s = 0; s < 60; s++) {
    cx.fillStyle = 'rgba(10,8,6,' + (0.2 + Math.random() * 0.3) + ')';
    cx.fillRect(Math.random() * w, Math.random() * h, 2 + Math.random() * 5, 2 + Math.random() * 4);
  }
});
slateTex.wrapS = THREE.RepeatWrapping;
slateTex.wrapT = THREE.RepeatWrapping;
var slateMat = new THREE.MeshStandardMaterial({ map: slateTex, roughness: 0.75, side: THREE.DoubleSide });

// Warm-lit window glass — early-morning offices, kitchens, cabs
var warmWindow = new THREE.MeshStandardMaterial({
  color: 0x1a0c04, roughness: 0.3,
  emissive: 0xe0a058, emissiveIntensity: 0.85, fog: true
});
// Cold fluorescent window — a few stair halls, early workers
var coldWindow = new THREE.MeshStandardMaterial({
  color: 0x080c10, roughness: 0.3,
  emissive: 0x8090a8, emissiveIntensity: 0.28, fog: true
});
// Dark window reflecting dawn sky
var darkWindow = new THREE.MeshStandardMaterial({
  color: 0x14202e, roughness: 0.4, metalness: 0.3
});

// Asphalt — Oxford Street surface. Designed as a single repeating tile:
// centred dashed line + two solid edge lines. The texture is repeated down
// the length of the street so the dashes read at the right scale.
var asphaltTex = makeCanvasTexture(128, 256, function(cx, w, h) {
  // Much darker base — wet, sooted 1973 tarmac
  cx.fillStyle = '#15151a';
  cx.fillRect(0, 0, w, h);
  // Noise — subtle, varying tones, keeps it from reading flat
  for (var i = 0; i < 500; i++) {
    var n = 18 + Math.random() * 14;
    cx.fillStyle = 'rgba(' + n + ',' + (n-1) + ',' + (n+3) + ',0.75)';
    cx.fillRect(Math.random()*w, Math.random()*h, 1+Math.random()*2, 1);
  }
  // Patchy puddle / grime overlays — push the darker end down
  for (var pg = 0; pg < 10; pg++) {
    cx.fillStyle = 'rgba(6,6,10,' + (0.25 + Math.random()*0.35) + ')';
    cx.beginPath();
    cx.ellipse(Math.random()*w, Math.random()*h, 12+Math.random()*22, 4+Math.random()*10, Math.random()*Math.PI, 0, Math.PI*2);
    cx.fill();
  }
  // Edge lines — faded, broken, dull yellow-white (period paint weathered)
  cx.fillStyle = 'rgba(150,140,110,0.28)';
  for (var dy2 = 0; dy2 < h; dy2 += 32) {
    if (Math.random() < 0.72) {
      cx.fillRect(5, dy2, 2, 22 + Math.random()*6);
      cx.fillRect(w - 7, dy2, 2, 22 + Math.random()*6);
    }
  }
  // Faded dashed centre line — short, dim
  for (var dy = 0; dy < h; dy += 48) {
    cx.fillStyle = 'rgba(140,130,100,' + (0.22 + Math.random()*0.15) + ')';
    cx.fillRect(w/2 - 1.5, dy + 4, 3, 14);
  }
  // Dark oil streaks down the lanes
  for (var os = 0; os < 4; os++) {
    cx.fillStyle = 'rgba(0,0,0,0.30)';
    var ox = 22 + Math.random() * (w - 44);
    cx.fillRect(ox, 0, 1 + Math.random()*2, h);
  }
});
asphaltTex.wrapS = THREE.RepeatWrapping;
asphaltTex.wrapT = THREE.RepeatWrapping;
asphaltTex.repeat.set(1, 30);   // dashes repeat down the length
var asphaltMat = new THREE.MeshStandardMaterial({ map: asphaltTex, roughness: 0.95 });

// Pavement stone
var paveTex = makeCanvasTexture(128, 128, function(cx, w, h) {
  cx.fillStyle = '#54524e';
  cx.fillRect(0, 0, w, h);
  cx.strokeStyle = 'rgba(20,18,14,0.5)';
  cx.lineWidth = 1;
  for (var gx = 0; gx <= w; gx += 32) {
    cx.beginPath(); cx.moveTo(gx, 0); cx.lineTo(gx, h); cx.stroke();
  }
  for (var gy = 0; gy <= h; gy += 32) {
    cx.beginPath(); cx.moveTo(0, gy); cx.lineTo(w, gy); cx.stroke();
  }
});
var paveMat = new THREE.MeshStandardMaterial({ map: paveTex, roughness: 0.9 });

// BT Tower concrete — mid-grey, slightly warmer than Centre Point
var btConcreteTex = makeCanvasTexture(256, 256, function(cx, w, h) {
  cx.fillStyle = '#a8a49c';
  cx.fillRect(0, 0, w, h);
  for (var i = 0; i < 2000; i++) {
    var tone = 140 + Math.random() * 50;
    cx.fillStyle = 'rgba(' + tone + ',' + tone + ',' + (tone-8) + ',0.3)';
    cx.fillRect(Math.random()*w, Math.random()*h, 1 + Math.random()*1.5, 1 + Math.random()*1.5);
  }
  // Vertical weather streaking
  for (var vs = 0; vs < 20; vs++) {
    cx.strokeStyle = 'rgba(60, 55, 48, 0.08)';
    cx.lineWidth = 1;
    cx.beginPath();
    var vx = Math.random() * w;
    cx.moveTo(vx, 0);
    cx.lineTo(vx + (Math.random()-0.5)*10, h);
    cx.stroke();
  }
});
var btConcreteMat = new THREE.MeshStandardMaterial({ map: btConcreteTex, roughness: 0.78 });

// BT Tower window band — the restaurant and observation deck
var btWindowTex = makeCanvasTexture(512, 32, function(cx, w, h) {
  cx.fillStyle = '#0a1420';
  cx.fillRect(0, 0, w, h);
  // Vertical window mullions
  for (var vx = 0; vx < w; vx += 6) {
    cx.fillStyle = 'rgba(120,120,110,0.6)';
    cx.fillRect(vx, 0, 1, h);
  }
  // Reflection gradient — catches the dawn
  var r = cx.createLinearGradient(0, 0, 0, h);
  r.addColorStop(0, 'rgba(180, 120, 90, 0.4)');
  r.addColorStop(0.5, 'rgba(80, 60, 70, 0.15)');
  r.addColorStop(1, 'rgba(20, 26, 36, 0.05)');
  cx.fillStyle = r;
  cx.fillRect(0, 0, w, h);
});
var btWindowMat = new THREE.MeshStandardMaterial({
  map: btWindowTex, roughness: 0.25, metalness: 0.55,
  emissive: 0x301008, emissiveIntensity: 0.35
});

// ============================================================
// GROUND — streets-level ground plane (mostly hidden by buildings)
// ============================================================
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1200, 1200),
  new THREE.MeshStandardMaterial({ color: 0x2a2620, roughness: 0.95 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.2;
scene.add(ground);

// ============================================================
// OXFORD STREET — the central avenue
// ============================================================
// Runs from camera (+Z) far into the distance (-Z), angled slightly west.
// We'll model it as a rotated rectangle with painted markings.
//
// Centre Point is at the east end of Oxford St; the road curves just slightly
// away to the west. We'll angle the street by ~6 degrees toward -X.
var STREET_ANGLE = 0.06;   // radians — matches camera view-line (slight west lean into distance)
var STREET_LEN   = 600;
var STREET_WIDTH = 10;

// --- Street-local → world-space helper ---
// (along, side) where:
//   along: 0 at the near end of Oxford Street (near camera),
//          STREET_LEN (600) at the far end (west).
//   side:  +ve = north side of the street (right of frame, BT-Tower side),
//          -ve = south side (left of frame, Soho side).
// Used by crossings, beacons, lamps, shop fronts, Soho Square and the
// church towers so coordinates match exactly.
function streetLocalToWorld(along, side) {
  var cosA = Math.cos(STREET_ANGLE), sinA = Math.sin(STREET_ANGLE);
  var cx2 = -4 - sinA * STREET_LEN * 0.5;
  var cz2 = -STREET_LEN / 2 + 10;
  return {
    x: cx2 + cosA * side - sinA * (along - STREET_LEN / 2),
    z: cz2 - sinA * side - cosA * (along - STREET_LEN / 2)
  };
}

var street = new THREE.Mesh(
  new THREE.PlaneGeometry(STREET_WIDTH, STREET_LEN),
  asphaltMat
);
street.rotation.x = -Math.PI / 2;
street.rotation.z = STREET_ANGLE;
// Centre of street offset so it starts just west of camera
street.position.set(
  -4 - Math.sin(STREET_ANGLE) * STREET_LEN * 0.5,
  0.02,
  -STREET_LEN / 2 + 10
);
scene.add(street);

// Pavements either side of Oxford Street
function addPavement(offset) {
  var pv = new THREE.Mesh(
    new THREE.PlaneGeometry(4, STREET_LEN),
    paveMat
  );
  pv.rotation.x = -Math.PI / 2;
  pv.rotation.z = STREET_ANGLE;
  var cx = Math.cos(STREET_ANGLE), sx = Math.sin(STREET_ANGLE);
  pv.position.set(
    -4 - sx * STREET_LEN * 0.5 + cx * offset,
    0.05,
    -STREET_LEN / 2 + 10 - sx * offset
  );
  scene.add(pv);
}
addPavement( STREET_WIDTH/2 + 2);
addPavement(-STREET_WIDTH/2 - 2);

// Zebra crossings — a couple spaced down Oxford Street for visual rhythm
function addZebraCrossing(along) {
  // British zebra crossing: black-and-white stripes. Previous orientation
  // is turned 90° — stripes now run along the OTHER axis of the plane.
  // More stripes (10) so each reads at roughly real-world proportions.
  var crossingTex = makeCanvasTexture(64, 32, function(cx, w, h) {
    cx.fillStyle = '#15151a';
    cx.fillRect(0, 0, w, h);
    var stripes = 10;
    var sW = w / (stripes * 2 - 0.6);   // slight bias so black gaps read
    for (var st = 0; st < stripes; st++) {
      var x0 = (st * 2 + 0.2) * sW;
      cx.fillStyle = 'rgba(200,188,158,' + (0.58 + Math.random()*0.18) + ')';
      cx.fillRect(x0, 0, sW * 1.45, h);
      // Tyre scuffing & soot streaks
      cx.fillStyle = 'rgba(0,0,0,' + (0.22 + Math.random()*0.18) + ')';
      cx.fillRect(
        x0 + Math.random() * sW * 0.5,
        Math.random() * h * 0.3,
        0.8 + Math.random(),
        h * 0.55
      );
      cx.fillStyle = 'rgba(0,0,0,' + (0.15 + Math.random()*0.12) + ')';
      cx.fillRect(x0 + sW * 1.35, 0, 0.5, h);   // crisp edge shadow
    }
  });
  var cMat = new THREE.MeshStandardMaterial({ map: crossingTex, roughness: 0.85 });
  var crossing = new THREE.Mesh(
    new THREE.PlaneGeometry(STREET_WIDTH, 3),
    cMat
  );
  crossing.rotation.x = -Math.PI / 2;
  crossing.rotation.z = STREET_ANGLE;
  var cosA = Math.cos(STREET_ANGLE), sinA = Math.sin(STREET_ANGLE);
  var cx2 = -4 - Math.sin(STREET_ANGLE) * STREET_LEN * 0.5;
  var cz2 = -STREET_LEN / 2 + 10;
  crossing.position.set(
    cx2 - sinA * (along - STREET_LEN/2),
    0.04,
    cz2 - cosA * (along - STREET_LEN/2)
  );
  scene.add(crossing);
}
addZebraCrossing(80);
addZebraCrossing(180);
addZebraCrossing(300);

// --- BELISHA BEACONS ---
// Amber globes on black-and-white striped poles — the unmistakable
// British zebra-crossing marker. One beacon on each pavement at each
// crossing. In 1973 they flashed, but we render them as a warm emissive
// glow that reads strongly through the dawn fog.
var belishaPoleBlack = new THREE.MeshStandardMaterial({ color: 0x121212, roughness: 0.85 });
var belishaPoleWhite = new THREE.MeshStandardMaterial({ color: 0xd0c8b8, roughness: 0.8 });
var belishaGlobeMat  = new THREE.MeshStandardMaterial({
  color: 0x402408, emissive: 0xffa050, emissiveIntensity: 2.6, roughness: 0.5
});
var belishaHaloMat = new THREE.SpriteMaterial({
  map: haloTex, transparent: true, depthWrite: false, fog: true, color: 0xffb870
});

function addBelishaBeacon(along, side) {
  var wp = streetLocalToWorld(along, side);
  var g = new THREE.Group();
  g.position.set(wp.x, 0, wp.z);
  g.rotation.y = STREET_ANGLE;

  var poleH = 2.4;
  var segs = 8;
  var segH = poleH / segs;
  for (var b = 0; b < segs; b++) {
    var seg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.06, segH, 8),
      b % 2 === 0 ? belishaPoleWhite : belishaPoleBlack
    );
    seg.position.set(0, (b + 0.5) * segH, 0);
    g.add(seg);
  }

  // Amber globe
  var globe = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 14, 12),
    belishaGlobeMat
  );
  globe.position.set(0, poleH + 0.24, 0);
  g.add(globe);

  // Soft warm halo so the beacon punches through fog
  var halo = new THREE.Sprite(belishaHaloMat);
  halo.scale.set(1.9, 1.9, 1);
  halo.position.set(0, poleH + 0.24, 0);
  g.add(halo);

  scene.add(g);
}

// Two beacons per crossing, one on each pavement
[80, 180, 300].forEach(function(a) {
  addBelishaBeacon(a,  STREET_WIDTH/2 + 1.6);
  addBelishaBeacon(a, -(STREET_WIDTH/2 + 1.6));
});

// Street lamps — sodium lamps on concrete columns, paired down both sides.
// In 1973 these ran all the way down Oxford Street at ~25m spacing.
var lampMat = new THREE.MeshStandardMaterial({ color: 0x2a2824, roughness: 0.85 });
var lampBulbMat = new THREE.MeshStandardMaterial({
  color: 0x3a2a10, emissive: 0xffc060, emissiveIntensity: 3.4, fog: true
});
function addStreetLamp(along, side) {
  var cosA = Math.cos(STREET_ANGLE), sinA = Math.sin(STREET_ANGLE);
  var cx2 = -4 - Math.sin(STREET_ANGLE) * STREET_LEN * 0.5;
  var cz2 = -STREET_LEN / 2 + 10;
  var baseX = cx2 + cosA * side - sinA * (along - STREET_LEN/2);
  var baseZ = cz2 - sinA * side - cosA * (along - STREET_LEN/2);
  // Column
  var col = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.12, 3.0, 8),
    lampMat
  );
  col.position.set(baseX, 1.5, baseZ);
  scene.add(col);
  // Arm reaching toward the street
  var armDir = (side > 0) ? -1 : 1;
  var arm = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.08, 0.08),
    lampMat
  );
  arm.position.set(baseX + cosA * armDir * 0.5, 3.0, baseZ - sinA * armDir * 0.5);
  arm.rotation.y = STREET_ANGLE;
  scene.add(arm);
  // Lamp head
  var head = new THREE.Mesh(
    new THREE.BoxGeometry(0.35, 0.15, 0.2),
    lampMat
  );
  head.position.set(baseX + cosA * armDir * 0.9, 2.92, baseZ - sinA * armDir * 0.9);
  head.rotation.y = STREET_ANGLE;
  scene.add(head);
  // Glowing bulb
  var bulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.12, 8, 6),
    lampBulbMat
  );
  bulb.position.set(baseX + cosA * armDir * 0.9, 2.8, baseZ - sinA * armDir * 0.9);
  scene.add(bulb);
  // Sodium halo — a soft warm glow around the bulb. Reads strongly in fog.
  var halo = new THREE.Sprite(haloMat);
  halo.position.set(baseX + cosA * armDir * 0.9, 2.8, baseZ - sinA * armDir * 0.9);
  halo.scale.set(5.2, 5.2, 1);
  scene.add(halo);
}

// Sodium halo sprite — used by street lamps and shop fronts in fog.
var haloTex = makeCanvasTexture(128, 128, function(cx, w, h) {
  var g = cx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/2);
  g.addColorStop(0,    'rgba(255, 235, 180, 0.92)');
  g.addColorStop(0.15, 'rgba(255, 210, 130, 0.70)');
  g.addColorStop(0.35, 'rgba(245, 175, 90, 0.42)');
  g.addColorStop(0.65, 'rgba(210, 130, 60, 0.18)');
  g.addColorStop(1,    'rgba(150, 90, 50, 0)');
  cx.fillStyle = g;
  cx.fillRect(0, 0, w, h);
});
var haloMat = new THREE.SpriteMaterial({ map: haloTex, transparent: true, depthWrite: false, fog: true });

for (var lp = 30; lp < STREET_LEN - 20; lp += 22) {
  addStreetLamp(lp, STREET_WIDTH/2 + 1);
  addStreetLamp(lp + 11, -(STREET_WIDTH/2 + 1));
}

// Shop fronts — warm ground-floor windows down both pavements. 1973
// Oxford Street was a near-continuous line of lit shop displays, cafes
// and window signs. Variety: mostly warm-lit, occasional cold fluorescent,
// occasional closed/dark.
var shopWarmMat = new THREE.MeshStandardMaterial({
  color: 0x1a0f04, emissive: 0xe6a550, emissiveIntensity: 0.95, fog: true
});
var shopWarmDim = new THREE.MeshStandardMaterial({
  color: 0x1a0f04, emissive: 0xc0803a, emissiveIntensity: 0.55, fog: true
});
var shopColdMat = new THREE.MeshStandardMaterial({
  color: 0x080a10, emissive: 0x6078a0, emissiveIntensity: 0.40, fog: true
});
var shopDarkMat = new THREE.MeshStandardMaterial({
  color: 0x0a0806, roughness: 0.85
});
var shopSignMat = new THREE.MeshStandardMaterial({ color: 0x1a1612, roughness: 0.85 });

function addShopFront(along, side) {
  var cosA = Math.cos(STREET_ANGLE), sinA = Math.sin(STREET_ANGLE);
  var cx2 = -4 - Math.sin(STREET_ANGLE) * STREET_LEN * 0.5;
  var cz2 = -STREET_LEN / 2 + 10;
  var px = cx2 + cosA * side - sinA * (along - STREET_LEN/2);
  var pz = cz2 - sinA * side - cosA * (along - STREET_LEN/2);
  // Pick material — mostly warm, some dim, some cold, some closed
  var r = rand();
  var mat;
  if      (r < 0.45) mat = shopWarmMat;
  else if (r < 0.70) mat = shopWarmDim;
  else if (r < 0.82) mat = shopColdMat;
  else               mat = shopDarkMat;
  // Shop window facing the street.
  // Box default front = +Z. A shop on +side sits east of the street and must
  // face west toward the road; a shop on -side faces east. After the street's
  // yaw, the correct rotation is STREET_ANGLE - sign(side) * PI/2.
  var faceRot = STREET_ANGLE - (side > 0 ? 1 : -1) * Math.PI / 2;
  var winW = 2.0 + rand() * 0.6;
  var winH = 1.4 + rand() * 0.3;
  var winY = 0.25 + winH/2;
  var win = new THREE.Mesh(new THREE.BoxGeometry(winW, winH, 0.2), mat);
  win.position.set(px, winY, pz);
  win.rotation.y = faceRot;
  scene.add(win);
  // Fascia / sign board above the window
  var sign = new THREE.Mesh(new THREE.BoxGeometry(winW, 0.35, 0.35), shopSignMat);
  sign.position.set(px, winY + winH/2 + 0.2, pz);
  sign.rotation.y = faceRot;
  scene.add(sign);
  // Warm spill halo for lit shops — helps them read through fog
  if (mat === shopWarmMat || mat === shopWarmDim) {
    var shopHalo = new THREE.Sprite(haloMat);
    shopHalo.position.set(px, winY, pz);
    shopHalo.scale.set(2.4, 1.8, 1);
    scene.add(shopHalo);
  }
}

// Line the pavement on both sides, staggered
for (var sp = 8; sp < STREET_LEN - 10; sp += 2.6) {
  addShopFront(sp,              STREET_WIDTH/2 + 4);
  addShopFront(sp + 1.3,       -(STREET_WIDTH/2 + 4));
}

// ============================================================
// ROOFTOP CITY — procedural London rooftops around Oxford Street
// ============================================================
//
// We generate a grid of buildings, skipping a strip where Oxford Street
// runs and a zone where BT Tower will sit. Buildings get random heights,
// roof types (pitched slate, flat tar), chimneys, dormers, window bands.
//
// Far-distance buildings get simplified to flat blocks for performance.
//
var buildingsGroup = new THREE.Group();
scene.add(buildingsGroup);

function inOxfordStreet(x, z) {
  // Rotate point into street-aligned space
  var cx = Math.cos(-STREET_ANGLE), sx = Math.sin(STREET_ANGLE);
  var tx = -4 - Math.sin(STREET_ANGLE) * STREET_LEN * 0.5;
  var tz = -STREET_LEN / 2 + 10;
  var lx = (x - tx) * cx - (z - tz) * sx;
  return Math.abs(lx) < STREET_WIDTH / 2 + 4;
}

function isBTTowerZone(x, z) {
  // Reserve a footprint for BT Tower (position kept in sync with BT_X/BT_Z
  // where the tower itself is placed — see below)
  var BT_X = 89, BT_Z = -196;
  var dx = x - BT_X, dz = z - BT_Z;
  return (dx*dx + dz*dz) < 12*12;
}

// Cache of warm/cold window mesh refs so we can skip some for fewer draw calls
function addBuilding(x, z, w, d, h, opts) {
  opts = opts || {};
  var body;
  var pickBrick = opts.brick || [brickYellow, brickRed, brickPale, stuccoMat, brickSooty][Math.floor(rand()*5)];

  // Body
  body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), pickBrick);
  body.position.set(x, h/2, z);
  buildingsGroup.add(body);

  // Roof — pitched slate is the dominant London rooftop.
  // Flat tarred roofs are reserved for taller commercial/postwar blocks.
  var pitched = (h < 10) ? (rand() < 0.88) : (rand() < 0.25);
  // Ridge orientation: randomised each building so the roofscape isn't
  // a single aligned field. True/false for "ridge runs along z" vs "along x".
  var ridgeAlongZ = rand() < 0.5;
  if (pitched) {
    var roofH = 1.6 + rand() * 1.6;  // steeper, more visible from above
    var roofGeo = new THREE.BufferGeometry();
    // Include a small eave overhang so the roof projects past the wall —
    // gives the characteristic London silhouette and shadow line.
    var overhang = 0.22;
    var hx = w/2 + overhang, hz = d/2 + overhang;
    var verts, uvs;
    var uvK = 0.55;  // texture tiling: ~0.55 tiles per world metre
    var slopeLen, ridgeLen;
    if (ridgeAlongZ) {
      // Ridge parallel to z-axis — gable ends face -x and +x
      slopeLen = Math.sqrt(hx*hx + roofH*roofH);
      ridgeLen = 2 * hz;
      verts = new Float32Array([
        // -x slope (tilted face)
        -hx, 0,  hz,   -hx, 0, -hz,   0, roofH, -hz,
        -hx, 0,  hz,    0, roofH, -hz,  0, roofH,  hz,
        // +x slope
         hx, 0,  hz,    0, roofH,  hz,   0, roofH, -hz,
         hx, 0,  hz,    0, roofH, -hz,   hx, 0, -hz,
        // gable ends
        -hx, 0, -hz,    hx, 0, -hz,    0, roofH, -hz,
        -hx, 0,  hz,    0, roofH,  hz,   hx, 0,  hz
      ]);
      uvs = new Float32Array([
        // -x slope (U along ridge, V up the slope)
        0,           0,
        ridgeLen*uvK, 0,
        ridgeLen*uvK, slopeLen*uvK,
        0,           0,
        ridgeLen*uvK, slopeLen*uvK,
        0,           slopeLen*uvK,
        // +x slope
        0,           0,
        0,           slopeLen*uvK,
        ridgeLen*uvK, slopeLen*uvK,
        0,           0,
        ridgeLen*uvK, slopeLen*uvK,
        ridgeLen*uvK, 0,
        // -z gable
        0,           0,
        2*hx*uvK,    0,
        hx*uvK,      roofH*uvK,
        // +z gable
        0,           0,
        hx*uvK,      roofH*uvK,
        2*hx*uvK,    0
      ]);
    } else {
      // Ridge parallel to x-axis — gable ends face -z and +z
      slopeLen = Math.sqrt(hz*hz + roofH*roofH);
      ridgeLen = 2 * hx;
      verts = new Float32Array([
        // -z slope
        -hx, 0, -hz,    hx, 0, -hz,    hx, roofH, 0,
        -hx, 0, -hz,    hx, roofH, 0,  -hx, roofH, 0,
        // +z slope
        -hx, 0,  hz,   -hx, roofH, 0,   hx, roofH, 0,
        -hx, 0,  hz,    hx, roofH, 0,   hx, 0,  hz,
        // gable ends
        -hx, 0, -hz,   -hx, 0,  hz,   -hx, roofH, 0,
         hx, 0, -hz,    hx, roofH, 0,   hx, 0,  hz
      ]);
      uvs = new Float32Array([
        // -z slope
        0,           0,
        ridgeLen*uvK, 0,
        ridgeLen*uvK, slopeLen*uvK,
        0,           0,
        ridgeLen*uvK, slopeLen*uvK,
        0,           slopeLen*uvK,
        // +z slope
        0,           0,
        0,           slopeLen*uvK,
        ridgeLen*uvK, slopeLen*uvK,
        0,           0,
        ridgeLen*uvK, slopeLen*uvK,
        ridgeLen*uvK, 0,
        // -x gable
        0,           0,
        2*hz*uvK,    0,
        hz*uvK,      roofH*uvK,
        // +x gable
        0,           0,
        hz*uvK,      roofH*uvK,
        2*hz*uvK,    0
      ]);
    }
    roofGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
    roofGeo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
    roofGeo.computeVertexNormals();
    var roof = new THREE.Mesh(roofGeo, slateMat);
    roof.position.set(x, h, z);
    buildingsGroup.add(roof);

    // Ridge cap — a raised course of tiles along the ridge line. Gives
    // the roof a visible silhouette break instead of a bare peak.
    var capGeo = new THREE.BoxGeometry(
      ridgeAlongZ ? 0.42 : ridgeLen,
      0.18,
      ridgeAlongZ ? ridgeLen : 0.42
    );
    var ridgeCap = new THREE.Mesh(capGeo, brickSooty);
    ridgeCap.position.set(x, h + roofH - 0.02, z);
    buildingsGroup.add(ridgeCap);

    // Eave fascia — a dark strip along the bottom edge of each slope.
    // Just a thin box at the overhang line; reads as roof shadow from above.
    var fasciaMat = new THREE.MeshStandardMaterial({ color: 0x1a1612, roughness: 0.9 });
    var fasciaH = 0.12;
    if (ridgeAlongZ) {
      var fNeg = new THREE.Mesh(new THREE.BoxGeometry(0.18, fasciaH, 2*hz), fasciaMat);
      fNeg.position.set(x - hx + 0.09, h - fasciaH/2 + 0.05, z);
      buildingsGroup.add(fNeg);
      var fPos = new THREE.Mesh(new THREE.BoxGeometry(0.18, fasciaH, 2*hz), fasciaMat);
      fPos.position.set(x + hx - 0.09, h - fasciaH/2 + 0.05, z);
      buildingsGroup.add(fPos);
    } else {
      var fNeg2 = new THREE.Mesh(new THREE.BoxGeometry(2*hx, fasciaH, 0.18), fasciaMat);
      fNeg2.position.set(x, h - fasciaH/2 + 0.05, z - hz + 0.09);
      buildingsGroup.add(fNeg2);
      var fPos2 = new THREE.Mesh(new THREE.BoxGeometry(2*hx, fasciaH, 0.18), fasciaMat);
      fPos2.position.set(x, h - fasciaH/2 + 0.05, z + hz - 0.09);
      buildingsGroup.add(fPos2);
    }

    // Chimney stacks — almost every London pitched roof has at least one.
    // Stacks sit on the ridge line or at the gable ends.
    var chimCount = (rand() < 0.9) ? (1 + Math.floor(rand() * 3)) : 0;
    for (var ci = 0; ci < chimCount; ci++) {
      var cw = 0.4 + rand() * 0.35;
      var cH = 1.0 + rand() * 0.9;
      var chim = new THREE.Mesh(
        new THREE.BoxGeometry(cw, cH, cw * 1.3),
        brickSooty
      );
      var chimX, chimZ;
      if (ridgeAlongZ) {
        chimX = x + (rand() - 0.5) * 0.3;
        chimZ = z + (rand() - 0.5) * d * 0.85;
      } else {
        chimX = x + (rand() - 0.5) * w * 0.85;
        chimZ = z + (rand() - 0.5) * 0.3;
      }
      chim.position.set(chimX, h + roofH * 0.9 + cH/2 - 0.1, chimZ);
      buildingsGroup.add(chim);
      // Chimney pots — the distinctive London terracotta cluster
      var potCount = 2 + Math.floor(rand()*3);
      for (var pc = 0; pc < potCount; pc++) {
        var pot = new THREE.Mesh(
          new THREE.CylinderGeometry(0.08, 0.1, 0.32, 6),
          new THREE.MeshStandardMaterial({ color: 0x6a3828, roughness: 0.85 })
        );
        var offAlong = (pc - (potCount-1)/2) * 0.22;
        pot.position.set(
          chimX + offAlong * (ridgeAlongZ ? 0 : 1),
          chim.position.y + cH/2 + 0.16,
          chimZ + offAlong * (ridgeAlongZ ? 1 : 0)
        );
        buildingsGroup.add(pot);
      }
    }

    // Occasional dormer window poking through the slate
    if (rand() < 0.25 && h > 5) {
      var dormerMat = (rand() < 0.5) ? warmWindow : darkWindow;
      var dormer = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.8, 0.7),
        stuccoMat
      );
      var dpx = ridgeAlongZ ? (x + (rand() < 0.5 ? -hx : hx) * 0.6) : (x + (rand()-0.5) * w * 0.5);
      var dpz = ridgeAlongZ ? (z + (rand()-0.5) * d * 0.5) : (z + (rand() < 0.5 ? -hz : hz) * 0.6);
      dormer.position.set(dpx, h + roofH * 0.35, dpz);
      buildingsGroup.add(dormer);
      var dormerGlass = new THREE.Mesh(
        new THREE.BoxGeometry(0.45, 0.45, 0.06),
        dormerMat
      );
      dormerGlass.position.set(dpx, h + roofH * 0.35, dpz + 0.38);
      buildingsGroup.add(dormerGlass);
    }
  } else {
    // Flat tarred roof
    var flat = new THREE.Mesh(
      new THREE.BoxGeometry(w, 0.3, d),
      tarMat
    );
    flat.position.set(x, h + 0.15, z);
    buildingsGroup.add(flat);
    // Parapet
    var parW = 0.25;
    var parColor = rand() < 0.4 ? brickYellow : stuccoMat;
    var pN = new THREE.Mesh(new THREE.BoxGeometry(w, 0.6, parW), parColor);
    pN.position.set(x, h + 0.3, z - d/2 + parW/2); buildingsGroup.add(pN);
    var pS = new THREE.Mesh(new THREE.BoxGeometry(w, 0.6, parW), parColor);
    pS.position.set(x, h + 0.3, z + d/2 - parW/2); buildingsGroup.add(pS);
    var pE = new THREE.Mesh(new THREE.BoxGeometry(parW, 0.6, d), parColor);
    pE.position.set(x + w/2 - parW/2, h + 0.3, z); buildingsGroup.add(pE);
    var pW = new THREE.Mesh(new THREE.BoxGeometry(parW, 0.6, d), parColor);
    pW.position.set(x - w/2 + parW/2, h + 0.3, z); buildingsGroup.add(pW);
    // Roof clutter: vent stack, water tank
    if (rand() < 0.6) {
      var tank = new THREE.Mesh(
        new THREE.BoxGeometry(1 + rand()*1.5, 1 + rand(), 1 + rand()*1.2),
        brickSooty
      );
      tank.position.set(
        x + (rand()-0.5)*w*0.5,
        h + 0.8,
        z + (rand()-0.5)*d*0.5
      );
      buildingsGroup.add(tank);
    }
    if (rand() < 0.35) {
      var vent = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.18, 0.8, 8),
        new THREE.MeshStandardMaterial({ color: 0x3a342c, roughness: 0.8 })
      );
      vent.position.set(
        x + (rand()-0.5)*w*0.6,
        h + 0.6,
        z + (rand()-0.5)*d*0.6
      );
      buildingsGroup.add(vent);
    }
  }

  // Windows — rows of small lit/unlit panes on the visible faces
  var storeyH = 2.2;
  var storeys = Math.max(1, Math.floor((h - 0.5) / storeyH));
  var winsPerFace = Math.max(1, Math.floor(w / 1.4));
  for (var st = 0; st < storeys; st++) {
    var winY = 0.8 + st * storeyH;
    for (var wi = 0; wi < winsPerFace; wi++) {
      var winX = -w/2 + 0.7 + wi * (w / winsPerFace);
      // Front face (+Z) — facing camera
      var r1 = rand();
      var wmat1 = r1 < 0.08 ? warmWindow : (r1 < 0.13 ? coldWindow : darkWindow);
      var win1 = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.0, 0.06), wmat1);
      win1.position.set(x + winX, winY, z + d/2 + 0.03);
      buildingsGroup.add(win1);
    }
    // A handful of windows on the +X face (visible on right-facing buildings)
    if (d > 3) {
      var sideCount = Math.max(1, Math.floor(d / 1.4));
      for (var wj = 0; wj < sideCount; wj++) {
        if (rand() < 0.45) continue;   // skip many for perf
        var winZ = -d/2 + 0.7 + wj * (d / sideCount);
        var r2 = rand();
        var wmat2 = r2 < 0.08 ? warmWindow : (r2 < 0.13 ? coldWindow : darkWindow);
        var win2 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 1.0, 0.7), wmat2);
        win2.position.set(x + w/2 + 0.03, winY, z + winZ);
        buildingsGroup.add(win2);
      }
    }
  }
}

// Generate the dense inner-city rooftops — 0 to 180 units out, grid cells
// jittered heavily to break the Manhattan-grid feel. London is a medieval
// patchwork, not a grid.
var placedCount = 0;

// Pre-generate a few "mews courtyard" gaps — larger voids where a mews or
// small square would break up the grid
var mewsGaps = [];
for (var mg = 0; mg < 8; mg++) {
  mewsGaps.push({
    x: -80 + rand() * 160,
    z: -180 + rand() * 200,
    r: 4 + rand() * 5
  });
}

// Landmark exclusion zones — the procedural grid skips these so Soho Square
// can be a leafy open square and the church towers aren't buried inside a
// random building. Coordinates are chosen to match each landmark's real
// relative position from Centre Point (compressed toward the camera where
// necessary for visibility through the dawn fog).
var landmarkExclusions = [];
var _sqPos = streetLocalToWorld(180, -55);         // Soho Square centre
landmarkExclusions.push({ x: _sqPos.x, z: _sqPos.z, r: 26 });
var _stPatPos = streetLocalToWorld(180, -42);      // St Patrick's, east edge of Soho Sq
landmarkExclusions.push({ x: _stPatPos.x, z: _stPatPos.z, r: 6 });
var _stAnnePos = streetLocalToWorld(280, -90);     // St Anne's Soho tower
landmarkExclusions.push({ x: _stAnnePos.x, z: _stAnnePos.z, r: 5 });

// --- Oxford Street Department Stores ---
// Real 1973 Oxford Street was defined by its Edwardian/Victorian department
// stores (Selfridges, John Lewis, DH Evans, Debenhams, Marshall &
// Snelgrove, C&A, HMV Oxford Circus). They ran right along the kerb,
// filled whole block frontages, and were aligned with the street axis.
// Defined here as fixed along-street specs; their footprints are pushed
// onto landmarkExclusions so the procedural terrace grid skips over them.
// The actual buildings are built later by addDeptStore().
// along: 0=far west end, 600=right below camera
// side:  + = north pavement (right of frame, BT-Tower side)
//        - = south pavement (left of frame, Soho side)
var deptStoreSpecs = [
  { along: 552, side:  15, w: 22, d: 8,  h: 13 },
  { along: 488, side: -14, w: 18, d: 7,  h: 12 },
  { along: 432, side:  14, w: 16, d: 7,  h: 11 },
  { along: 362, side: -15, w: 20, d: 8,  h: 12 },
  { along: 285, side:  13, w: 15, d: 7,  h: 11 },
  { along: 228, side: -14, w: 17, d: 7,  h: 12 },
  { along: 138, side:  13, w: 14, d: 6,  h: 10 },
  { along:  82, side: -13, w: 15, d: 7,  h: 11 }
];
for (var dsi = 0; dsi < deptStoreSpecs.length; dsi++) {
  var _dsp = streetLocalToWorld(deptStoreSpecs[dsi].along, deptStoreSpecs[dsi].side);
  var _dsW = deptStoreSpecs[dsi].w;
  var _dsD = deptStoreSpecs[dsi].d;
  // Bounding-circle radius — covers the rotated rectangle with a little pad.
  var _dsR = Math.sqrt((_dsW/2)*(_dsW/2) + (_dsD/2)*(_dsD/2)) + 1.5;
  landmarkExclusions.push({ x: _dsp.x, z: _dsp.z, r: _dsR });
}

for (var gx = -140; gx <= 140; gx += 5.2) {
  for (var gz = -600; gz <= 42; gz += 5.2) {
    // Skip Oxford Street corridor
    if (inOxfordStreet(gx, gz)) continue;
    // Skip BT Tower footprint
    if (isBTTowerZone(gx, gz)) continue;
    // Skip the immediate Centre Point footprint (the roof the camera is on)
    if (Math.abs(gx) < 8 && Math.abs(gz) < 8) continue;
    // Skip mews/courtyard gaps
    var inMews = false;
    for (var mgi = 0; mgi < mewsGaps.length; mgi++) {
      var mgg = mewsGaps[mgi];
      var ddx = gx - mgg.x, ddz = gz - mgg.z;
      if (ddx*ddx + ddz*ddz < mgg.r * mgg.r) { inMews = true; break; }
    }
    if (inMews) continue;

    // Skip landmark footprints (Soho Square garden, church towers)
    var inLandmark = false;
    for (var li = 0; li < landmarkExclusions.length; li++) {
      var lzone = landmarkExclusions[li];
      var ldx = gx - lzone.x, ldz = gz - lzone.z;
      if (ldx*ldx + ldz*ldz < lzone.r * lzone.r) { inLandmark = true; break; }
    }
    if (inLandmark) continue;

    // Distance from near-camera — affects skip rate and height cap so the
    // far distance reads as a flat London terrace field, not a Midtown block.
    var distFromCam = Math.sqrt(gx*gx + (gz - 40) * (gz - 40));
    var skipProb = 0.24;
    if (distFromCam > 120) skipProb = 0.38;
    if (distFromCam > 260) skipProb = 0.50;
    if (rand() < skipProb) continue;

    // Heavy jitter so cells don't line up into grid rows
    var jx = gx + (rand() - 0.5) * 3.2;
    var jz = gz + (rand() - 0.5) * 3.2;
    // Slightly wider, shallower footprints — London terrace proportions
    var w = 3.4 + rand() * 3.8;
    var d = 3.0 + rand() * 2.8;

    // Height distribution — London 1973 was predominantly low-rise outside
    // the City, but Oxford Street and the West End had plenty of 5-7 storey
    // commercial blocks (Selfridges, M&S, John Lewis, postwar slabs) punctuating
    // the terrace field.
    // Near Oxford Street → commercial, so shift the distribution upward.
    var cx2 = Math.cos(-STREET_ANGLE);
    var sx2 = Math.sin(STREET_ANGLE);
    var txA = -4 - Math.sin(STREET_ANGLE) * STREET_LEN * 0.5;
    var tzA = -STREET_LEN / 2 + 10;
    var lateral = Math.abs((gx - txA) * cx2 - (gz - tzA) * sx2);
    var nearStreet = lateral < 18;
    var hRoll = rand();
    var h;
    if (nearStreet) {
      // Oxford Street frontage: mostly shop-and-flat terraces plus Edwardian
      // commercial blocks. The big dept-store slabs are placed separately
      // (via deptStoreSpecs above), so this grid stays capped — no thin
      // towers peeping out between the dept stores.
      if (hRoll < 0.45)       h = 4.5 + rand() * 2.5;   // 3 storey shop-and-flat (dominant)
      else if (hRoll < 0.82)  h = 6.5 + rand() * 2.5;   // 4-5 storey Edwardian
      else                    h = 9 + rand() * 2;        // 6-7 storey commercial (capped)
    } else {
      // Streets off Oxford: dominant terrace with occasional commercial blocks.
      // Capped so the back-of-street roofscape reads as Soho rooftops, not a
      // scatter of Manhattan towers.
      if (hRoll < 0.65)       h = 3.2 + rand() * 2.8;   // 2-3 storey terrace (dominant)
      else if (hRoll < 0.90)  h = 5.0 + rand() * 2.5;   // 4 storey Edwardian
      else                    h = 7.5 + rand() * 2;      // 5-6 storey commercial (rare, capped)
    }

    // Far distance: gently ease heights down (but keep some blocks so the
    // horizon has silhouette variety — a flat field alone reads as suburbia).
    if (distFromCam > 220) h = Math.min(h, 9 + rand() * 4);
    if (distFromCam > 360) h = Math.min(h, 6 + rand() * 3);

    addBuilding(jx, jz, w, d, h);
    placedCount++;
  }
}

// (Removed far-distance silhouette ring — the detailed grid now extends
// deep enough that the horizon dissolves naturally into fog.)

// ============================================================
// OXFORD STREET DEPARTMENT STORES — built as street-aligned units
// ============================================================
// These are placed individually (not through the procedural terrace grid)
// so they can be WIDE, rotated to align with the street, and faced in
// pale Portland stone / concrete / stucco rather than brick. Their
// footprints were reserved via landmarkExclusions earlier, so the
// procedural grid has already skipped those cells.
function addDeptStore(along, side, sw, sd, sh) {
  var wp = streetLocalToWorld(along, side);
  // Wrap everything in a local group so the whole building rotates as one
  // unit — its long local-X (sw) axis aligns with the street direction.
  var g = new THREE.Group();
  g.position.set(wp.x, 0, wp.z);
  g.rotation.y = STREET_ANGLE;
  buildingsGroup.add(g);

  // Material — concrete dominant, pale stucco & pale brick as variation.
  var rm = rand();
  var facing;
  if (rm < 0.55)      facing = concreteMat;
  else if (rm < 0.85) facing = stuccoMat;
  else                facing = brickPale;

  // Body
  var body = new THREE.Mesh(new THREE.BoxGeometry(sw, sh, sd), facing);
  body.position.set(0, sh/2, 0);
  g.add(body);

  // Flat tarred roof just above the body top
  var roof = new THREE.Mesh(new THREE.BoxGeometry(sw, 0.25, sd), tarMat);
  roof.position.set(0, sh + 0.12, 0);
  g.add(roof);

  // Parapets in the same facing — typical roof line for Edwardian/postwar
  // dept stores. Four strips around the roof perimeter.
  var parW = 0.25, parH = 0.55;
  var pN = new THREE.Mesh(new THREE.BoxGeometry(sw, parH, parW), facing);
  pN.position.set(0, sh + parH/2, -sd/2 + parW/2); g.add(pN);
  var pS = new THREE.Mesh(new THREE.BoxGeometry(sw, parH, parW), facing);
  pS.position.set(0, sh + parH/2,  sd/2 - parW/2); g.add(pS);
  var pE = new THREE.Mesh(new THREE.BoxGeometry(parW, parH, sd), facing);
  pE.position.set( sw/2 - parW/2, sh + parH/2, 0); g.add(pE);
  var pW = new THREE.Mesh(new THREE.BoxGeometry(parW, parH, sd), facing);
  pW.position.set(-sw/2 + parW/2, sh + parH/2, 0); g.add(pW);

  // Occasional rooftop water tank — reads commercial/postwar
  if (rand() < 0.5) {
    var tankW = 1.4 + rand() * 1.0;
    var tankH = 1.0 + rand() * 0.6;
    var tank = new THREE.Mesh(
      new THREE.BoxGeometry(tankW, tankH, tankW),
      tarMat
    );
    tank.position.set(
      (rand() - 0.5) * (sw - 4),
      sh + parH + tankH/2,
      (rand() - 0.5) * (sd - 2)
    );
    g.add(tank);
  }

  // Street-facing window band — two or three rows of mostly-dark windows
  // with a few warm/cold accents (dawn, most shops closed, staff lights on
  // here and there).
  // After the group rotation, the road-facing wall is local +Z for a building
  // on the north side (side>0) and local -Z for a building on the south side.
  var streetFaceZ = side > 0 ? sd/2 + 0.01 : -sd/2 - 0.01;
  var winRows = Math.max(2, Math.floor((sh - 1.5) / 2.4));
  var winCols = Math.max(5, Math.floor(sw / 1.9));
  var winW2 = (sw * 0.72) / winCols;
  var winH2 = 1.0;
  var rowGap = (sh - 2.0) / Math.max(1, winRows);
  for (var wr = 0; wr < winRows; wr++) {
    for (var wc = 0; wc < winCols; wc++) {
      var wroll = rand();
      var wmat;
      if (wroll < 0.12)      wmat = warmWindow;
      else if (wroll < 0.22) wmat = coldWindow;
      else                   wmat = darkWindow;
      var win = new THREE.Mesh(new THREE.BoxGeometry(winW2, winH2, 0.1), wmat);
      var xOff = (wc - (winCols - 1) / 2) * (sw / winCols);
      var yOff = 1.3 + wr * rowGap;
      win.position.set(xOff, yOff, streetFaceZ);
      g.add(win);
    }
  }
}

// Build each department-store spec.
for (var dsi2 = 0; dsi2 < deptStoreSpecs.length; dsi2++) {
  var ds = deptStoreSpecs[dsi2];
  addDeptStore(ds.along, ds.side, ds.w, ds.d, ds.h);
}

// ============================================================
// SOHO SQUARE — leafy garden square on the south side of Oxford St
// ============================================================
// A patch of dark plane-tree canopy with St Patrick's campanile rising
// at the east edge. The procedural building grid leaves its footprint
// clear via landmarkExclusions above.
var sohoGroup = new THREE.Group();
scene.add(sohoGroup);

(function buildSohoSquare(along, side, widthLocal, depthLocal) {
  var centre = streetLocalToWorld(along, side);

  // Grass ground patch — sits just above the dark street ground (y=-0.2)
  var grassMat = new THREE.MeshStandardMaterial({
    color: 0x25381c, roughness: 0.95
  });
  var grass = new THREE.Mesh(
    new THREE.PlaneGeometry(widthLocal, depthLocal),
    grassMat
  );
  grass.rotation.x = -Math.PI / 2;
  grass.rotation.z = STREET_ANGLE;
  grass.position.set(centre.x, -0.15, centre.z);
  sohoGroup.add(grass);

  // Low dark railing around the square (suggestion only — read as a dark rim)
  var railMat = new THREE.MeshStandardMaterial({ color: 0x120d08, roughness: 0.8 });
  // Four sides in street-local coords
  function addRail(sideA0, sideA1, sideS0, sideS1, isAlongSide) {
    var mid = streetLocalToWorld((sideA0+sideA1)/2, (sideS0+sideS1)/2);
    var len = isAlongSide ? Math.abs(sideA1 - sideA0) : Math.abs(sideS1 - sideS0);
    var rail = new THREE.Mesh(
      new THREE.BoxGeometry(isAlongSide ? 0.4 : len, 0.9, isAlongSide ? len : 0.4),
      railMat
    );
    rail.rotation.y = STREET_ANGLE;
    rail.position.set(mid.x, 0.45, mid.z);
    sohoGroup.add(rail);
  }
  // N & S rails (running along the street axis)
  addRail(along - depthLocal/2, along + depthLocal/2, side - widthLocal/2, side - widthLocal/2, true);
  addRail(along - depthLocal/2, along + depthLocal/2, side + widthLocal/2, side + widthLocal/2, true);
  // E & W rails (crossing)
  addRail(along - depthLocal/2, along - depthLocal/2, side - widthLocal/2, side + widthLocal/2, false);
  addRail(along + depthLocal/2, along + depthLocal/2, side - widthLocal/2, side + widthLocal/2, false);

  // Plane-tree canopies — clusters of dark green blobs covering the square.
  // London planes are huge; from 34m up their canopy reads as patchy dark green.
  var canopyDark = new THREE.MeshStandardMaterial({ color: 0x1d3517, roughness: 0.9 });
  var canopyLit  = new THREE.MeshStandardMaterial({ color: 0x2e4a24, roughness: 0.9 });
  var trunkMat   = new THREE.MeshStandardMaterial({ color: 0x2a1c10, roughness: 0.95 });

  var plantings = [];
  // Perimeter of plane trees
  for (var p = 0; p < 18; p++) {
    var t = p / 18;
    var edgePick = p % 4;
    var ua, sa;
    if (edgePick === 0) { ua = along - depthLocal/2 + 2; sa = side - widthLocal/2 + t * widthLocal; }
    else if (edgePick === 1) { ua = along + depthLocal/2 - 2; sa = side - widthLocal/2 + t * widthLocal; }
    else if (edgePick === 2) { ua = along - depthLocal/2 + t * depthLocal; sa = side - widthLocal/2 + 2; }
    else { ua = along - depthLocal/2 + t * depthLocal; sa = side + widthLocal/2 - 2; }
    plantings.push({ along: ua + (rand()-0.5)*2, side: sa + (rand()-0.5)*2 });
  }
  // Inner cluster of trees (four "quadrant" groves)
  for (var q = 0; q < 14; q++) {
    plantings.push({
      along: along + (rand()-0.5) * depthLocal * 0.7,
      side:  side  + (rand()-0.5) * widthLocal * 0.7
    });
  }

  plantings.forEach(function (pt) {
    var wp = streetLocalToWorld(pt.along, pt.side);
    var treeH = 7 + rand() * 4;       // 7-11m tall (London plane-trees are tall)
    var treeR = 3.0 + rand() * 1.6;   // 3-4.6m crown radius

    // Trunk
    var trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.28, 0.35, treeH * 0.45, 6),
      trunkMat
    );
    trunk.position.set(wp.x, treeH * 0.22, wp.z);
    sohoGroup.add(trunk);

    // Canopy — cluster of 2-4 squashed spheres
    var clumps = 2 + Math.floor(rand() * 3);
    for (var k = 0; k < clumps; k++) {
      var clumpR = treeR * (0.6 + rand() * 0.5);
      var ox = (rand() - 0.5) * treeR * 0.9;
      var oy = (rand() - 0.5) * clumpR * 0.45;
      var oz = (rand() - 0.5) * treeR * 0.9;
      var canopy = new THREE.Mesh(
        new THREE.SphereGeometry(clumpR, 8, 6),
        rand() < 0.35 ? canopyLit : canopyDark
      );
      canopy.position.set(wp.x + ox, treeH * 0.78 + oy, wp.z + oz);
      canopy.scale.y = 0.72;
      sohoGroup.add(canopy);
    }
  });
})(180, -55, 44, 40);

// ============================================================
// CHURCHES — spires visible from Centre Point looking west, 1973
// ============================================================
//
// Historically, only two church towers are meaningfully visible from
// this viewpoint: St Patrick's Soho Square (close, rising from the
// square itself) and St Anne's Soho (middle distance, Wardour Street
// area — its distinctive copper-sheathed tower with small spire).
// All Souls Langham Place and St George's Hanover Square sit off the
// Oxford Street axis behind intervening buildings, so they're omitted.
var churchGroup = new THREE.Group();
scene.add(churchGroup);

function addStPatricksSoho(along, side) {
  // Italianate red-brick campanile (1891-93). Multi-stage tower with
  // stone string courses, arched window openings, corner pilasters,
  // a belfry with four open arches, and a stepped pyramid spire.
  // Rising from the east edge of Soho Square, it breaks above the
  // plane-tree canopy.
  var wp = streetLocalToWorld(along, side);
  var g = new THREE.Group();
  g.position.set(wp.x, 0, wp.z);
  g.rotation.y = STREET_ANGLE;

  var brickC   = new THREE.MeshStandardMaterial({ color: 0x6e3d24, roughness: 0.9 });
  var brickD   = new THREE.MeshStandardMaterial({ color: 0x4a2814, roughness: 0.95 });
  var stoneC   = new THREE.MeshStandardMaterial({ color: 0x9a8874, roughness: 0.85 });
  var stoneL   = new THREE.MeshStandardMaterial({ color: 0xb09680, roughness: 0.8 });
  var darkOpen = new THREE.MeshStandardMaterial({ color: 0x120d10, roughness: 0.95 });
  var spireC   = new THREE.MeshStandardMaterial({ color: 0x4a382a, roughness: 0.7, metalness: 0.3 });

  // Tower centred on the group's local (0,0); church body offset behind it.
  var TOWER_Z_OFF = 1.7;
  var towerW = 4.2;

  // --- CHURCH BODY (mostly hidden behind trees, just provides context)
  var body = new THREE.Mesh(new THREE.BoxGeometry(11, 11, 7), brickC);
  body.position.set(0, 5.5, TOWER_Z_OFF - 5.3);
  g.add(body);

  // --- PLINTH (darker brick base course)
  var plinth = new THREE.Mesh(new THREE.BoxGeometry(towerW + 0.6, 1.5, towerW + 0.6), brickD);
  plinth.position.set(0, 0.75, TOWER_Z_OFF);
  g.add(plinth);
  var plinthCap = new THREE.Mesh(new THREE.BoxGeometry(towerW + 0.8, 0.25, towerW + 0.8), stoneC);
  plinthCap.position.set(0, 1.62, TOWER_Z_OFF);
  g.add(plinthCap);

  // --- TOWER SHAFT (three brick stages separated by stone string courses)
  var stages = [
    { h: 6.5, winH: 3.6, winSpread: 0.85 },   // 1st stage (tallest)
    { h: 5.5, winH: 2.8, winSpread: 0.85 },   // 2nd stage
    { h: 5.0, winH: 2.4, winSpread: 0.80 }    // 3rd stage
  ];

  var yCursor = 1.75;
  stages.forEach(function(stage) {
    // Brick block for this stage
    var block = new THREE.Mesh(
      new THREE.BoxGeometry(towerW, stage.h, towerW),
      brickC
    );
    block.position.set(0, yCursor + stage.h/2, TOWER_Z_OFF);
    g.add(block);

    // Corner pilasters — slightly raised darker-brick strips at each corner
    for (var pxi = -1; pxi <= 1; pxi += 2) {
      for (var pzi = -1; pzi <= 1; pzi += 2) {
        var pil = new THREE.Mesh(
          new THREE.BoxGeometry(0.38, stage.h * 0.98, 0.38),
          brickD
        );
        pil.position.set(
          pxi * (towerW/2 - 0.03),
          yCursor + stage.h/2,
          TOWER_Z_OFF + pzi * (towerW/2 - 0.03)
        );
        g.add(pil);
      }
    }

    // Paired arched windows — 2 narrow dark rectangles per face
    var winYCentre = yCursor + stage.h * 0.55;
    [
      { nx: 0, nz: 1 }, { nx: 0, nz: -1 },
      { nx: 1, nz: 0 }, { nx: -1, nz: 0 }
    ].forEach(function(p) {
      for (var wi = -1; wi <= 1; wi += 2) {
        var offX = (p.nz !== 0) ? wi * stage.winSpread : 0;
        var offZ = (p.nx !== 0) ? wi * stage.winSpread : 0;
        var win = new THREE.Mesh(
          new THREE.BoxGeometry(
            p.nz !== 0 ? 0.7 : 0.14,
            stage.winH,
            p.nx !== 0 ? 0.7 : 0.14
          ),
          darkOpen
        );
        win.position.set(
          p.nx * (towerW/2 + 0.05) + offX,
          winYCentre,
          TOWER_Z_OFF + p.nz * (towerW/2 + 0.05) + offZ
        );
        g.add(win);
      }
    });

    // Stone string course at top of stage
    var band = new THREE.Mesh(
      new THREE.BoxGeometry(towerW + 0.35, 0.38, towerW + 0.35),
      stoneC
    );
    band.position.set(0, yCursor + stage.h + 0.19, TOWER_Z_OFF);
    g.add(band);

    yCursor += stage.h + 0.38;
  });

  // --- BELFRY STAGE (stone, with large open arched louvres on all 4 sides)
  var belfryH = 4.0;
  var belfry = new THREE.Mesh(
    new THREE.BoxGeometry(towerW + 0.35, belfryH, towerW + 0.35),
    stoneC
  );
  belfry.position.set(0, yCursor + belfryH/2, TOWER_Z_OFF);
  g.add(belfry);

  // Large belfry arched openings (dark rectangles read as open arches from distance)
  [
    { nx: 0, nz: 1 }, { nx: 0, nz: -1 },
    { nx: 1, nz: 0 }, { nx: -1, nz: 0 }
  ].forEach(function(o) {
    var bo = new THREE.Mesh(
      new THREE.BoxGeometry(
        o.nz !== 0 ? (towerW + 0.35) * 0.62 : 0.14,
        belfryH * 0.75,
        o.nx !== 0 ? (towerW + 0.35) * 0.62 : 0.14
      ),
      darkOpen
    );
    bo.position.set(
      o.nx * ((towerW + 0.35)/2 + 0.03),
      yCursor + belfryH/2 - 0.2,
      TOWER_Z_OFF + o.nz * ((towerW + 0.35)/2 + 0.03)
    );
    g.add(bo);
  });

  yCursor += belfryH;

  // --- DENTIL CORNICE (projecting capping band above the belfry)
  var cornice = new THREE.Mesh(
    new THREE.BoxGeometry(towerW + 0.9, 0.6, towerW + 0.9),
    stoneL
  );
  cornice.position.set(0, yCursor + 0.3, TOWER_Z_OFF);
  g.add(cornice);
  yCursor += 0.6;

  // --- BALUSTRADE BASE for spire pyramid
  var baseBox = new THREE.Mesh(
    new THREE.BoxGeometry(towerW + 0.5, 0.75, towerW + 0.5),
    stoneC
  );
  baseBox.position.set(0, yCursor + 0.38, TOWER_Z_OFF);
  g.add(baseBox);

  // --- CORNER PINNACLES (four small spiky finials at the base of the pyramid)
  for (var px = -1; px <= 1; px += 2) {
    for (var pz = -1; pz <= 1; pz += 2) {
      var pin = new THREE.Mesh(
        new THREE.ConeGeometry(0.28, 1.5, 4),
        stoneC
      );
      pin.rotation.y = Math.PI / 4;
      pin.position.set(
        px * (towerW/2 + 0.18),
        yCursor + 1.1,
        TOWER_Z_OFF + pz * (towerW/2 + 0.18)
      );
      g.add(pin);
    }
  }
  yCursor += 0.75;

  // --- PYRAMID SPIRE (square-based cone, slightly chunkier than a needle)
  var spireH = 6.8;
  var spire = new THREE.Mesh(
    new THREE.ConeGeometry(towerW * 0.70, spireH, 4),
    spireC
  );
  spire.rotation.y = Math.PI / 4;
  spire.position.set(0, yCursor + spireH/2, TOWER_Z_OFF);
  g.add(spire);

  // --- CROSS FINIAL (with proper crossbar)
  var crossMat = new THREE.MeshStandardMaterial({
    color: 0x201410, emissive: 0x3a1e10, emissiveIntensity: 0.3
  });
  var cross = new THREE.Mesh(new THREE.BoxGeometry(0.15, 1.3, 0.15), crossMat);
  cross.position.set(0, yCursor + spireH + 0.65, TOWER_Z_OFF);
  g.add(cross);
  var crossBar = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.15, 0.15), crossMat);
  crossBar.position.set(0, yCursor + spireH + 0.55, TOWER_Z_OFF);
  g.add(crossBar);

  churchGroup.add(g);
  return g;
}

function addStAnnesSoho(along, side) {
  // Cockerell's 1803 tower: stone base with quoins and clock stage,
  // copper-clad barrel drum with louvres, small dome and spire.
  // Survived the WWII bombing that destroyed the church body.
  var wp = streetLocalToWorld(along, side);
  var g = new THREE.Group();
  g.position.set(wp.x, 0, wp.z);
  g.rotation.y = STREET_ANGLE;

  var stoneC  = new THREE.MeshStandardMaterial({ color: 0x7c6a58, roughness: 0.9 });
  var stoneL  = new THREE.MeshStandardMaterial({ color: 0x968878, roughness: 0.85 });
  var stoneD  = new THREE.MeshStandardMaterial({ color: 0x5a4a3c, roughness: 0.95 });
  // Weathered copper (verdigris) — slight emissive to catch dawn light through fog
  var copperC = new THREE.MeshStandardMaterial({
    color: 0x3d5a46, roughness: 0.55, metalness: 0.45,
    emissive: 0x1a2a20, emissiveIntensity: 0.2
  });
  // Darker copper for shadow lines (louvres, seams)
  var copperD = new THREE.MeshStandardMaterial({
    color: 0x1f2e26, roughness: 0.75, metalness: 0.35
  });
  var clockFaceMat = new THREE.MeshStandardMaterial({
    color: 0xc8b890, roughness: 0.8,
    emissive: 0x4a3a24, emissiveIntensity: 0.25
  });

  // --- PLINTH (broad, lower, darker stone)
  var plinth = new THREE.Mesh(new THREE.BoxGeometry(6.0, 2.8, 6.0), stoneD);
  plinth.position.set(0, 1.4, 0);
  g.add(plinth);
  // Plinth cornice (slightly wider capping band)
  var plinthCap = new THREE.Mesh(new THREE.BoxGeometry(6.3, 0.4, 6.3), stoneC);
  plinthCap.position.set(0, 3.0, 0);
  g.add(plinthCap);

  // --- MAIN TOWER SHAFT (stone, with quoins suggested by edge bars)
  var tower = new THREE.Mesh(new THREE.BoxGeometry(5.2, 12.5, 5.2), stoneC);
  tower.position.set(0, 9.5, 0);
  g.add(tower);

  // Quoins — raised corner stones. Thin dark bars at each vertical edge
  // read as chunky stone blocks at a distance.
  var quoinMat = stoneL;
  for (var qx = -1; qx <= 1; qx += 2) {
    for (var qz = -1; qz <= 1; qz += 2) {
      var quoin = new THREE.Mesh(
        new THREE.BoxGeometry(0.45, 12.5, 0.45),
        quoinMat
      );
      quoin.position.set(qx * 2.60, 9.5, qz * 2.60);
      g.add(quoin);
    }
  }

  // Mid-tower string course (horizontal band halfway up)
  var midBand = new THREE.Mesh(new THREE.BoxGeometry(5.4, 0.35, 5.4), stoneL);
  midBand.position.set(0, 9.0, 0);
  g.add(midBand);

  // Cornice above main shaft
  var shaftCap = new THREE.Mesh(new THREE.BoxGeometry(5.6, 0.45, 5.6), stoneL);
  shaftCap.position.set(0, 15.95, 0);
  g.add(shaftCap);

  // --- CLOCK STAGE (the grand upper stone storey)
  var clockStage = new THREE.Mesh(new THREE.BoxGeometry(5.3, 4.4, 5.3), stoneC);
  clockStage.position.set(0, 18.38, 0);
  g.add(clockStage);

  // Clock faces — one on each side of the clock stage
  var clockR = 1.4;
  var clockFaceGeo = new THREE.CircleGeometry(clockR, 24);
  // Face on +Z side
  var clockN = new THREE.Mesh(clockFaceGeo, clockFaceMat);
  clockN.position.set(0, 18.4, 2.66);
  g.add(clockN);
  // Face on -Z side
  var clockS = new THREE.Mesh(clockFaceGeo, clockFaceMat);
  clockS.rotation.y = Math.PI;
  clockS.position.set(0, 18.4, -2.66);
  g.add(clockS);
  // Face on +X side
  var clockE = new THREE.Mesh(clockFaceGeo, clockFaceMat);
  clockE.rotation.y = Math.PI / 2;
  clockE.position.set(2.66, 18.4, 0);
  g.add(clockE);
  // Face on -X side
  var clockW = new THREE.Mesh(clockFaceGeo, clockFaceMat);
  clockW.rotation.y = -Math.PI / 2;
  clockW.position.set(-2.66, 18.4, 0);
  g.add(clockW);

  // Clock surround ring (dark narrow torus around each face for definition)
  function addClockRing(px, py, pz, ry) {
    var ring = new THREE.Mesh(
      new THREE.TorusGeometry(clockR + 0.1, 0.08, 6, 24),
      stoneD
    );
    ring.rotation.x = Math.PI / 2;
    ring.rotation.y = ry;
    ring.position.set(px, py, pz);
    g.add(ring);
  }
  addClockRing(0, 18.4, 2.69, 0);
  addClockRing(0, 18.4, -2.69, 0);
  addClockRing(2.69, 18.4, 0, Math.PI / 2);
  addClockRing(-2.69, 18.4, 0, Math.PI / 2);

  // --- BALUSTRADE (open parapet with pedestals at corners)
  var balCap = new THREE.Mesh(new THREE.BoxGeometry(5.6, 0.4, 5.6), stoneL);
  balCap.position.set(0, 20.78, 0);
  g.add(balCap);

  // Urn finials at the four corners of the balustrade — read as small bumps
  function addUrn(ux, uz) {
    var urnBase = new THREE.Mesh(
      new THREE.BoxGeometry(0.55, 0.5, 0.55),
      stoneL
    );
    urnBase.position.set(ux, 21.25, uz);
    g.add(urnBase);
    var urn = new THREE.Mesh(
      new THREE.SphereGeometry(0.4, 10, 8),
      stoneL
    );
    urn.position.set(ux, 21.9, uz);
    g.add(urn);
  }
  addUrn(2.55, 2.55);
  addUrn(-2.55, 2.55);
  addUrn(2.55, -2.55);
  addUrn(-2.55, -2.55);

  // --- COPPER DRUM (Cockerell's signature barrel section)
  var drumH = 5.0;
  var drumY = 23.5;
  var drum = new THREE.Mesh(
    new THREE.CylinderGeometry(3.0, 3.0, drumH, 24),
    copperC
  );
  drum.position.set(0, drumY, 0);
  g.add(drum);

  // Louvres — vertical dark bars around the drum (read as pilasters/louvres)
  for (var lv = 0; lv < 8; lv++) {
    var lva = (lv / 8) * Math.PI * 2;
    var louvre = new THREE.Mesh(
      new THREE.BoxGeometry(0.18, drumH * 0.8, 0.22),
      copperD
    );
    louvre.position.set(Math.cos(lva) * 3.05, drumY, Math.sin(lva) * 3.05);
    louvre.rotation.y = -lva;
    g.add(louvre);
  }
  // Horizontal seam bands (top and bottom of drum)
  var drumTopBand = new THREE.Mesh(
    new THREE.TorusGeometry(3.05, 0.12, 6, 24),
    copperD
  );
  drumTopBand.rotation.x = Math.PI / 2;
  drumTopBand.position.y = drumY + drumH/2 - 0.2;
  g.add(drumTopBand);
  var drumBotBand = new THREE.Mesh(
    new THREE.TorusGeometry(3.05, 0.12, 6, 24),
    copperD
  );
  drumBotBand.rotation.x = Math.PI / 2;
  drumBotBand.position.y = drumY - drumH/2 + 0.2;
  g.add(drumBotBand);

  // --- DOMED CAP (hemispherical)
  var dome = new THREE.Mesh(
    new THREE.SphereGeometry(2.7, 20, 14, 0, Math.PI * 2, 0, Math.PI / 2),
    copperC
  );
  dome.position.set(0, drumY + drumH/2, 0);
  g.add(dome);

  // --- LANTERN (small narrower stage between dome and spire)
  var lantern = new THREE.Mesh(
    new THREE.CylinderGeometry(0.85, 0.95, 1.4, 14),
    copperC
  );
  lantern.position.set(0, drumY + drumH/2 + 2.5, 0);
  g.add(lantern);
  // Thin cap on lantern
  var lantCap = new THREE.Mesh(
    new THREE.CylinderGeometry(0.6, 0.85, 0.35, 14),
    copperD
  );
  lantCap.position.set(0, drumY + drumH/2 + 3.4, 0);
  g.add(lantCap);

  // --- NEEDLE SPIRE on top of lantern
  var spire = new THREE.Mesh(
    new THREE.ConeGeometry(0.5, 4.6, 10),
    copperC
  );
  spire.position.set(0, drumY + drumH/2 + 5.9, 0);
  g.add(spire);

  // Ball finial below cross
  var ball = new THREE.Mesh(
    new THREE.SphereGeometry(0.22, 10, 8),
    copperD
  );
  ball.position.set(0, drumY + drumH/2 + 8.3, 0);
  g.add(ball);

  // Cross finial
  var cross = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 1.0, 0.1),
    new THREE.MeshStandardMaterial({ color: 0x1a100a })
  );
  cross.position.set(0, drumY + drumH/2 + 9.0, 0);
  g.add(cross);
  // Cross bar
  var crossBar = new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 0.1, 0.1),
    new THREE.MeshStandardMaterial({ color: 0x1a100a })
  );
  crossBar.position.set(0, drumY + drumH/2 + 9.0, 0);
  g.add(crossBar);

  churchGroup.add(g);
  return g;
}

// POST OFFICE TOWER (BT Tower from 1984) — 1973 configuration
// ============================================================
//
// Proportion-accurate remodel based on reference image:
// - Very tall narrow concrete shaft dominates (~75% of total height)
// - Microwave-dish platform rings only on the upper half of the shaft
// - Glazed restaurant pod ~85% height, wider than shaft
// - Above pod: stacked concrete collars, a dark sign panel (no BT logo in 1973),
//   narrower neck, and a lattice cap

//
var btTower = new THREE.Group();
// Post Office Tower sits in Fitzrovia, north-west of Centre Point —
// past Soho Square and set back to the right of frame. Coordinates
// here must match isBTTowerZone() above.

// Shared materials

});

});
// Darker concrete for the upper sign-panel section

});

                                      // to suit the further-away placement)

// LATTICE DISH PLATFORMS — only on the UPPER half of the shaft
// Real Post Office Tower has them clustered ~65-80% height
function addLatticeRing(centreY, radius, dishCount, dishSize) {
  // Main platform ring
  var ring = new THREE.Mesh(
    new THREE.TorusGeometry(radius, 0.12, 6, 32),
    latticeMat
  );
  ring.rotation.x = Math.PI / 2;
  ring.position.y = centreY;
  btTower.add(ring);
  // Lower ring
  var ring2 = new THREE.Mesh(
    new THREE.TorusGeometry(radius - 0.1, 0.08, 6, 32),
    latticeMat
  );
  ring2.rotation.x = Math.PI / 2;
  ring2.position.y = centreY - 1.1;
  btTower.add(ring2);
  // Lattice struts between them
  for (var ls = 0; ls < 16; ls++) {
    var la = (ls / 16) * Math.PI * 2;
    var strut = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 1.15, 0.06),
      latticeMat
    );
    strut.position.set(Math.cos(la)*radius, centreY - 0.55, Math.sin(la)*radius);
    btTower.add(strut);
  }
  // Microwave dishes
  for (var di = 0; di < dishCount; di++) {
    var da = (di / dishCount) * Math.PI * 2 + 0.05;
    var dx = Math.cos(da) * (radius + dishSize * 0.45);
    var dz = Math.sin(da) * (radius + dishSize * 0.45);
    var dish = new THREE.Mesh(
      new THREE.CylinderGeometry(dishSize * 0.95, dishSize, 0.18, 16, 1, true),
      dishMat
    );
    dish.rotation.x = Math.PI / 2;
    dish.rotation.z = -da + Math.PI / 2;
    dish.position.set(dx, centreY - 0.1, dz);
    btTower.add(dish);
    // Dish hood (cover)
    var hood = new THREE.Mesh(
      new THREE.CylinderGeometry(dishSize * 0.7, dishSize * 0.95, 0.35, 16),
      latticeMat
    );
    hood.rotation.x = Math.PI / 2;
    hood.rotation.z = -da + Math.PI / 2;
    hood.position.set(
      Math.cos(da) * (radius + dishSize * 0.15),
      centreY - 0.1,
      Math.sin(da) * (radius + dishSize * 0.15)
    );
    btTower.add(hood);
  }
}
