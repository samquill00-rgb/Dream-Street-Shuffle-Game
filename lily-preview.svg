<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100" width="80" height="100">
  <!-- Lily of the Valley - based on user's ASCII art -->
  <!-- Stem -->
  <path d="M40 95 C40 75, 35 60, 30 50 C25 40, 28 30, 35 20 C38 15, 40 10, 40 5"
        fill="none" stroke="#6a8a6a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M30 50 C20 45, 10 50, 8 58 C6 66, 12 72, 22 68 C28 65, 30 58, 30 50"
        fill="#4a6a4a" opacity="0.6"/>
  <path d="M30 50 C22 54, 14 58, 10 62" fill="none" stroke="#5a7a5a" stroke-width="0.5" opacity="0.4"/>

  <!-- Right leaf -->
  <path d="M35 42 C42 35, 55 33, 62 38 C69 43, 65 52, 55 52 C48 52, 40 48, 35 42"
        fill="#4a6a4a" opacity="0.5"/>
  <path d="M35 42 C45 40, 55 40, 60 42" fill="none" stroke="#5a7a5a" stroke-width="0.5" opacity="0.4"/>

  <!-- Bell flower 1 (top) -->
  <path d="M35 20 C32 18, 25 20, 22 24"
        fill="none" stroke="#6a8a6a" stroke-width="1" stroke-linecap="round"/>
  <ellipse cx="20" cy="27" rx="6" ry="8" fill="none" stroke="#d4b8e0" stroke-width="1.2" opacity="0.8"
           transform="rotate(-10, 20, 27)"/>
  <path d="M15 32 C17 36, 23 36, 25 32" fill="none" stroke="#d4b8e0" stroke-width="0.8" opacity="0.6"/>
  <!-- Petal scallops -->
  <circle cx="16" cy="34" r="1.5" fill="#d4b8e0" opacity="0.5"/>
  <circle cx="20" cy="35.5" r="1.5" fill="#d4b8e0" opacity="0.5"/>
  <circle cx="24" cy="34" r="1.5" fill="#d4b8e0" opacity="0.5"/>

  <!-- Bell flower 2 (middle) -->
  <path d="M32 30 C28 29, 22 32, 18 36"
        fill="none" stroke="#6a8a6a" stroke-width="1" stroke-linecap="round"/>
  <ellipse cx="16" cy="40" rx="7" ry="9" fill="none" stroke="#d4b8e0" stroke-width="1.2" opacity="0.7"
           transform="rotate(-5, 16, 40)"/>
  <path d="M10 46 C13 50, 19 50, 22 46" fill="none" stroke="#d4b8e0" stroke-width="0.8" opacity="0.5"/>
  <circle cx="11.5" cy="48" r="1.8" fill="#d4b8e0" opacity="0.4"/>
  <circle cx="16" cy="49.5" r="1.8" fill="#d4b8e0" opacity="0.4"/>
  <circle cx="20.5" cy="48" r="1.8" fill="#d4b8e0" opacity="0.4"/>

  <!-- Bell flower 3 (lower) -->
  <path d="M30 45 C26 45, 20 48, 16 52"
        fill="none" stroke="#6a8a6a" stroke-width="1" stroke-linecap="round"/>
  <ellipse cx="14" cy="56" rx="7" ry="8" fill="none" stroke="#d4b8e0" stroke-width="1.2" opacity="0.6"
           transform="rotate(5, 14, 56)"/>
  <path d="M8 61 C11 65, 17 65, 20 61" fill="none" stroke="#d4b8e0" stroke-width="0.8" opacity="0.4"/>
  <circle cx="10" cy="63" r="1.8" fill="#d4b8e0" opacity="0.35"/>
  <circle cx="14" cy="64.5" r="1.8" fill="#d4b8e0" opacity="0.35"/>
  <circle cx="18" cy="63" r="1.8" fill="#d4b8e0" opacity="0.35"/>
</svg>
