<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Green Sea — Carthage Coast, Tunisia</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
#datestamp {
  position: absolute; top: 18px; right: 24px;
  font: 14px monospace; color: rgba(255,140,50,0.55);
  pointer-events: none;
}
#location {
  position: absolute; bottom: 18px; left: 50%;
  transform: translateX(-50%);
  font: 12px 'Courier New', monospace; color: rgba(80,60,40,0.5);
  letter-spacing: 2px; pointer-events: none;
}
</style>
</head>
<body>
<div id="datestamp">23.11.73</div>
<div id="location">CARTHAGE COAST, TUNISIA</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// SCENE SETUP — bright Mediterranean daylight
// ============================================================
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0xc8d8e8, 30, 80);

var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 3.0, 14);
camera.lookAt(0, 3.0, 0);

var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping || THREE.LinearToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// MATERIALS — worn, sandy, sun-bleached
// ============================================================
var sandWall = new THREE.MeshStandardMaterial({ color: 0xc8b890, roughness: 0.95 });
var cream = new THREE.MeshStandardMaterial({ color: 0xd8ccb0, roughness: 0.92 });
var blueDoor = new THREE.MeshStandardMaterial({ color: 0x3a8ab0, roughness: 0.7, metalness: 0.1 });
var blueDoorDark = new THREE.MeshStandardMaterial({ color: 0x2a6a88, roughness: 0.75, metalness: 0.15 });
var blueDoorLight = new THREE.MeshStandardMaterial({ color: 0x5599bb, roughness: 0.65, metalness: 0.08 });
var blueIron = new THREE.MeshStandardMaterial({ color: 0x4488aa, roughness: 0.6, metalness: 0.25 });
var whiteTile = new THREE.MeshStandardMaterial({ color: 0xe0d8c8, roughness: 0.75 });
var blueTile = new THREE.MeshStandardMaterial({ color: 0x2a5588, roughness: 0.7 });
var sandGround = new THREE.MeshStandardMaterial({ color: 0xb89868, roughness: 0.96 });

// ============================================================
// HELPERS
// ============================================================
function makeCanvasTexture(w, h, drawFunc) {
  var c = document.createElement('canvas');
  c.width = w; c.height = h;
  var cx = c.getContext('2d');
  drawFunc(cx, w, h);
  var tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  return tex;
}

function placeMesh(group, geo, mat, x, y, z) {
  var m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  group.add(m);
  return m;
}

// ============================================================
// GROUND — dusty North African street
// ============================================================
var ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), sandGround);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Sand texture overlay
var sandOverlayTex = makeCanvasTexture(256, 256, function(cx, w, h) {
  cx.fillStyle = 'rgba(180, 150, 100, 0.1)';
  cx.fillRect(0, 0, w, h);
  for (var i = 0; i < 500; i++) {
    var g = 140 + Math.random() * 80;
    cx.fillStyle = 'rgba(' + g + ',' + (g - 20) + ',' + (g - 50) + ', 0.06)';
    cx.beginPath();
    cx.arc(Math.random() * w, Math.random() * h, 1 + Math.random() * 4, 0, Math.PI * 2);
    cx.fill();
  }
});

// ============================================================
// THE GREEN SEA BAR — MAIN BUILDING (human scale)
// ============================================================
var bar = new THREE.Group();

// ---- MAIN WALL ----
var mainWall = new THREE.Mesh(new THREE.BoxGeometry(12, 8, 5), sandWall);
mainWall.position.set(0, 4, -2.5);
bar.add(mainWall);

// Facade face — heavily weathered plaster texture (HIGH CONTRAST)
var facadeTex = makeCanvasTexture(1024, 1024, function(cx, w, h) {
  // Base plaster — uneven tone
  cx.fillStyle = '#c8b898';
  cx.fillRect(0, 0, w, h);
  // Large tonal variation (different plaster ages) — BOLD
  for (var i = 0; i < 20; i++) {
    var px = Math.random() * w;
    var py = Math.random() * h;
    var pw = 80 + Math.random() * 350;
    var ph = 60 + Math.random() * 250;
    var pg = 160 + Math.random() * 50;
    cx.fillStyle = 'rgba(' + pg + ',' + (pg - 15) + ',' + (pg - 40) + ', 0.25)';
    cx.fillRect(px, py, pw, ph);
  }
  // Weathering stains — MUCH stronger
  for (var i = 0; i < 60; i++) {
    var sx = Math.random() * w;
    var sy = Math.random() * h;
    var sr = 15 + Math.random() * 70;
    var grad = cx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    var tone = Math.random() < 0.4 ? 'rgba(130,110,75,' : (Math.random() < 0.5 ? 'rgba(155,135,100,' : 'rgba(105,88,58,');
    grad.addColorStop(0, tone + (0.15 + Math.random() * 0.2) + ')');
    grad.addColorStop(1, tone + '0)');
    cx.fillStyle = grad;
    cx.fillRect(sx - sr, sy - sr, sr * 2, sr * 2);
  }
  // Rising damp — STRONG dark band at bottom
  var dampGrad = cx.createLinearGradient(0, h * 0.6, 0, h);
  dampGrad.addColorStop(0, 'rgba(100, 85, 55, 0)');
  dampGrad.addColorStop(0.5, 'rgba(100, 85, 55, 0.15)');
  dampGrad.addColorStop(1, 'rgba(85, 70, 45, 0.35)');
  cx.fillStyle = dampGrad;
  cx.fillRect(0, h * 0.6, w, h * 0.4);
  // Damp blotches at base — DARKER
  for (var i = 0; i < 30; i++) {
    cx.fillStyle = 'rgba(90, 75, 45, ' + (0.1 + Math.random() * 0.15) + ')';
    cx.fillRect(Math.random() * w, h - Math.random() * 150, 20 + Math.random() * 80, Math.random() * 150);
  }
  // Water run stains (vertical streaks) — VISIBLE
  for (var vi = 0; vi < 18; vi++) {
    cx.strokeStyle = 'rgba(95, 80, 50, ' + (0.08 + Math.random() * 0.1) + ')';
    cx.lineWidth = 3 + Math.random() * 8;
    cx.beginPath();
    var vx = Math.random() * w;
    cx.moveTo(vx, Math.random() * h * 0.3);
    cx.lineTo(vx + (Math.random() - 0.5) * 20, h);
    cx.stroke();
  }
  // Cracks — THICK and dark
  for (var ci = 0; ci < 30; ci++) {
    cx.strokeStyle = 'rgba(80, 65, 40, ' + (0.12 + Math.random() * 0.12) + ')';
    cx.lineWidth = 1 + Math.random() * 2.5;
    cx.beginPath();
    var crx = Math.random() * w;
    var cry = Math.random() * h;
    cx.moveTo(crx, cry);
    for (var j = 0; j < 7; j++) {
      crx += (Math.random() - 0.5) * 40;
      cry += Math.random() * 30;
      cx.lineTo(crx, cry);
    }
    cx.stroke();
  }
  // Exposed patches where plaster has fallen off — LARGE and obvious
  for (var ei = 0; ei < 10; ei++) {
    var ex = Math.random() * w;
    var ey = h * 0.3 + Math.random() * h * 0.6;
    var ew = 30 + Math.random() * 80;
    var eh = 20 + Math.random() * 50;
    cx.fillStyle = 'rgba(140, 100, 55, 0.35)';
    cx.fillRect(ex, ey, ew, eh);
    // Brick lines inside — visible
    for (var bk = 0; bk < 6; bk++) {
      cx.fillStyle = 'rgba(125, 85, 45, 0.25)';
      cx.fillRect(ex + 2, ey + bk * 8 + 2, ew - 4, 5);
      cx.strokeStyle = 'rgba(90, 60, 30, 0.15)';
      cx.lineWidth = 0.5;
      cx.strokeRect(ex + 2, ey + bk * 8 + 2, ew - 4, 5);
    }
  }
  // Ochre/yellow stain patches (mineral deposits)
  for (var oi = 0; oi < 8; oi++) {
    var ox = Math.random() * w;
    var oy = Math.random() * h;
    var or2 = 20 + Math.random() * 50;
    var ograd = cx.createRadialGradient(ox, oy, 0, ox, oy, or2);
    ograd.addColorStop(0, 'rgba(180, 150, 60, 0.12)');
    ograd.addColorStop(1, 'rgba(180, 150, 60, 0)');
    cx.fillStyle = ograd;
    cx.fillRect(ox - or2, oy - or2, or2 * 2, or2 * 2);
  }
  // Sand/grit speckle overlay — bigger dots
  for (var gi = 0; gi < 500; gi++) {
    var gg = 140 + Math.random() * 70;
    cx.fillStyle = 'rgba(' + gg + ',' + (gg - 15) + ',' + (gg - 45) + ', 0.08)';
    cx.beginPath();
    cx.arc(Math.random() * w, Math.random() * h, 1 + Math.random() * 3, 0, Math.PI * 2);
    cx.fill();
  }
});
var facadeFace = new THREE.Mesh(new THREE.PlaneGeometry(12, 8),
  new THREE.MeshStandardMaterial({ map: facadeTex, roughness: 0.94 }));
facadeFace.position.set(0, 4, 0.02);
bar.add(facadeFace);

// ---- ROOFTOP BALUSTRADE ----
var balustradeMat = new THREE.MeshStandardMaterial({ color: 0xd0c4a0, roughness: 0.88 });
placeMesh(bar, new THREE.BoxGeometry(12.5, 0.2, 0.3), balustradeMat, 0, 8.1, 0.1);
placeMesh(bar, new THREE.BoxGeometry(12.5, 0.15, 0.25), balustradeMat, 0, 9.3, 0.1);
for (var bi = -5.5; bi <= 5.5; bi += 0.55) {
  var baluster = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.0, 6), balustradeMat);
  baluster.position.set(bi, 8.7, 0.1);
  bar.add(baluster);
}

// ---- THE ORNATE BLUE DOORS (properly sized ~2.8m tall) ----
// Door recess
var doorW = 3.2;
var doorH = 3.2;
var doorBottom = 0.4;
var doorCentre = 0;
placeMesh(bar, new THREE.BoxGeometry(doorW + 0.4, doorH + 0.2, 0.3),
  new THREE.MeshStandardMaterial({ color: 0x1a3355, roughness: 0.85 }),
  doorCentre, doorBottom + doorH / 2, -0.1);

// Left door panel
var leftDoor = new THREE.Mesh(new THREE.BoxGeometry(doorW / 2, doorH, 0.1), blueDoor);
leftDoor.position.set(doorCentre - doorW / 4, doorBottom + doorH / 2, 0.08);
bar.add(leftDoor);

// Right door panel
var rightDoor = new THREE.Mesh(new THREE.BoxGeometry(doorW / 2, doorH, 0.1), blueDoor);
rightDoor.position.set(doorCentre + doorW / 4, doorBottom + doorH / 2, 0.08);
bar.add(rightDoor);

// Door frame
placeMesh(bar, new THREE.BoxGeometry(0.15, doorH + 0.15, 0.12), blueDoorDark, doorCentre - doorW / 2 - 0.08, doorBottom + doorH / 2, 0.06);
placeMesh(bar, new THREE.BoxGeometry(0.15, doorH + 0.15, 0.12), blueDoorDark, doorCentre + doorW / 2 + 0.08, doorBottom + doorH / 2, 0.06);
placeMesh(bar, new THREE.BoxGeometry(doorW + 0.3, 0.15, 0.12), blueDoorDark, doorCentre, doorBottom + doorH + 0.08, 0.06);
// Centre divider
placeMesh(bar, new THREE.BoxGeometry(0.1, doorH, 0.12), blueDoorDark, doorCentre, doorBottom + doorH / 2, 0.1);

// ---- Circular medallion patterns on doors ----
function addMedallion(cx, cy, radius) {
  var ringGeo = new THREE.RingGeometry(radius * 0.7, radius, 24);
  var ring = new THREE.Mesh(ringGeo, new THREE.MeshStandardMaterial({
    color: 0x6aaccc, roughness: 0.6, metalness: 0.15, side: THREE.DoubleSide
  }));
  ring.position.set(cx, cy, 0.16);
  bar.add(ring);
  var dot = new THREE.Mesh(new THREE.CircleGeometry(radius * 0.25, 16),
    new THREE.MeshStandardMaterial({ color: 0x5599bb, side: THREE.DoubleSide }));
  dot.position.set(cx, cy, 0.17);
  bar.add(dot);
  for (var si = 0; si < 8; si++) {
    var angle = (si / 8) * Math.PI * 2;
    var spoke = new THREE.Mesh(new THREE.BoxGeometry(radius * 1.4, 0.025, 0.02), blueDoorLight);
    spoke.position.set(cx, cy, 0.16);
    spoke.rotation.z = angle;
    bar.add(spoke);
  }
}

// Medallions on doors (2 per door, scaled to door size)
var dMidY = doorBottom + doorH / 2;
addMedallion(doorCentre - doorW / 4, dMidY + 0.6, 0.35);
addMedallion(doorCentre - doorW / 4, dMidY - 0.6, 0.35);
addMedallion(doorCentre + doorW / 4, dMidY + 0.6, 0.35);
addMedallion(doorCentre + doorW / 4, dMidY - 0.6, 0.35);
// Small medallions
addMedallion(doorCentre - doorW / 4, dMidY, 0.15);
addMedallion(doorCentre + doorW / 4, dMidY, 0.15);

// Door studs
var studMat = new THREE.MeshStandardMaterial({ color: 0xd0c8b0, roughness: 0.55, metalness: 0.25 });
for (var sCol = 0; sCol < 2; sCol++) {
  var sx = doorCentre + (sCol === 0 ? -doorW / 4 : doorW / 4);
  for (var sRow = 0; sRow < 5; sRow++) {
    var sy = doorBottom + 0.4 + sRow * (doorH - 0.8) / 4;
    // Left/right edge studs
    var stud1 = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), studMat);
    stud1.position.set(sx - doorW / 4 + 0.1, sy, 0.16);
    bar.add(stud1);
    var stud2 = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), studMat);
    stud2.position.set(sx + doorW / 4 - 0.1, sy, 0.16);
    bar.add(stud2);
  }
}

// ---- Geometric X-brace panels at bottom of doors ----
function addDoorPanel(cx, cy, w, h) {
  placeMesh(bar, new THREE.BoxGeometry(w, 0.03, 0.03), blueDoorDark, cx, cy + h / 2, 0.14);
  placeMesh(bar, new THREE.BoxGeometry(w, 0.03, 0.03), blueDoorDark, cx, cy - h / 2, 0.14);
  placeMesh(bar, new THREE.BoxGeometry(0.03, h, 0.03), blueDoorDark, cx - w / 2, cy, 0.14);
  placeMesh(bar, new THREE.BoxGeometry(0.03, h, 0.03), blueDoorDark, cx + w / 2, cy, 0.14);
  var diagLen = Math.sqrt(w * w + h * h);
  var d1 = new THREE.Mesh(new THREE.BoxGeometry(0.025, diagLen * 0.9, 0.025), blueDoorDark);
  d1.position.set(cx, cy, 0.14); d1.rotation.z = Math.atan2(w, h); bar.add(d1);
  var d2 = new THREE.Mesh(new THREE.BoxGeometry(0.025, diagLen * 0.9, 0.025), blueDoorDark);
  d2.position.set(cx, cy, 0.14); d2.rotation.z = -Math.atan2(w, h); bar.add(d2);
}
addDoorPanel(doorCentre - doorW / 4, doorBottom + 0.45, 0.5, 0.5);
addDoorPanel(doorCentre + doorW / 4, doorBottom + 0.45, 0.5, 0.5);

// ---- TILE BORDER around doors ----
for (var ty = doorBottom; ty <= doorBottom + doorH; ty += 0.25) {
  var tMat2 = (Math.floor(ty / 0.25) % 2 === 0) ? whiteTile : blueTile;
  placeMesh(bar, new THREE.BoxGeometry(0.22, 0.22, 0.05), tMat2, doorCentre - doorW / 2 - 0.3, ty, 0.04);
  placeMesh(bar, new THREE.BoxGeometry(0.22, 0.22, 0.05), tMat2, doorCentre + doorW / 2 + 0.3, ty, 0.04);
}
// Top tile strip above door
for (var tx2 = doorCentre - doorW / 2 - 0.3; tx2 <= doorCentre + doorW / 2 + 0.3; tx2 += 0.25) {
  var tMat3 = (Math.floor((tx2 + 3) / 0.25) % 2 === 0) ? blueTile : whiteTile;
  placeMesh(bar, new THREE.BoxGeometry(0.22, 0.22, 0.05), tMat3, tx2, doorBottom + doorH + 0.3, 0.04);
}

// ---- SIGN ABOVE DOORS ----
var signTex = makeCanvasTexture(512, 80, function(cx, w, h) {
  // Worn wooden sign
  cx.fillStyle = '#3a6a55';
  cx.fillRect(0, 0, w, h);
  // Weathering
  for (var i = 0; i < 30; i++) {
    cx.fillStyle = 'rgba(50,90,70,' + (0.05 + Math.random() * 0.1) + ')';
    cx.fillRect(Math.random() * w, 0, 20 + Math.random() * 40, h);
  }
  cx.fillStyle = '#e8dcc0';
  cx.font = 'bold 40px Georgia, serif';
  cx.textAlign = 'center';
  cx.fillText('THE GREEN SEA', w / 2, 52);
  // Faded effect
  cx.fillStyle = 'rgba(58, 106, 85, 0.15)';
  cx.fillRect(0, 0, w, h);
});
var signBoard = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.6, 0.08),
  new THREE.MeshBasicMaterial({ map: signTex }));
signBoard.position.set(doorCentre, doorBottom + doorH + 0.8, 0.08);
bar.add(signBoard);

// ---- WINDOWS flanking the door ----
function addWindow(wx, wy, ww, wh, hasShutter) {
  // Dark opening
  placeMesh(bar, new THREE.BoxGeometry(ww, wh, 0.1),
    new THREE.MeshStandardMaterial({ color: 0x0a0a1a, roughness: 0.8 }), wx, wy, -0.03);
  // Blue iron grille
  placeMesh(bar, new THREE.BoxGeometry(0.06, wh + 0.1, 0.08), blueIron, wx - ww / 2, wy, 0.04);
  placeMesh(bar, new THREE.BoxGeometry(0.06, wh + 0.1, 0.08), blueIron, wx + ww / 2, wy, 0.04);
  placeMesh(bar, new THREE.BoxGeometry(ww + 0.12, 0.06, 0.08), blueIron, wx, wy + wh / 2, 0.04);
  placeMesh(bar, new THREE.BoxGeometry(ww + 0.12, 0.06, 0.08), blueIron, wx, wy - wh / 2, 0.04);
  // Cross bars
  placeMesh(bar, new THREE.BoxGeometry(0.04, wh, 0.05), blueIron, wx, wy, 0.06);
  placeMesh(bar, new THREE.BoxGeometry(ww, 0.04, 0.05), blueIron, wx, wy, 0.06);
  if (hasShutter) {
    // Wooden shutter (one side open)
    var shutMat = new THREE.MeshStandardMaterial({ color: 0x3a7a95, roughness: 0.8 });
    var shut = new THREE.Mesh(new THREE.BoxGeometry(ww / 2 + 0.05, wh + 0.05, 0.04), shutMat);
    shut.position.set(wx + ww / 2 + ww / 4 + 0.05, wy, 0.08);
    bar.add(shut);
  }
}

// Ground floor windows (flanking the door)
addWindow(-3.0, 2.0, 1.0, 1.2, true);
addWindow(3.0, 2.0, 1.0, 1.2, true);

// Upper floor windows
addWindow(-3.0, 5.5, 0.9, 1.1, true);
addWindow(-1.0, 5.5, 0.9, 1.1, false);
addWindow(1.0, 5.5, 0.9, 1.1, false);
addWindow(3.0, 5.5, 0.9, 1.1, true);

// Small round window high up
var ovalWin = new THREE.Mesh(new THREE.RingGeometry(0.25, 0.35, 16),
  new THREE.MeshStandardMaterial({ color: 0x4488aa, roughness: 0.6, side: THREE.DoubleSide }));
ovalWin.position.set(0, 7.0, 0.04);
bar.add(ovalWin);
placeMesh(bar, new THREE.CircleGeometry(0.25, 16),
  new THREE.MeshStandardMaterial({ color: 0x0a0a1a, side: THREE.DoubleSide }), 0, 7.0, 0.03);

// ---- DECORATIVE TILE PANELS ----
function makeTilePanel(subject) {
  return makeCanvasTexture(128, 128, function(cx, w, h) {
    cx.fillStyle = '#e8e0d0';
    cx.fillRect(0, 0, w, h);
    cx.strokeStyle = '#2a5588';
    cx.lineWidth = 5;
    cx.strokeRect(4, 4, w - 8, h - 8);
    cx.lineWidth = 1.5;
    cx.strokeRect(10, 10, w - 20, h - 20);
    // Weathered wash
    cx.fillStyle = 'rgba(200, 185, 155, 0.15)';
    cx.fillRect(0, 0, w, h);
    if (subject === 'camel') {
      cx.fillStyle = '#b08050';
      cx.fillRect(38, 55, 48, 28);
      cx.beginPath(); cx.arc(76, 48, 10, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#d0a070';
      cx.fillRect(28, 82, 72, 6);
      cx.fillStyle = '#3a7a44';
      cx.beginPath(); cx.arc(28, 52, 12, 0, Math.PI * 2); cx.fill();
    } else if (subject === 'boat') {
      cx.fillStyle = '#4a88aa';
      cx.fillRect(22, 68, 84, 16);
      cx.fillStyle = '#7a4520';
      cx.beginPath();
      cx.moveTo(38, 62); cx.lineTo(90, 62); cx.lineTo(82, 48); cx.lineTo(48, 48);
      cx.closePath(); cx.fill();
      cx.fillStyle = '#e8e0d0';
      cx.fillRect(62, 32, 3, 30);
      cx.beginPath(); cx.moveTo(65, 32); cx.lineTo(80, 48); cx.lineTo(65, 48); cx.closePath(); cx.fill();
    } else if (subject === 'mosque') {
      cx.fillStyle = '#d0c8b0';
      cx.fillRect(42, 42, 44, 46);
      cx.fillStyle = '#4a88aa';
      cx.beginPath(); cx.arc(64, 42, 22, Math.PI, 0); cx.fill();
      cx.fillRect(62, 22, 5, 22);
      cx.fillStyle = '#d0a070';
      cx.fillRect(28, 82, 72, 6);
    } else if (subject === 'fish') {
      cx.fillStyle = '#4a88aa';
      cx.fillRect(20, 55, 88, 30);
      cx.fillStyle = '#708850';
      cx.beginPath();
      cx.moveTo(40, 50); cx.quadraticCurveTo(64, 35, 88, 50);
      cx.quadraticCurveTo(64, 65, 40, 50); cx.fill();
      cx.fillStyle = '#222';
      cx.beginPath(); cx.arc(78, 48, 2, 0, Math.PI * 2); cx.fill();
    }
  });
}

// Tile panels on facade
var tilePanels = [
  [-5.0, 2.0, 'camel'], [-5.0, 4.5, 'mosque'],
  [5.0, 2.0, 'boat'], [5.0, 4.5, 'fish']
];
for (var tpi = 0; tpi < tilePanels.length; tpi++) {
  var tp = tilePanels[tpi];
  var tileTex = makeTilePanel(tp[2]);
  var tile = new THREE.Mesh(new THREE.PlaneGeometry(0.9, 0.9),
    new THREE.MeshBasicMaterial({ map: tileTex }));
  tile.position.set(tp[0], tp[1], 0.04);
  bar.add(tile);
}

// ---- SMALL TILE GRID ACCENT ----
function addTileGrid(cx, cy, cols, rows) {
  for (var gr = 0; gr < rows; gr++) {
    for (var gc = 0; gc < cols; gc++) {
      var tgm = ((gr + gc) % 2 === 0) ? whiteTile : blueTile;
      var tg = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.14, 0.03), tgm);
      tg.position.set(cx + gc * 0.16 - (cols * 0.16) / 2 + 0.08, cy + gr * 0.16 - (rows * 0.16) / 2 + 0.08, 0.04);
      bar.add(tg);
    }
  }
}
addTileGrid(-4.7, 6.5, 4, 4);
addTileGrid(4.7, 6.5, 4, 4);

// Bottom tile strip (ground level)
for (var tx = -5.8; tx <= 5.8; tx += 0.28) {

// Helper: draw a vine segment (curved cylinder chain)
function addVine(points, thickness) {
  for (var vi = 0; vi < points.length - 1; vi++) {
    var p0 = points[vi], p1 = points[vi + 1];
    var dx = p1[0] - p0[0], dy = p1[1] - p0[1], dz = p1[2] - p0[2];
    var len = Math.sqrt(dx * dx + dy * dy + dz * dz);
    var t = thickness * (1 - vi * 0.08);
    if (t < 0.01) t = 0.01;
    var seg = new THREE.Mesh(new THREE.CylinderGeometry(t * 0.7, t, len, 5), vi % 2 === 0 ? vineMat : vineMatLight);
    seg.position.set((p0[0] + p1[0]) / 2, (p0[1] + p1[1]) / 2, (p0[2] + p1[2]) / 2);
    // Orient toward next point
    seg.lookAt(new THREE.Vector3(p1[0], p1[1], p1[2]));
    seg.rotateX(Math.PI / 2);
    seg.castShadow = true;
    scene.add(seg);
  }
}

// Helper: add a leaf at position
function addLeaf(x, y, z, scale, rot) {
  var leaf = new THREE.Mesh(
    new THREE.PlaneGeometry(0.15 * scale, 0.25 * scale),
    Math.random() < 0.5 ? vineLeafMat : vineLeafLight
  );
  leaf.position.set(x, y, z);
  leaf.rotation.set(rot || Math.random() * 0.5, Math.random() * Math.PI * 2, Math.random() * 0.8);
  scene.add(leaf);
}

}

function addLantern(lx, ly, lz) {

    grad.addColorStop(1, 'rgba(255, 100, 20, 0)');

// HEAT HAZE / DUST
// ============================================================
var hazeTex = makeCanvasTexture(128, 128, function(cx, w, h) {
  var grad = cx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w/2);
  grad.addColorStop(0, 'rgba(210, 190, 150, 0.07)');
  grad.addColorStop(0.5, 'rgba(190, 170, 130, 0.03)');
  grad.addColorStop(1, 'rgba(170, 150, 110, 0)');
  cx.fillStyle = grad; cx.fillRect(0, 0, w, h);
});

var hazeSprites = [];
for (var hi = 0; hi < 15; hi++) {
  var hMat = new THREE.SpriteMaterial({ map: hazeTex, transparent: true, opacity: 0.12 + Math.random() * 0.08 });
  var hSprite = new THREE.Sprite(hMat);
  hSprite.position.set(Math.random() * 20 - 10, 1 + Math.random() * 5, 2 + Math.random() * 10);
  var hs = 5 + Math.random() * 8;
  hSprite.scale.set(hs, hs * 0.35, 1);
  scene.add(hSprite);
  hazeSprites.push({ sprite: hSprite, baseX: hSprite.position.x,
    drift: 0.001 + Math.random() * 0.003, sway: Math.random() * Math.PI * 2,
    swaySpeed: 0.0005 + Math.random() * 0.002, swayAmt: 0.3 + Math.random() * 0.8 });
}

// ============================================================
// ANIMATION LOOP
// ============================================================
var clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();

  // Smoke particles — rise, drift, fade in/out, loop
  for (var i = 0; i < smokeParticles.length; i++) {
    var sp = smokeParticles[i];
    sp.life += 1;
    if (sp.life > sp.maxLife) {
      // Reset particle
      sp.life = 0;
      sp.sprite.position.set(sp.baseX, sp.sprite.position.y < 0.5 ? 0.45 : 0.88, sp.baseZ);
      sp.sprite.scale.set(0.05, 0.05, 1);
      sp.mat.opacity = 0;
      sp.driftX = (Math.random() - 0.5) * 0.004;
      sp.driftZ = (Math.random() - 0.5) * 0.003;
    }
    var lifeRatio = sp.life / sp.maxLife;
    // Rise
    sp.sprite.position.y += sp.riseSpeed * (1 - lifeRatio * 0.5);
    // Drift sideways with wobble
    sp.sprite.position.x += sp.driftX + Math.sin(t * sp.wobbleSpeed + sp.wobblePhase) * sp.wobbleAmt * 0.1;
    sp.sprite.position.z += sp.driftZ;
    // Scale up as it rises — bigger puffs
    var sc = 0.1 + lifeRatio * 0.7;
    sp.sprite.scale.set(sc, sc * (1.3 + lifeRatio * 0.6), 1);
    // Fade: appear quickly, linger, fade out — MORE OPAQUE
    if (lifeRatio < 0.08) {
      sp.mat.opacity = lifeRatio * 7;
    } else if (lifeRatio > 0.5) {
      sp.mat.opacity = (1 - lifeRatio) * 1.2;
    } else {
      sp.mat.opacity = 0.55;
    }
  }

  // Heat haze drift
  for (var i = 0; i < hazeSprites.length; i++) {
    var h = hazeSprites[i];
    h.sway += h.swaySpeed;
    h.sprite.position.x = h.baseX + Math.sin(h.sway) * h.swayAmt;
    h.baseX += h.drift;
    if (h.baseX > 15) h.baseX = -15;
  }

  // Sunlight variation (passing clouds)
  sunLight.intensity = 1.4 + Math.sin(t * 0.3) * 0.1;

  // Lantern flicker
  lantern1.intensity = 0.35 + Math.sin(t * 3.7) * 0.04 + Math.sin(t * 7.1) * 0.02;
  lantern2.intensity = 0.35 + Math.sin(t * 4.1) * 0.04 + Math.sin(t * 6.3) * 0.02;

  // Incense ember glow pulse
  incenseGlow.intensity = 0.15 + Math.sin(t * 2.3) * 0.05 + Math.sin(t * 5.7) * 0.03;
  incenseEmber.material.color.setHex(Math.sin(t * 3) > 0 ? 0xcc4400 : 0xdd5510);

  // Cigarette ember flicker
  ember1.material.color.setHex(Math.sin(t * 4.5 + 1) > 0.3 ? 0xff6620 : 0xcc4410);
  ember2.material.color.setHex(Math.sin(t * 3.8 + 2) > 0.2 ? 0xff6620 : 0xcc4410);

  renderer.render(scene, camera);
}

animate();
</script>
