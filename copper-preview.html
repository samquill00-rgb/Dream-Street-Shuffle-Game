<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Copper Character Preview</title>
<style>
  body {
    background: #0a0908;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    font-family: Georgia, serif;
    color: #c8b89a;
    margin: 0;
  }
  .container { text-align: center; }
  canvas {
    border: 1px solid #3a2a2a;
    display: block;
    margin: 20px auto;
  }
  h2 { color: #ea7a7a; font-size: 1.2em; letter-spacing: 0.1em; }
</style>
</head>
<body>
<div class="container">
  <h2>COPPER — Soho Hard Man</h2>
  <canvas id="preview" width="400" height="450"></canvas>
</div>
<script>
var canvas = document.getElementById('preview');
var ctx = canvas.getContext('2d');
var W = canvas.width, H = canvas.height;

var SKIN = '#d4ac90';
var SKIN_SHADOW = '#b89078';
var SKIN_OUTLINE = '#a07a65';
var SKIN_DARK = '#907060';
var HAIR = '#2a1e14';
var HAIR_HI = '#3e3020';
var SUIT = '#58585e';
var SUIT_LIGHT = '#6e6e76';
var SUIT_DARK = '#42424a';
var STRIPE = 'rgba(180,180,190,0.12)';
var SHIRT_WHITE = '#d8d4cc';

function drawCopper() {
  ctx.clearRect(0, 0, W, H);

  // Cellar background
  ctx.fillStyle = '#0e0808';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#1e1212';
  ctx.lineWidth = 0.5;
  for (var row = 0; row < H; row += 30) {
    ctx.beginPath(); ctx.moveTo(0, row); ctx.lineTo(W, row); ctx.stroke();
    var off = (Math.floor(row / 30) % 2) * 35;
    for (var col = off; col < W; col += 70) {
      ctx.beginPath(); ctx.moveTo(col, row); ctx.lineTo(col, row + 30); ctx.stroke();
    }
  }

  // Overhead light
  var lg = ctx.createRadialGradient(W/2, -20, 10, W/2, -20, 300);
  lg.addColorStop(0, 'rgba(180, 140, 80, 0.12)');
  lg.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = lg;
  ctx.fillRect(0, 0, W, H);

  var cx = W / 2;
  var cy = 80;

  // ═══ SHADOW ═══
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(cx, 390, 85, 20, 0, 0, Math.PI * 2); ctx.fill();

  // ═══ SUIT JACKET — grey pinstripe, OPEN ═══
  // Left jacket half
  ctx.fillStyle = SUIT;
  ctx.strokeStyle = SUIT_DARK;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 28, cy + 60);
  ctx.lineTo(cx - 62, cy + 72);
  ctx.lineTo(cx - 68, cy + 240);
  ctx.lineTo(cx - 10, cy + 240);
  ctx.lineTo(cx - 10, cy + 90);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Right jacket half
  ctx.beginPath();
  ctx.moveTo(cx + 28, cy + 60);
  ctx.lineTo(cx + 62, cy + 72);
  ctx.lineTo(cx + 68, cy + 240);
  ctx.lineTo(cx + 10, cy + 240);
  ctx.lineTo(cx + 10, cy + 90);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Pinstripes — left half
  ctx.save();
  ctx.strokeStyle = STRIPE;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - 68, cy + 72);
  ctx.lineTo(cx - 68, cy + 240);
  ctx.lineTo(cx - 10, cy + 240);
  ctx.lineTo(cx - 10, cy + 90);
  ctx.lineTo(cx - 28, cy + 60);
  ctx.lineTo(cx - 62, cy + 72);
  ctx.closePath();
  ctx.clip();
  for (var s = -70; s <= -5; s += 8) {
    ctx.beginPath();
    ctx.moveTo(cx + s, cy + 60);
    ctx.lineTo(cx + s - 2, cy + 240);
    ctx.stroke();
  }
  ctx.restore();
  // Pinstripes — right half
  ctx.save();
  ctx.strokeStyle = STRIPE;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx + 68, cy + 72);
  ctx.lineTo(cx + 68, cy + 240);
  ctx.lineTo(cx + 10, cy + 240);
  ctx.lineTo(cx + 10, cy + 90);
  ctx.lineTo(cx + 28, cy + 60);
  ctx.lineTo(cx + 62, cy + 72);
  ctx.closePath();
  ctx.clip();
  for (var s = 5; s <= 70; s += 8) {
    ctx.beginPath();
    ctx.moveTo(cx + s, cy + 60);
    ctx.lineTo(cx + s - 2, cy + 240);
    ctx.stroke();
  }
  ctx.restore();

  // ═══ SHOULDERS — broad ═══
  ctx.fillStyle = SUIT;
  ctx.strokeStyle = SUIT_DARK;
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.ellipse(cx, cy + 75, 72, 24, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

  // ═══ WHITE SHIRT — visible in the open jacket gap ═══
  ctx.fillStyle = SHIRT_WHITE;
  ctx.strokeStyle = '#b8b4ac';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(cx - 28, cy + 52);
  ctx.lineTo(cx - 12, cy + 240);
  ctx.lineTo(cx + 12, cy + 240);
  ctx.lineTo(cx + 28, cy + 52);
  ctx.closePath();
  ctx.fill(); ctx.stroke();

  // Shirt buttons
  ctx.fillStyle = '#b0aca4';
  for (var by = cy + 90; by < cy + 230; by += 28) {
    ctx.beginPath();
    ctx.arc(cx, by, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Shirt collar — small points peeking out
  ctx.fillStyle = SHIRT_WHITE;
  // Left collar point
  ctx.beginPath();
  ctx.moveTo(cx - 8, cy + 50);
  ctx.lineTo(cx - 26, cy + 54);
  ctx.lineTo(cx - 22, cy + 62);
  ctx.lineTo(cx - 8, cy + 58);
  ctx.closePath();
  ctx.fill();
  // Right collar point
  ctx.beginPath();
  ctx.moveTo(cx + 8, cy + 50);
  ctx.lineTo(cx + 26, cy + 54);
  ctx.lineTo(cx + 22, cy + 62);
  ctx.lineTo(cx + 8, cy + 58);
  ctx.closePath();
  ctx.fill();

  // ═══ SUIT LAPELS — open, on top ═══
  ctx.fillStyle = SUIT;
  ctx.strokeStyle = SUIT_DARK;
  ctx.lineWidth = 1.2;
  // Left lapel
  ctx.beginPath();
  ctx.moveTo(cx - 22, cy + 50);
  ctx.lineTo(cx - 44, cy + 78);
  ctx.lineTo(cx - 58, cy + 70);
  ctx.lineTo(cx - 32, cy + 42);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Lapel notch left
  ctx.strokeStyle = SUIT_LIGHT; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx - 42, cy + 68); ctx.lineTo(cx - 50, cy + 62); ctx.stroke();

  // Right lapel
  ctx.fillStyle = SUIT;
  ctx.strokeStyle = SUIT_DARK;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx + 22, cy + 50);
  ctx.lineTo(cx + 44, cy + 78);
  ctx.lineTo(cx + 58, cy + 70);
  ctx.lineTo(cx + 32, cy + 42);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Lapel notch right
  ctx.strokeStyle = SUIT_LIGHT; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx + 42, cy + 68); ctx.lineTo(cx + 50, cy + 62); ctx.stroke();

  // ═══ GOLD CHAIN — over the white shirt ═══
  ctx.save();
  ctx.strokeStyle = 'rgba(80, 60, 20, 0.5)';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(cx - 16, cy + 50);
  ctx.quadraticCurveTo(cx - 8, cy + 72, cx, cy + 80);
  ctx.quadraticCurveTo(cx + 8, cy + 72, cx + 16, cy + 50);
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.strokeStyle = '#d4b050';
  ctx.lineWidth = 4;
  ctx.shadowColor = 'rgba(220, 180, 60, 0.6)';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(cx - 15, cy + 49);
  ctx.quadraticCurveTo(cx - 7, cy + 71, cx, cy + 79);
  ctx.quadraticCurveTo(cx + 7, cy + 71, cx + 15, cy + 49);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  // Chain link bumps
  ctx.fillStyle = '#e0c050';
  var chainPts = [
    [cx - 14, cy + 51], [cx - 12, cy + 58], [cx - 9, cy + 65],
    [cx - 5, cy + 73], [cx, cy + 79],
    [cx + 5, cy + 73], [cx + 9, cy + 65], [cx + 12, cy + 58], [cx + 14, cy + 51]
  ];
  for (var i = 0; i < chainPts.length; i++) {
    ctx.save();
    ctx.shadowColor = 'rgba(220, 180, 60, 0.5)';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.ellipse(chainPts[i][0], chainPts[i][1], 3.5, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.strokeStyle = '#f0d870';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx - 13, cy + 50);
  ctx.quadraticCurveTo(cx - 6, cy + 69, cx, cy + 77);
  ctx.stroke();

  // ═══ NECK ═══
  ctx.fillStyle = SKIN;
  ctx.beginPath();
  ctx.moveTo(cx - 18, cy + 38);
  ctx.lineTo(cx - 20, cy + 58);
  ctx.lineTo(cx + 20, cy + 58);
  ctx.lineTo(cx + 18, cy + 38);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = SKIN_DARK;
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(cx - 10, cy + 42); ctx.lineTo(cx - 12, cy + 55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 10, cy + 42); ctx.lineTo(cx + 12, cy + 55); ctx.stroke();

  // ═══ HEAD ═══
  // Jaw
  ctx.fillStyle = SKIN;
  ctx.beginPath();
  ctx.moveTo(cx - 32, cy + 10);
  ctx.lineTo(cx - 34, cy + 30);
  ctx.quadraticCurveTo(cx - 30, cy + 44, cx - 18, cy + 44);
  ctx.lineTo(cx + 18, cy + 44);
  ctx.quadraticCurveTo(cx + 30, cy + 44, cx + 34, cy + 30);
  ctx.lineTo(cx + 32, cy + 10);
  ctx.closePath();
  ctx.fill();

  // Cranium — skin base (will be covered by hair)
  ctx.fillStyle = SKIN;
  ctx.beginPath();
  ctx.ellipse(cx, cy + 10, 34, 36, 0, Math.PI, Math.PI * 2);
  ctx.fill();

  // Face/jaw outline only (below hairline)
  ctx.strokeStyle = SKIN_OUTLINE;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx - 34, cy + 10);
  ctx.lineTo(cx - 34, cy + 30);
  ctx.quadraticCurveTo(cx - 30, cy + 44, cx - 18, cy + 44);
  ctx.lineTo(cx + 18, cy + 44);
  ctx.quadraticCurveTo(cx + 30, cy + 44, cx + 34, cy + 30);
  ctx.lineTo(cx + 34, cy + 10);
  ctx.stroke();

  // ═══ HAIR — 50s short-back-and-sides with quiff ═══
  // Hair base: sides and top of skull
  ctx.fillStyle = HAIR;
  ctx.beginPath();
  // Start at left sideburn
  ctx.moveTo(cx - 36, cy + 22);
  // Up the left side
  ctx.lineTo(cx - 37, cy + 6);
  ctx.lineTo(cx - 37, cy - 4);
  // Over the top
  ctx.quadraticCurveTo(cx - 36, cy - 18, cx - 24, cy - 26);
  ctx.quadraticCurveTo(cx - 10, cy - 30, cx, cy - 30);
  ctx.quadraticCurveTo(cx + 10, cy - 30, cx + 24, cy - 26);
  ctx.quadraticCurveTo(cx + 36, cy - 18, cx + 37, cy - 4);
  // Down the right side
  ctx.lineTo(cx + 37, cy + 6);
  ctx.lineTo(cx + 36, cy + 22);
  // NATURAL HAIRLINE — M-shape, receding at temples
  ctx.lineTo(cx + 30, cy + 2);
  // Right temple — recedes back
  ctx.quadraticCurveTo(cx + 26, cy - 2, cx + 20, cy - 6);
  // Comes forward to centre
  ctx.quadraticCurveTo(cx + 10, cy - 12, cx + 4, cy - 10);
  // Slight widow's peak
  ctx.quadraticCurveTo(cx, cy - 13, cx - 4, cy - 10);
  // Left side forward then recedes at left temple
  ctx.quadraticCurveTo(cx - 10, cy - 12, cx - 20, cy - 6);
  ctx.quadraticCurveTo(cx - 26, cy - 2, cx - 30, cy + 2);
  ctx.closePath();
  ctx.fill();

  // ═══ THE QUIFF — swept up from the centre hairline ═══
  ctx.fillStyle = HAIR;
  ctx.beginPath();
  ctx.moveTo(cx - 16, cy - 10);
  // Sweeps up
  ctx.quadraticCurveTo(cx - 14, cy - 22, cx - 8, cy - 36);
  // Peak
  ctx.quadraticCurveTo(cx - 2, cy - 44, cx + 8, cy - 40);
  // Sweeps back
  ctx.quadraticCurveTo(cx + 16, cy - 34, cx + 22, cy - 22);
  // Back down to hair base
  ctx.quadraticCurveTo(cx + 24, cy - 14, cx + 18, cy - 8);
  // Along hairline
  ctx.quadraticCurveTo(cx + 4, cy - 14, cx - 4, cy - 14);
  ctx.quadraticCurveTo(cx - 10, cy - 13, cx - 16, cy - 10);
  ctx.closePath();
  ctx.fill();

  // Quiff highlight — Brylcreem shine
  ctx.strokeStyle = HAIR_HI;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(cx - 10, cy - 16);
  ctx.quadraticCurveTo(cx - 6, cy - 30, cx + 2, cy - 38);
  ctx.quadraticCurveTo(cx + 10, cy - 36, cx + 18, cy - 24);
  ctx.stroke();
  // Bright streak
  ctx.strokeStyle = 'rgba(190, 170, 140, 0.3)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx - 4, cy - 22);
  ctx.quadraticCurveTo(cx, cy - 34, cx + 6, cy - 36);
  ctx.stroke();

  // Grey streaks at temples — ageing
  ctx.strokeStyle = 'rgba(140, 135, 125, 0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx - 34, cy + 2); ctx.lineTo(cx - 30, cy - 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 35, cy + 6); ctx.lineTo(cx - 32, cy + 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 34, cy + 2); ctx.lineTo(cx + 30, cy - 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 35, cy + 6); ctx.lineTo(cx + 32, cy + 0); ctx.stroke();

  // Hair parting — left side
  ctx.strokeStyle = 'rgba(15, 10, 6, 0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - 18, cy - 8);
  ctx.quadraticCurveTo(cx - 22, cy - 16, cx - 22, cy - 24);
  ctx.stroke();

  // Sideburns — neat, come down past the ears
  ctx.fillStyle = HAIR;
  // Left sideburn
  ctx.beginPath();
  ctx.moveTo(cx - 35, cy + 8);
  ctx.lineTo(cx - 36, cy + 24);
  ctx.lineTo(cx - 33, cy + 24);
  ctx.lineTo(cx - 34, cy + 8);
  ctx.closePath();
  ctx.fill();
  // Right sideburn
  ctx.beginPath();
  ctx.moveTo(cx + 35, cy + 8);
  ctx.lineTo(cx + 36, cy + 24);
  ctx.lineTo(cx + 33, cy + 24);
  ctx.lineTo(cx + 34, cy + 8);
  ctx.closePath();
  ctx.fill();

  // ═══ EARS ═══
  ctx.fillStyle = SKIN; ctx.strokeStyle = SKIN_OUTLINE; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.ellipse(cx - 37, cy + 12, 6, 10, -0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(cx + 37, cy + 12, 6, 10, 0.2, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  // Cauliflower bumps
  ctx.fillStyle = SKIN_OUTLINE;
  ctx.beginPath(); ctx.arc(cx - 39, cy + 14, 2.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 39, cy + 14, 2.5, 0, Math.PI * 2); ctx.fill();

  // ═══ FOREHEAD WRINKLES — deep horizontal creases ═══
  ctx.strokeStyle = SKIN_SHADOW;
  ctx.lineWidth = 1.2;
  // Three deep forehead lines
  ctx.beginPath(); ctx.moveTo(cx - 18, cy - 4); ctx.quadraticCurveTo(cx, cy - 5.5, cx + 18, cy - 4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 16, cy - 8); ctx.quadraticCurveTo(cx, cy - 9.5, cx + 16, cy - 8); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 13, cy - 12); ctx.quadraticCurveTo(cx, cy - 13, cx + 13, cy - 12); ctx.stroke();
  // Frown furrows between brows — deep vertical creases
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(cx - 5, cy - 2); ctx.lineTo(cx - 4, cy + 5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 5, cy - 2); ctx.lineTo(cx + 4, cy + 5); ctx.stroke();

  // ═══ THICK EYEBROWS — angled down, V-shaped, threatening ═══
  // Left eyebrow — angled sharply DOWN toward center (angry V)
  ctx.fillStyle = HAIR;
  ctx.beginPath();
  ctx.moveTo(cx - 26, cy + 2);        // outer end sits higher
  ctx.quadraticCurveTo(cx - 18, cy - 1, cx - 8, cy + 5);  // swoops DOWN toward nose
  ctx.lineTo(cx - 6, cy + 8);
  ctx.quadraticCurveTo(cx - 16, cy + 4, cx - 26, cy + 6);
  ctx.closePath();
  ctx.fill();
  // Left brow bushiness — wild, unruly hairs
  ctx.strokeStyle = HAIR;
  ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(cx - 24, cy + 1); ctx.lineTo(cx - 17, cy - 1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 20, cy + 1); ctx.lineTo(cx - 12, cy + 1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 14, cy + 2); ctx.lineTo(cx - 9, cy + 4); ctx.stroke();
  // Stray long hairs poking out
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx - 26, cy + 3); ctx.lineTo(cx - 29, cy + 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 24, cy + 2); ctx.lineTo(cx - 27, cy - 2); ctx.stroke();

  // Right eyebrow — mirrors left, angled DOWN toward center
  ctx.fillStyle = HAIR;
  ctx.beginPath();
  ctx.moveTo(cx + 26, cy + 2);
  ctx.quadraticCurveTo(cx + 18, cy - 1, cx + 8, cy + 5);
  ctx.lineTo(cx + 6, cy + 8);
  ctx.quadraticCurveTo(cx + 16, cy + 4, cx + 26, cy + 6);
  ctx.closePath();
  ctx.fill();
  // Right brow bushiness
  ctx.strokeStyle = HAIR;
  ctx.lineWidth = 1.8;
  ctx.beginPath(); ctx.moveTo(cx + 24, cy + 1); ctx.lineTo(cx + 17, cy - 1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 20, cy + 1); ctx.lineTo(cx + 12, cy + 1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 14, cy + 2); ctx.lineTo(cx + 9, cy + 4); ctx.stroke();
  // Stray hairs
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx + 26, cy + 3); ctx.lineTo(cx + 29, cy + 0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 24, cy + 2); ctx.lineTo(cx + 27, cy - 2); ctx.stroke();

  // ═══ EYES — narrower, meaner slits ═══
  ctx.fillStyle = '#d0c8b8';
  ctx.beginPath(); ctx.ellipse(cx - 14, cy + 12, 6, 2, -0.05, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 14, cy + 12, 6, 2, 0.05, 0, Math.PI * 2); ctx.fill();
  // Dark, cold irises
  ctx.fillStyle = '#1a0a08';
  ctx.beginPath(); ctx.ellipse(cx - 14, cy + 12, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx + 14, cy + 12, 3, 2, 0, 0, Math.PI * 2); ctx.fill();
  // Heavy drooping upper eyelid shadow
  ctx.strokeStyle = SKIN_SHADOW;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(cx - 21, cy + 10);
  ctx.quadraticCurveTo(cx - 14, cy + 7.5, cx - 7, cy + 10);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + 7, cy + 10);
  ctx.quadraticCurveTo(cx + 14, cy + 7.5, cx + 21, cy + 10);
  ctx.stroke();
  // Under-eye bags — dark sagging pouches
  ctx.strokeStyle = SKIN_SHADOW;
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx - 20, cy + 14);
  ctx.quadraticCurveTo(cx - 14, cy + 17, cx - 8, cy + 14);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + 8, cy + 14);
  ctx.quadraticCurveTo(cx + 14, cy + 17, cx + 20, cy + 14);
  ctx.stroke();
  // Second under-eye crease — deeper bags
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(cx - 19, cy + 16);
  ctx.quadraticCurveTo(cx - 14, cy + 18.5, cx - 9, cy + 16);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + 9, cy + 16);
  ctx.quadraticCurveTo(cx + 14, cy + 18.5, cx + 19, cy + 16);
  ctx.stroke();

  // ═══ CROW'S FEET — deep wrinkles at eye corners ═══
  ctx.strokeStyle = SKIN_SHADOW;
  ctx.lineWidth = 1;
  // Left crow's feet
  ctx.beginPath(); ctx.moveTo(cx - 21, cy + 10); ctx.lineTo(cx - 26, cy + 6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 21, cy + 11); ctx.lineTo(cx - 27, cy + 10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx - 21, cy + 13); ctx.lineTo(cx - 26, cy + 15); ctx.stroke();
  // Right crow's feet
  ctx.beginPath(); ctx.moveTo(cx + 21, cy + 10); ctx.lineTo(cx + 26, cy + 6); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 21, cy + 11); ctx.lineTo(cx + 27, cy + 10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx + 21, cy + 13); ctx.lineTo(cx + 26, cy + 15); ctx.stroke();

  // ═══ NOSE — broader, more battered ═══
  ctx.strokeStyle = SKIN_OUTLINE; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - 1, cy + 12);
  ctx.quadraticCurveTo(cx - 5, cy + 22, cx - 7, cy + 26);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + 2, cy + 12);
  ctx.quadraticCurveTo(cx + 3, cy + 22, cx + 6, cy + 26);
  ctx.stroke();
  // Wider nostrils
  ctx.beginPath();
  ctx.moveTo(cx - 10, cy + 28);
  ctx.quadraticCurveTo(cx, cy + 31, cx + 10, cy + 28);
  ctx.stroke();
  // Nose bump — old break
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - 3, cy + 18);
  ctx.quadraticCurveTo(cx - 5, cy + 20, cx - 3, cy + 22);
  ctx.stroke();

  // ═══ DEEP NASOLABIAL FOLDS — nose-to-mouth creases ═══
  ctx.strokeStyle = SKIN_SHADOW;
  ctx.lineWidth = 1.5;
  // Left fold
  ctx.beginPath();
  ctx.moveTo(cx - 10, cy + 27);
  ctx.quadraticCurveTo(cx - 14, cy + 32, cx - 15, cy + 38);
  ctx.stroke();
  // Right fold
  ctx.beginPath();
  ctx.moveTo(cx + 10, cy + 27);
  ctx.quadraticCurveTo(cx + 14, cy + 32, cx + 15, cy + 38);
  ctx.stroke();

  // ═══ SCAR — longer, more prominent ═══
  ctx.strokeStyle = '#d49898';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - 24, cy + 16);
  ctx.lineTo(cx - 13, cy + 27);
  ctx.stroke();
  // Second scar — small nick on right cheekbone
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx + 18, cy + 20);
  ctx.lineTo(cx + 22, cy + 24);
  ctx.stroke();

  // ═══ MOUTH — mean downturned scowl ═══
  ctx.strokeStyle = SKIN_DARK;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(cx - 14, cy + 37);           // wider mouth
  ctx.quadraticCurveTo(cx - 5, cy + 35, cx, cy + 36);
  ctx.quadraticCurveTo(cx + 5, cy + 35, cx + 14, cy + 37);
  ctx.stroke();
  // Downturned corners — the scowl
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - 14, cy + 37);
  ctx.quadraticCurveTo(cx - 16, cy + 39, cx - 17, cy + 40);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + 14, cy + 37);
  ctx.quadraticCurveTo(cx + 16, cy + 39, cx + 17, cy + 40);
  ctx.stroke();
  // Thin lower lip line
  ctx.strokeStyle = SKIN_SHADOW;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - 10, cy + 39);
  ctx.quadraticCurveTo(cx, cy + 41, cx + 10, cy + 39);
  ctx.stroke();

  // ═══ HEAVY STUBBLE — dense five o'clock shadow ═══
  ctx.fillStyle = 'rgba(50, 35, 25, 0.25)';
  for (var i = 0; i < 200; i++) {
    var sx = cx + (Math.random() - 0.5) * 62;
    var sy = cy + 28 + Math.random() * 18;
    var dx = Math.abs(sx - cx);
    if (dx < 34 && sy > cy + 28) {
      ctx.beginPath();
      ctx.arc(sx, sy, 0.7 + Math.random() * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // Extra chin stubble density
  ctx.fillStyle = 'rgba(50, 35, 25, 0.3)';
  for (var j = 0; j < 60; j++) {
    var sx2 = cx + (Math.random() - 0.5) * 30;
    var sy2 = cy + 38 + Math.random() * 10;
    ctx.beginPath();
    ctx.arc(sx2, sy2, 0.5 + Math.random() * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  // ═══ FISTS ═══
  var lfx = cx - 65, lfy = cy + 140;
  var rfx = cx + 65, rfy = cy + 140;
  drawFist(ctx, lfx, lfy, 16, 20, 0.2, 0);
  drawFist(ctx, rfx, rfy, 16, 20, -0.2, 0);
}

function drawFist(ctx, x, y, rx, ry, rot, glow) {
  ctx.fillStyle = SKIN;
  ctx.beginPath();
  ctx.ellipse(x, y, rx, ry, rot, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = SKIN_OUTLINE;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(x - 6, y - 3); ctx.lineTo(x + 6, y - 3); ctx.stroke();
}

drawCopper();
</script>
