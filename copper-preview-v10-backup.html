ctx.beginPath();ctx.moveTo(cx-1,cy+12);ctx.quadraticCurveTo(cx-5,cy+22,cx-7,cy+26);ctx.stroke();
ctx.beginPath();ctx.moveTo(cx+2,cy+12);ctx.quadraticCurveTo(cx+3,cy+22,cx+6,cy+26);ctx.stroke();
ctx.beginPath();ctx.moveTo(cx-10,cy+28);ctx.quadraticCurveTo(cx,cy+31,cx+10,cy+28);ctx.stroke();
ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx-3,cy+18);ctx.quadraticCurveTo(cx-5,cy+20,cx-3,cy+22);ctx.stroke();

// Nasolabial
ctx.strokeStyle=SKIN_SHADOW;ctx.lineWidth=1.5;
ctx.beginPath();ctx.moveTo(cx-10,cy+27);ctx.quadraticCurveTo(cx-14,cy+32,cx-15,cy+38);ctx.stroke();
ctx.beginPath();ctx.moveTo(cx+10,cy+27);ctx.quadraticCurveTo(cx+14,cy+32,cx+15,cy+38);ctx.stroke();

// Scars
ctx.strokeStyle='#c48080';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx-24,cy+16);ctx.lineTo(cx-13,cy+27);ctx.stroke();
ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(cx+18,cy+20);ctx.lineTo(cx+22,cy+24);ctx.stroke();

// Mouth — tight grimace with hint of bad teeth
ctx.strokeStyle=SKIN_DARK;ctx.lineWidth=2;
ctx.beginPath();ctx.moveTo(cx-14,cy+36);ctx.quadraticCurveTo(cx-5,cy+34.5,cx,cy+35);ctx.quadraticCurveTo(cx+5,cy+34.5,cx+14,cy+36);ctx.stroke();
ctx.lineWidth=1.8;
ctx.beginPath();ctx.moveTo(cx-14,cy+36);ctx.quadraticCurveTo(cx-16,cy+38,cx-17,cy+39);ctx.stroke();
ctx.beginPath();ctx.moveTo(cx+14,cy+36);ctx.quadraticCurveTo(cx+16,cy+38,cx+17,cy+39);ctx.stroke();
ctx.fillStyle='#1a0e0a';
ctx.beginPath();ctx.moveTo(cx-10,cy+36.5);ctx.quadraticCurveTo(cx,cy+37.5,cx+10,cy+36.5);ctx.quadraticCurveTo(cx+4,cy+39,cx,cy+39);ctx.quadraticCurveTo(cx-4,cy+39,cx-10,cy+36.5);ctx.closePath();ctx.fill();
ctx.fillStyle='rgba(190,175,140,0.5)';
ctx.beginPath();ctx.moveTo(cx-7,cy+37);ctx.quadraticCurveTo(cx,cy+37.8,cx+7,cy+37);ctx.lineTo(cx+7,cy+38.2);ctx.quadraticCurveTo(cx,cy+38.8,cx-7,cy+38.2);ctx.closePath();ctx.fill();
ctx.strokeStyle='rgba(20,10,8,0.4)';ctx.lineWidth=0.5;
ctx.beginPath();ctx.moveTo(cx,cy+37);ctx.lineTo(cx,cy+38.3);ctx.stroke();
ctx.beginPath();ctx.moveTo(cx-4,cy+37.2);ctx.lineTo(cx-4,cy+38.2);ctx.stroke();
ctx.beginPath();ctx.moveTo(cx+3.5,cy+37.2);ctx.lineTo(cx+3.5,cy+38.2);ctx.stroke();
ctx.strokeStyle=SKIN_SHADOW;ctx.lineWidth=1;
ctx.beginPath();ctx.moveTo(cx-10,cy+40);ctx.quadraticCurveTo(cx,cy+42,cx+10,cy+40);ctx.stroke();

// Stubble
ctx.fillStyle='rgba(50,35,25,0.25)';
for(var i=0;i<200;i++){var sx=cx+(Math.random()-0.5)*62;var sy=cy+28+Math.random()*18;var dx=Math.abs(sx-cx);if(dx<34&&sy>cy+28){ctx.beginPath();ctx.arc(sx,sy,0.7+Math.random()*0.3,0,Math.PI*2);ctx.fill();}}
ctx.fillStyle='rgba(50,35,25,0.3)';
for(var j=0;j<60;j++){var sx2=cx+(Math.random()-0.5)*30;var sy2=cy+41+Math.random()*7;ctx.beginPath();ctx.arc(sx2,sy2,0.5+Math.random()*0.3,0,Math.PI*2);ctx.fill();}

// Fists
function drawFist(x,y,rx,ry,rot){ctx.fillStyle=SKIN;ctx.beginPath();ctx.ellipse(x,y,rx,ry,rot,0,Math.PI*2);ctx.fill();ctx.strokeStyle=SKIN_OUTLINE;ctx.lineWidth=1.5;ctx.stroke();}
drawFist(cx-80,cy+140,17,21,0.2);
drawFist(cx+80,cy+140,17,21,-0.2);
</script>
