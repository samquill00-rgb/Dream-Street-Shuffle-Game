<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Green Sea — Carthage Coast, Tunisia</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
#datestamp {
  position: absolute; top: 18px; right: 24px;
  font: 14px monospace; color: rgba(255,140,50,0.55);
  pointer-events: none;
}
#location {
  position: absolute; bottom: 18px; left: 50%;
  transform: translateX(-50%);
  font: 12px 'Courier New', monospace; color: rgba(80,60,40,0.5);
  letter-spacing: 2px; pointer-events: none;
}
</style>
</head>
<body>
<div id="datestamp">23.11.73</div>
<div id="location">CARTHAGE COAST, TUNISIA</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// SCENE SETUP — bright Mediterranean daylight
// ============================================================
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0xc8d8e8, 30, 80);

var camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 3.0, 14);
camera.lookAt(0, 3.0, 0);

var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping || THREE.LinearToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// MATERIALS — worn, sandy, sun-bleached
// ============================================================
var sandWall = new THREE.MeshStandardMaterial({ color: 0xc8b890, roughness: 0.95 });
var cream = new THREE.MeshStandardMaterial({ color: 0xd8ccb0, roughness: 0.92 });
var blueDoor = new THREE.MeshStandardMaterial({ color: 0x3a8ab0, roughness: 0.7, metalness: 0.1 });
var blueDoorDark = new THREE.MeshStandardMaterial({ color: 0x2a6a88, roughness: 0.75, metalness: 0.15 });
var blueDoorLight = new THREE.MeshStandardMaterial({ color: 0x5599bb, roughness: 0.65, metalness: 0.08 });
var blueIron = new THREE.MeshStandardMaterial({ color: 0x4488aa, roughness: 0.6, metalness: 0.25 });
var whiteTile = new THREE.MeshStandardMaterial({ color: 0xe0d8c8, roughness: 0.75 });
var blueTile = new THREE.MeshStandardMaterial({ color: 0x2a5588, roughness: 0.7 });
var sandGround = new THREE.MeshStandardMaterial({ color: 0xb89868, roughness: 0.96 });

// ============================================================
// HELPERS
// ============================================================
function makeCanvasTexture(w, h, drawFunc) {
  var c = document.createElement('canvas');
  c.width = w; c.height = h;
  var cx = c.getContext('2d');
  drawFunc(cx, w, h);
  var tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  return tex;
}

function placeMesh(group, geo, mat, x, y, z) {
  var m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  group.add(m);
  return m;
}

// ============================================================
// GROUND — dusty North African street
// ============================================================
var ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), sandGround);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Sand texture overlay
var sandOverlayTex = makeCanvasTexture(256, 256, function(cx, w, h) {
  cx.fillStyle = 'rgba(180, 150, 100, 0.1)';
  cx.fillRect(0, 0, w, h);
  for (var i = 0; i < 500; i++) {
    var g = 140 + Math.random() * 80;
    cx.fillStyle = 'rgba(' + g + ',' + (g - 20) + ',' + (g - 50) + ', 0.06)';
    cx.beginPath();
    cx.arc(Math.random() * w, Math.random() * h, 1 + Math.random() * 4, 0, Math.PI * 2);
    cx.fill();
  }
});

// ============================================================
// THE GREEN SEA BAR — MAIN BUILDING (human scale)
// ============================================================
var bar = new THREE.Group();

// ---- MAIN WALL ----
var mainWall = new THREE.Mesh(new THREE.BoxGeometry(12, 8, 5), sandWall);
mainWall.position.set(0, 4, -2.5);
bar.add(mainWall);

// Facade face — heavily weathered plaster texture (HIGH CONTRAST)
var facadeTex = makeCanvasTexture(1024, 1024, function(cx, w, h) {
  // Base plaster — uneven tone
  cx.fillStyle = '#c8b898';
  cx.fillRect(0, 0, w, h);
  // Large tonal variation (different plaster ages) — BOLD
  for (var i = 0; i < 20; i++) {
    var px = Math.random() * w;
    var py = Math.random() * h;
    var pw = 80 + Math.random() * 350;
    var ph = 60 + Math.random() * 250;
    var pg = 160 + Math.random() * 50;
    cx.fillStyle = 'rgba(' + pg + ',' + (pg - 15) + ',' + (pg - 40) + ', 0.25)';
    cx.fillRect(px, py, pw, ph);
  }
  // Weathering stains — MUCH stronger
  for (var i = 0; i < 60; i++) {
    var sx = Math.random() * w;
    var sy = Math.random() * h;
    var sr = 15 + Math.random() * 70;
    var grad = cx.createRadialGradient(sx, sy, 0, sx, sy, sr);
    var tone = Math.random() < 0.4 ? 'rgba(130,110,75,' : (Math.random() < 0.5 ? 'rgba(155,135,100,' : 'rgba(105,88,58,');
    grad.addColorStop(0, tone + (0.15 + Math.random() * 0.2) + ')');
    grad.addColorStop(1, tone + '0)');
    cx.fillStyle = grad;
    cx.fillRect(sx - sr, sy - sr, sr * 2, sr * 2);
  }
  // Rising damp — STRONG dark band at bottom
  var dampGrad = cx.createLinearGradient(0, h * 0.6, 0, h);
  dampGrad.addColorStop(0, 'rgba(100, 85, 55, 0)');
  dampGrad.addColorStop(0.5, 'rgba(100, 85, 55, 0.15)');
  dampGrad.addColorStop(1, 'rgba(85, 70, 45, 0.35)');
  cx.fillStyle = dampGrad;
  cx.fillRect(0, h * 0.6, w, h * 0.4);
  // Damp blotches at base — DARKER
  for (var i = 0; i < 30; i++) {
    cx.fillStyle = 'rgba(90, 75, 45, ' + (0.1 + Math.random() * 0.15) + ')';
    cx.fillRect(Math.random() * w, h - Math.random() * 150, 20 + Math.random() * 80, Math.random() * 150);
  }
  // Water run stains (vertical streaks) — VISIBLE
  for (var vi = 0; vi < 18; vi++) {
    cx.strokeStyle = 'rgba(95, 80, 50, ' + (0.08 + Math.random() * 0.1) + ')';
    cx.lineWidth = 3 + Math.random() * 8;
    cx.beginPath();
    var vx = Math.random() * w;
    cx.moveTo(vx, Math.random() * h * 0.3);
    cx.lineTo(vx + (Math.random() - 0.5) * 20, h);
    cx.stroke();
  }
  // Cracks — THICK and dark
  for (var ci = 0; ci < 30; ci++) {
    cx.strokeStyle = 'rgba(80, 65, 40, ' + (0.12 + Math.random() * 0.12) + ')';
    cx.lineWidth = 1 + Math.random() * 2.5;
    cx.beginPath();
    var crx = Math.random() * w;
    var cry = Math.random() * h;
    cx.moveTo(crx, cry);
    for (var j = 0; j < 7; j++) {
      crx += (Math.random() - 0.5) * 40;
      cry += Math.random() * 30;
      cx.lineTo(crx, cry);
    }
    cx.stroke();
  }
  // Exposed patches where plaster has fallen off — LARGE and obvious
  for (var ei = 0; ei < 10; ei++) {
    var ex = Math.random() * w;
    var ey = h * 0.3 + Math.random() * h * 0.6;
    var ew = 30 + Math.random() * 80;
    var eh = 20 + Math.random() * 50;
    cx.fillStyle = 'rgba(140, 100, 55, 0.35)';
    cx.fillRect(ex, ey, ew, eh);
    // Brick lines inside — visible
    for (var bk = 0; bk < 6; bk++) {
      cx.fillStyle = 'rgba(125, 85, 45, 0.25)';
      cx.fillRect(ex + 2, ey + bk * 8 + 2, ew - 4, 5);
      cx.strokeStyle = 'rgba(90, 60, 30, 0.15)';
      cx.lineWidth = 0.5;
      cx.strokeRect(ex + 2, ey + bk * 8 + 2, ew - 4, 5);
    }
  }
  // Ochre/yellow stain patches (mineral deposits)
  for (var oi = 0; oi < 8; oi++) {
    var ox = Math.random() * w;
    var oy = Math.random() * h;
    var or2 = 20 + Math.random() * 50;
    var ograd = cx.createRadialGradient(ox, oy, 0, ox, oy, or2);
    ograd.addColorStop(0, 'rgba(180, 150, 60, 0.12)');
    ograd.addColorStop(1, 'rgba(180, 150, 60, 0)');
    cx.fillStyle = ograd;
    cx.fillRect(ox - or2, oy - or2, or2 * 2, or2 * 2);
  }
  // Sand/grit speckle overlay — bigger dots
  for (var gi = 0; gi < 500; gi++) {
    var gg = 140 + Math.random() * 70;
    cx.fillStyle = 'rgba(' + gg + ',' + (gg - 15) + ',' + (gg - 45) + ', 0.08)';
    cx.beginPath();
    cx.arc(Math.random() * w, Math.random() * h, 1 + Math.random() * 3, 0, Math.PI * 2);
    cx.fill();
  }
});
var facadeFace = new THREE.Mesh(new THREE.PlaneGeometry(12, 8),
  new THREE.MeshStandardMaterial({ map: facadeTex, roughness: 0.94 }));
facadeFace.position.set(0, 4, 0.02);
bar.add(facadeFace);

// ---- ROOFTOP BALUSTRADE ----
var balustradeMat = new THREE.MeshStandardMaterial({ color: 0xd0c4a0, roughness: 0.88 });
placeMesh(bar, new THREE.BoxGeometry(12.5, 0.2, 0.3), balustradeMat, 0, 8.1, 0.1);
placeMesh(bar, new THREE.BoxGeometry(12.5, 0.15, 0.25), balustradeMat, 0, 9.3, 0.1);
for (var bi = -5.5; bi <= 5.5; bi += 0.55) {
  var baluster = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.0, 6), balustradeMat);
  baluster.position.set(bi, 8.7, 0.1);
  bar.add(baluster);
}

// ---- TUNISIAN HORSESHOE ARCH DOOR ----
var doorW = 2.8;
var doorRectH = 2.4;    // rectangular portion height
var doorBottom = 0.35;
var doorCentre = 0;
var archRadius = doorW / 2;  // horseshoe arch radius
var archCentreY = doorBottom + doorRectH;  // where the arch springs from
var doorTopY = archCentreY + archRadius;   // top of arch

// Materials
var greenDoor = new THREE.MeshStandardMaterial({ color: 0x2a8a5a, roughness: 0.7, metalness: 0.05 });
var greenDoorDark = new THREE.MeshStandardMaterial({ color: 0x1e6a42, roughness: 0.75, metalness: 0.08 });
var carvedStone = new THREE.MeshStandardMaterial({ color: 0xc8b888, roughness: 0.82 });
var carvedStoneDark = new THREE.MeshStandardMaterial({ color: 0xb0a070, roughness: 0.85 });
var blackIron = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.6, metalness: 0.35 });

// ---- CARVED STONE FRAME (outer surround) ----
// Wide carved stone border — rectangular frame around the whole arch
var frameW = doorW + 1.8;
var frameH = doorTopY - doorBottom + 1.0;
var frameMidY = doorBottom + frameH / 2;
// Back panel of frame (sand-coloured carved stone)
placeMesh(bar, new THREE.BoxGeometry(frameW, frameH, 0.2), carvedStone, doorCentre, frameMidY, -0.08);
// Carved border mouldings — outer edge
placeMesh(bar, new THREE.BoxGeometry(frameW + 0.15, 0.12, 0.25), carvedStoneDark, doorCentre, doorBottom - 0.06, 0.0);
placeMesh(bar, new THREE.BoxGeometry(frameW + 0.15, 0.12, 0.25), carvedStoneDark, doorCentre, frameMidY + frameH / 2 + 0.06, 0.0);
placeMesh(bar, new THREE.BoxGeometry(0.12, frameH + 0.24, 0.25), carvedStoneDark, doorCentre - frameW / 2 - 0.06, frameMidY, 0.0);
placeMesh(bar, new THREE.BoxGeometry(0.12, frameH + 0.24, 0.25), carvedStoneDark, doorCentre + frameW / 2 + 0.06, frameMidY, 0.0);
// Inner carved moulding (closer to arch)
placeMesh(bar, new THREE.BoxGeometry(0.08, frameH - 0.3, 0.22), carvedStoneDark, doorCentre - doorW / 2 - 0.25, frameMidY, 0.02);
placeMesh(bar, new THREE.BoxGeometry(0.08, frameH - 0.3, 0.22), carvedStoneDark, doorCentre + doorW / 2 + 0.25, frameMidY, 0.02);

// ---- Small carved columns flanking the door (like in the reference) ----
var colMat = new THREE.MeshStandardMaterial({ color: 0xc0b080, roughness: 0.8 });
for (var cSide = -1; cSide <= 1; cSide += 2) {
  var colX = doorCentre + cSide * (doorW / 2 + 0.12);
  // Column shaft
  var col = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.07, doorRectH - 0.2, 8), colMat);
  col.position.set(colX, doorBottom + doorRectH / 2, 0.12);
  bar.add(col);
  // Column capital
  placeMesh(bar, new THREE.BoxGeometry(0.22, 0.12, 0.18), carvedStone, colX, doorBottom + doorRectH + 0.02, 0.1);
  // Column base
  placeMesh(bar, new THREE.BoxGeometry(0.2, 0.1, 0.16), carvedStone, colX, doorBottom + 0.05, 0.1);
}

// ---- HORSESHOE ARCH (carved stone segments) ----
// Build arch from small stone blocks following the horseshoe curve
var archSegments = 20;
var archInnerR = doorW / 2;
var archOuterR = archInnerR + 0.25;
for (var ai = 0; ai <= archSegments; ai++) {
  var angle = Math.PI * ai / archSegments;  // 0 to PI (full semicircle)
  var midAngle = Math.PI * (ai + 0.5) / archSegments;
  var ax = doorCentre + Math.cos(angle) * (archInnerR + archOuterR) / 2;
  var ay = archCentreY + Math.sin(angle) * (archInnerR + archOuterR) / 2;
  var blockW = 0.32;
  var blockH = archOuterR - archInnerR;
  var archBlock = new THREE.Mesh(new THREE.BoxGeometry(blockW, blockH, 0.18),
    ai % 2 === 0 ? carvedStone : carvedStoneDark);
  archBlock.position.set(ax, ay, 0.06);
  archBlock.rotation.z = angle - Math.PI / 2;
  bar.add(archBlock);
}
// Decorative carved keystone at top
placeMesh(bar, new THREE.BoxGeometry(0.3, 0.35, 0.22), carvedStoneDark, doorCentre, doorTopY + 0.15, 0.06);

// ---- DARK RECESS behind door ----
placeMesh(bar, new THREE.BoxGeometry(doorW + 0.1, doorRectH + archRadius + 0.1, 0.3),
  new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.9 }),
  doorCentre, doorBottom + (doorRectH + archRadius) / 2, -0.12);

// ---- GREEN DOOR PANELS ----
// Rectangular portion — two panels
var leftDoor = new THREE.Mesh(new THREE.BoxGeometry(doorW / 2 - 0.05, doorRectH, 0.08), greenDoor);
leftDoor.position.set(doorCentre - doorW / 4, doorBottom + doorRectH / 2, 0.06);
bar.add(leftDoor);
var rightDoor = new THREE.Mesh(new THREE.BoxGeometry(doorW / 2 - 0.05, doorRectH, 0.08), greenDoor);
rightDoor.position.set(doorCentre + doorW / 4, doorBottom + doorRectH / 2, 0.06);
bar.add(rightDoor);

// Arch portion — green semicircle fill (canvas texture on a plane)
var archDoorTex = makeCanvasTexture(256, 128, function(cx, w, h) {
  cx.fillStyle = '#2a8a5a';
  cx.beginPath();
  cx.arc(w / 2, h, w / 2, Math.PI, 0);
  cx.fill();
  // Subtle wood grain
  for (var gi = 0; gi < 15; gi++) {
    cx.strokeStyle = 'rgba(20, 80, 45, 0.12)';
    cx.lineWidth = 1 + Math.random() * 2;
    cx.beginPath();
    cx.moveTo(Math.random() * w, 0);
    cx.lineTo(Math.random() * w, h);
    cx.stroke();
  }
  // Centre divider line
  cx.strokeStyle = 'rgba(15, 50, 30, 0.6)';
  cx.lineWidth = 3;
  cx.beginPath(); cx.moveTo(w / 2, 0); cx.lineTo(w / 2, h); cx.stroke();
});
var archDoorPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(doorW, archRadius),
  new THREE.MeshStandardMaterial({ map: archDoorTex, transparent: true, roughness: 0.7 })
);
archDoorPlane.position.set(doorCentre, archCentreY + archRadius / 2, 0.07);
bar.add(archDoorPlane);

// Centre divider strip
placeMesh(bar, new THREE.BoxGeometry(0.06, doorRectH, 0.1), greenDoorDark, doorCentre, doorBottom + doorRectH / 2, 0.1);

// ---- BLACK IRON NAIL STUDS (decorative patterns) ----
var studMat = blackIron;

// Border studs — running along edge of each door panel
for (var bSide = -1; bSide <= 1; bSide += 2) {
  var panelCx = doorCentre + bSide * doorW / 4;
  var panelHalfW = doorW / 4 - 0.08;
  // Vertical edges
  for (var sy = doorBottom + 0.15; sy < doorBottom + doorRectH - 0.05; sy += 0.22) {
    var stud = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), studMat);
    stud.position.set(panelCx - panelHalfW + 0.05, sy, 0.12);
    bar.add(stud);
    var stud2 = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), studMat);
    stud2.position.set(panelCx + panelHalfW - 0.05, sy, 0.12);
    bar.add(stud2);
  }
  // Top edge
  for (var sx = panelCx - panelHalfW + 0.15; sx < panelCx + panelHalfW - 0.1; sx += 0.22) {
    var studT = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), studMat);
    studT.position.set(sx, doorBottom + doorRectH - 0.1, 0.12);
    bar.add(studT);
  }
  // Bottom edge
  for (var sx2 = panelCx - panelHalfW + 0.15; sx2 < panelCx + panelHalfW - 0.1; sx2 += 0.22) {
    var studB = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), studMat);
    studB.position.set(sx2, doorBottom + 0.1, 0.12);
    bar.add(studB);
  }

  // Decorative stud pattern — diamond/star motif in each panel
  var patCy = doorBottom + doorRectH * 0.55;
  // Central diamond shape
  var diamondPts = [
    [0, 0.45], [0.25, 0.22], [0.35, 0], [0.25, -0.22], [0, -0.45],
    [-0.25, -0.22], [-0.35, 0], [-0.25, 0.22]
  ];
  for (var di = 0; di < diamondPts.length; di++) {
    var dp = diamondPts[di];
    var ds = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 6), studMat);
    ds.position.set(panelCx + dp[0], patCy + dp[1], 0.12);
    bar.add(ds);
    // Interpolate studs between this point and next
    var dp2 = diamondPts[(di + 1) % diamondPts.length];
    for (var interp = 0.33; interp < 1; interp += 0.33) {
      var ix = dp[0] + (dp2[0] - dp[0]) * interp;
      var iy = dp[1] + (dp2[1] - dp[1]) * interp;
      var is2 = new THREE.Mesh(new THREE.SphereGeometry(0.02, 5, 5), studMat);
      is2.position.set(panelCx + ix, patCy + iy, 0.12);
      bar.add(is2);
    }
  }
  // Inner diamond (smaller)
  for (var di2 = 0; di2 < diamondPts.length; di2++) {
    var dp3 = diamondPts[di2];
    var ds2 = new THREE.Mesh(new THREE.SphereGeometry(0.02, 5, 5), studMat);
    ds2.position.set(panelCx + dp3[0] * 0.5, patCy + dp3[1] * 0.5, 0.12);
    bar.add(ds2);
  }
  // Centre stud (larger)
  var centreStud = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), studMat);
  centreStud.position.set(panelCx, patCy, 0.13);
  bar.add(centreStud);

  // Upper flourish — arch-like stud curve above diamond
  for (var ui = 0; ui < 7; ui++) {
    var ua = Math.PI * ui / 6;
    var ux = Math.cos(ua) * 0.3;
    var uy = Math.sin(ua) * 0.18;
    var us = new THREE.Mesh(new THREE.SphereGeometry(0.02, 5, 5), studMat);
    us.position.set(panelCx + ux, patCy + 0.55 + uy, 0.12);
    bar.add(us);
  }
  // Lower flourish
  for (var li = 0; li < 7; li++) {
    var la = Math.PI + Math.PI * li / 6;
    var lx = Math.cos(la) * 0.3;
    var ly = Math.sin(la) * 0.18;
    var ls = new THREE.Mesh(new THREE.SphereGeometry(0.02, 5, 5), studMat);
    ls.position.set(panelCx + lx, patCy - 0.55 + ly, 0.12);
    bar.add(ls);
  }
}

// ---- Arch studs (following the horseshoe curve) ----
for (var asi = 0; asi < 16; asi++) {
  var aAngle = Math.PI * asi / 15;
  var asx = doorCentre + Math.cos(aAngle) * (archInnerR - 0.12);
  var asy = archCentreY + Math.sin(aAngle) * (archInnerR - 0.12);
  var arcStud = new THREE.Mesh(new THREE.SphereGeometry(0.03, 6, 6), studMat);
  arcStud.position.set(asx, asy, 0.12);
  bar.add(arcStud);
}

// ---- RING DOOR KNOCKERS (two black iron rings) ----
for (var rSide = -1; rSide <= 1; rSide += 2) {
  var ringX = doorCentre + rSide * doorW / 4;
  var ringY = doorBottom + doorRectH * 0.52;
  // Mounting plate
  var plate = new THREE.Mesh(new THREE.CircleGeometry(0.08, 12),
    new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.5, metalness: 0.4, side: THREE.DoubleSide }));
  plate.position.set(ringX, ringY, 0.12);
  bar.add(plate);
  // Ring
  var ring = new THREE.Mesh(new THREE.TorusGeometry(0.07, 0.015, 8, 16), blackIron);
  ring.position.set(ringX, ringY - 0.06, 0.14);
  bar.add(ring);
}

// ---- ORNATE TILE PANELS flanking the door ----
// Rich polychrome tiles like the reference — blue, red, gold, cream geometric patterns
var tilePanelTex = makeCanvasTexture(256, 512, function(cx, w, h) {
  cx.fillStyle = '#e8e0d0';
  cx.fillRect(0, 0, w, h);
  // Repeating tile grid
  var tileSize = 42;
  for (var ty = 0; ty < h; ty += tileSize) {
    for (var tx = 0; tx < w; tx += tileSize) {
      // Cream base
      cx.fillStyle = '#e0d8c4';
      cx.fillRect(tx + 1, ty + 1, tileSize - 2, tileSize - 2);
      // Blue border
      cx.strokeStyle = '#2a4a88';
      cx.lineWidth = 2;
      cx.strokeRect(tx + 3, ty + 3, tileSize - 6, tileSize - 6);
      // Centre motif — alternating patterns
      var pattern = ((Math.floor(tx / tileSize) + Math.floor(ty / tileSize)) % 4);
      var mid = tileSize / 2;
      if (pattern === 0) {
        // Red/blue star
        cx.fillStyle = '#b83030';
        cx.beginPath();
        for (var si = 0; si < 8; si++) {
          var sa = si * Math.PI / 4;
          var sr = si % 2 === 0 ? 14 : 7;
          cx.lineTo(tx + mid + Math.cos(sa) * sr, ty + mid + Math.sin(sa) * sr);
        }
        cx.closePath(); cx.fill();
        cx.fillStyle = '#2a4a88';
        cx.beginPath(); cx.arc(tx + mid, ty + mid, 4, 0, Math.PI * 2); cx.fill();
      } else if (pattern === 1) {
        // Blue/gold diamond with arabesques
        cx.fillStyle = '#2a4a88';
        cx.beginPath();
        cx.moveTo(tx + mid, ty + 6); cx.lineTo(tx + tileSize - 6, ty + mid);
        cx.lineTo(tx + mid, ty + tileSize - 6); cx.lineTo(tx + 6, ty + mid);
        cx.closePath(); cx.fill();
        cx.fillStyle = '#c8a040';
        cx.beginPath(); cx.arc(tx + mid, ty + mid, 5, 0, Math.PI * 2); cx.fill();
      } else if (pattern === 2) {
        // Floral cross in red/green
        cx.fillStyle = '#8a3020';
        cx.fillRect(tx + mid - 3, ty + 6, 6, tileSize - 12);
        cx.fillRect(tx + 6, ty + mid - 3, tileSize - 12, 6);
        cx.fillStyle = '#3a6a3a';
        cx.beginPath();
        cx.arc(tx + mid, ty + 8, 4, 0, Math.PI * 2); cx.fill();
        cx.beginPath();
        cx.arc(tx + mid, ty + tileSize - 8, 4, 0, Math.PI * 2); cx.fill();
        cx.beginPath();
        cx.arc(tx + 8, ty + mid, 4, 0, Math.PI * 2); cx.fill();
        cx.beginPath();
        cx.arc(tx + tileSize - 8, ty + mid, 4, 0, Math.PI * 2); cx.fill();
      } else {
        // Gold/blue interlocking arches
        cx.strokeStyle = '#c8a040';
        cx.lineWidth = 2;
        cx.beginPath(); cx.arc(tx + mid, ty + mid - 5, 10, 0, Math.PI); cx.stroke();
        cx.beginPath(); cx.arc(tx + mid, ty + mid + 5, 10, Math.PI, 0); cx.stroke();
        cx.fillStyle = '#2a4a88';
        cx.beginPath(); cx.arc(tx + mid, ty + mid, 3, 0, Math.PI * 2); cx.fill();
      }
      // Subtle grout line
      cx.strokeStyle = 'rgba(180, 165, 140, 0.4)';
      cx.lineWidth = 1;
      cx.strokeRect(tx, ty, tileSize, tileSize);
    }
  }
  // Weathering wash
  cx.fillStyle = 'rgba(190, 175, 145, 0.08)';
  cx.fillRect(0, 0, w, h);
});

var greenShutterMat = new THREE.MeshStandardMaterial({ color: 0x2a8a5a, roughness: 0.75 });
var greenShutterDark = new THREE.MeshStandardMaterial({ color: 0x1e6a42, roughness: 0.8 });
var winStoneMat = new THREE.MeshStandardMaterial({ color: 0xc8b888, roughness: 0.82 });
var winStoneDark = new THREE.MeshStandardMaterial({ color: 0xb0a070, roughness: 0.85 });
var winIron = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.55, metalness: 0.3 });
var winDark = new THREE.MeshStandardMaterial({ color: 0x0a0a12, roughness: 0.9 });

function addMoorishWindow(wx, wy, ww, wh, hasShutter) {
  var archR = ww / 2;
  var rectH = wh - archR;   // rectangular portion below the arch
  var archCY = wy + rectH / 2;  // where arch springs from (top of rect portion)

  // ---- Dark opening (rectangular + arch) ----
  placeMesh(bar, new THREE.BoxGeometry(ww, rectH, 0.1), winDark, wx, wy - archR / 2, -0.03);
  // Arch dark fill (semicircle)
  var archDarkTex = makeCanvasTexture(64, 32, function(cx, cw, ch) {
    cx.fillStyle = '#0a0a12';
    cx.beginPath();
    cx.arc(cw / 2, ch, cw / 2, Math.PI, 0);
    cx.fill();
  });
  var archDarkPlane = new THREE.Mesh(new THREE.PlaneGeometry(ww, archR),
    new THREE.MeshBasicMaterial({ map: archDarkTex, transparent: true }));
  archDarkPlane.position.set(wx, archCY + archR / 2, -0.02);
  bar.add(archDarkPlane);

  // ---- Stone horseshoe arch surround ----
  var archSegs = 14;
  var innerR = archR;
  var outerR = archR + 0.12;
  for (var ai = 0; ai <= archSegs; ai++) {
    var angle = Math.PI * ai / archSegs;
    var ax = wx + Math.cos(angle) * (innerR + outerR) / 2;
    var ay = archCY + Math.sin(angle) * (innerR + outerR) / 2;
    var bW = 0.18;
    var bH = outerR - innerR;
    var aBlock = new THREE.Mesh(new THREE.BoxGeometry(bW, bH, 0.12),
      ai % 2 === 0 ? winStoneMat : winStoneDark);
    aBlock.position.set(ax, ay, 0.04);
    aBlock.rotation.z = angle - Math.PI / 2;
    bar.add(aBlock);
  }

  // ---- Stone frame (sides and sill) ----
  placeMesh(bar, new THREE.BoxGeometry(0.1, rectH + 0.1, 0.12), winStoneMat, wx - ww / 2 - 0.06, wy - archR / 2, 0.04);
  placeMesh(bar, new THREE.BoxGeometry(0.1, rectH + 0.1, 0.12), winStoneMat, wx + ww / 2 + 0.06, wy - archR / 2, 0.04);
  // Sill
  placeMesh(bar, new THREE.BoxGeometry(ww + 0.35, 0.1, 0.18), winStoneDark, wx, wy - wh / 2 - 0.05, 0.06);

  // ---- Iron grille (Moorish pattern) ----
  // Vertical bars
  var barCount = Math.floor(ww / 0.15);
  for (var bi = 0; bi <= barCount; bi++) {
    var bx = wx - ww / 2 + 0.06 + bi * ((ww - 0.12) / barCount);
    placeMesh(bar, new THREE.BoxGeometry(0.025, rectH - 0.1, 0.04), winIron, bx, wy - archR / 2, 0.05);
  }
  // Horizontal bars
  var hBarCount = Math.floor(rectH / 0.25);
  for (var hi = 0; hi <= hBarCount; hi++) {
    var hy = wy - wh / 2 + 0.1 + hi * ((rectH - 0.15) / hBarCount);
    placeMesh(bar, new THREE.BoxGeometry(ww - 0.08, 0.025, 0.04), winIron, wx, hy, 0.05);
  }
  // Arch grille — radiating spokes from centre
  for (var si = 1; si < 6; si++) {
    var sAngle = Math.PI * si / 6;
    var sx1 = wx, sy1 = archCY;
    var sx2 = wx + Math.cos(sAngle) * (archR - 0.06);
    var sy2 = archCY + Math.sin(sAngle) * (archR - 0.06);
    var sdx = sx2 - sx1, sdy = sy2 - sy1;
    var sLen = Math.sqrt(sdx * sdx + sdy * sdy);
    var spoke = new THREE.Mesh(new THREE.BoxGeometry(0.02, sLen, 0.035), winIron);
    spoke.position.set((sx1 + sx2) / 2, (sy1 + sy2) / 2, 0.05);
    spoke.rotation.z = Math.atan2(sdx, sdy);
    bar.add(spoke);
  }
  // Arch ring (inner iron ring following the curve)
  for (var ri = 0; ri < 10; ri++) {
    var rAngle = Math.PI * ri / 9;
    var rx = wx + Math.cos(rAngle) * (archR * 0.55);
    var ry = archCY + Math.sin(rAngle) * (archR * 0.55);
    var rAngle2 = Math.PI * (ri + 1) / 9;
    var rx2 = wx + Math.cos(rAngle2) * (archR * 0.55);
    var ry2 = archCY + Math.sin(rAngle2) * (archR * 0.55);
    var rdx = rx2 - rx, rdy = ry2 - ry;
    var rLen = Math.sqrt(rdx * rdx + rdy * rdy);
    var ringSeg = new THREE.Mesh(new THREE.BoxGeometry(rLen, 0.02, 0.035), winIron);
    ringSeg.position.set((rx + rx2) / 2, (ry + ry2) / 2, 0.05);
    ringSeg.rotation.z = Math.atan2(rdy, rdx);
    bar.add(ringSeg);
  }

  // ---- Green shutters ----
  if (hasShutter) {
    // Two shutters, one slightly ajar (angled)
    for (var shSide = -1; shSide <= 1; shSide += 2) {
      var shX = wx + shSide * (ww / 2 + 0.02);
      var shutter = new THREE.Group();
      // Main panel
      var shPanel = new THREE.Mesh(new THREE.BoxGeometry(ww / 2 - 0.02, rectH - 0.05, 0.04), greenShutterMat);
      shutter.add(shPanel);
      // Horizontal slats
      for (var slat = 0; slat < 5; slat++) {
        var slatY = -rectH / 2 + 0.2 + slat * (rectH - 0.4) / 4;
        var slatMesh = new THREE.Mesh(new THREE.BoxGeometry(ww / 2 - 0.08, 0.03, 0.05), greenShutterDark);
        slatMesh.position.set(0, slatY, 0.01);
        shutter.add(slatMesh);
      }
      shutter.position.set(shX, wy - archR / 2, 0.06);
      // Open angle — left shutter more open
      if (shSide === -1) {
        shutter.rotation.y = -0.6;
        shutter.position.x = shX - 0.15;
        shutter.position.z = 0.2;
      } else {
        shutter.rotation.y = 0.25;
        shutter.position.x = shX + 0.05;
        shutter.position.z = 0.12;
      }
      bar.add(shutter);
    }
  }

  // ---- Small tile accent below window ----
  var winTileTex = makeCanvasTexture(64, 16, function(cx, cw, ch) {
    for (var ti = 0; ti < cw; ti += 8) {
      cx.fillStyle = ti % 16 === 0 ? '#2a4a88' : '#e0d8c4';
      cx.fillRect(ti, 0, 7, ch);
      if (ti % 16 === 0) {
        cx.fillStyle = '#c8a040';
        cx.beginPath(); cx.arc(ti + 4, ch / 2, 2, 0, Math.PI * 2); cx.fill();
      }
    }
  });
  var winTile = new THREE.Mesh(new THREE.PlaneGeometry(ww + 0.2, 0.12),
    new THREE.MeshBasicMaterial({ map: winTileTex }));
  winTile.position.set(wx, wy - wh / 2 - 0.14, 0.04);
  bar.add(winTile);
}

// Iron grille — star pattern

// Inner iron ring
var oRingSegs = 12;
for (var ori = 0; ori < oRingSegs; ori++) {
  var orA1 = Math.PI * 2 * ori / oRingSegs;
  var orA2 = Math.PI * 2 * (ori + 1) / oRingSegs;
  var orR = oculusR * 0.55;
  var orx1 = Math.cos(orA1) * orR, ory1 = Math.sin(orA1) * orR;
  var orx2 = Math.cos(orA2) * orR, ory2 = Math.sin(orA2) * orR;
  var ordx = orx2 - orx1, ordy = ory2 - ory1;
  var orLen = Math.sqrt(ordx * ordx + ordy * ordy);
  var orSeg = new THREE.Mesh(new THREE.BoxGeometry(orLen, 0.02, 0.03), winIron);
  orSeg.position.set((orx1 + orx2) / 2, 7.0 + (ory1 + ory2) / 2, 0.04);
  orSeg.rotation.z = Math.atan2(ordy, ordx);
  bar.add(orSeg);
}

// ---- DECORATIVE TILE PANELS ----
function makeTilePanel(subject) {
  return makeCanvasTexture(128, 128, function(cx, w, h) {
    cx.fillStyle = '#e8e0d0';
    cx.fillRect(0, 0, w, h);
    cx.strokeStyle = '#2a5588';
    cx.lineWidth = 5;
    cx.strokeRect(4, 4, w - 8, h - 8);
    cx.lineWidth = 1.5;
    cx.strokeRect(10, 10, w - 20, h - 20);
    // Weathered wash
    cx.fillStyle = 'rgba(200, 185, 155, 0.15)';
    cx.fillRect(0, 0, w, h);
    if (subject === 'camel') {
      cx.fillStyle = '#b08050';
      cx.fillRect(38, 55, 48, 28);
      cx.beginPath(); cx.arc(76, 48, 10, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#d0a070';
      cx.fillRect(28, 82, 72, 6);
      cx.fillStyle = '#3a7a44';
      cx.beginPath(); cx.arc(28, 52, 12, 0, Math.PI * 2); cx.fill();
    } else if (subject === 'boat') {
      cx.fillStyle = '#4a88aa';
      cx.fillRect(22, 68, 84, 16);
      cx.fillStyle = '#7a4520';
      cx.beginPath();
      cx.moveTo(38, 62); cx.lineTo(90, 62); cx.lineTo(82, 48); cx.lineTo(48, 48);
      cx.closePath(); cx.fill();
      cx.fillStyle = '#e8e0d0';
      cx.fillRect(62, 32, 3, 30);
      cx.beginPath(); cx.moveTo(65, 32); cx.lineTo(80, 48); cx.lineTo(65, 48); cx.closePath(); cx.fill();
    } else if (subject === 'mosque') {
      cx.fillStyle = '#d0c8b0';
      cx.fillRect(42, 42, 44, 46);
      cx.fillStyle = '#4a88aa';
      cx.beginPath(); cx.arc(64, 42, 22, Math.PI, 0); cx.fill();
      cx.fillRect(62, 22, 5, 22);
      cx.fillStyle = '#d0a070';
      cx.fillRect(28, 82, 72, 6);
    } else if (subject === 'fish') {
      cx.fillStyle = '#4a88aa';
      cx.fillRect(20, 55, 88, 30);
      cx.fillStyle = '#708850';
      cx.beginPath();
      cx.moveTo(40, 50); cx.quadraticCurveTo(64, 35, 88, 50);
      cx.quadraticCurveTo(64, 65, 40, 50); cx.fill();
      cx.fillStyle = '#222';
      cx.beginPath(); cx.arc(78, 48, 2, 0, Math.PI * 2); cx.fill();
    }
  });
}

var bougTex = makeCanvasTexture(64, 64, function(cx, w, h) {

// Helper: draw a vine segment (curved cylinder chain)
function addVine(points, thickness) {
  for (var vi = 0; vi < points.length - 1; vi++) {
    var p0 = points[vi], p1 = points[vi + 1];
    var dx = p1[0] - p0[0], dy = p1[1] - p0[1], dz = p1[2] - p0[2];
    var len = Math.sqrt(dx * dx + dy * dy + dz * dz);
    var t = thickness * (1 - vi * 0.08);
    if (t < 0.01) t = 0.01;
    var seg = new THREE.Mesh(new THREE.CylinderGeometry(t * 0.7, t, len, 5), vi % 2 === 0 ? vineMat : vineMatLight);
    seg.position.set((p0[0] + p1[0]) / 2, (p0[1] + p1[1]) / 2, (p0[2] + p1[2]) / 2);
    // Orient toward next point
    seg.lookAt(new THREE.Vector3(p1[0], p1[1], p1[2]));
    seg.rotateX(Math.PI / 2);
    seg.castShadow = true;
    scene.add(seg);
  }
}

// Helper: add a leaf at position
function addLeaf(x, y, z, scale, rot) {
  var leaf = new THREE.Mesh(
    new THREE.PlaneGeometry(0.15 * scale, 0.25 * scale),
    Math.random() < 0.5 ? vineLeafMat : vineLeafLight
  );
  leaf.position.set(x, y, z);
  leaf.rotation.set(rot || Math.random() * 0.5, Math.random() * Math.PI * 2, Math.random() * 0.8);
  scene.add(leaf);
}

}

// ============================================================
// ANIMATION LOOP
// ============================================================
var clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();

  // Smoke particles — rise, drift, fade in/out, loop
  for (var i = 0; i < smokeParticles.length; i++) {
    var sp = smokeParticles[i];
    sp.life += 1;
    if (sp.life > sp.maxLife) {
      // Reset particle
      sp.life = 0;
      sp.sprite.position.set(sp.baseX, sp.sprite.position.y < 0.5 ? 0.45 : 0.88, sp.baseZ);
      sp.sprite.scale.set(0.05, 0.05, 1);
      sp.mat.opacity = 0;
      sp.driftX = (Math.random() - 0.5) * 0.004;
      sp.driftZ = (Math.random() - 0.5) * 0.003;
    }
    var lifeRatio = sp.life / sp.maxLife;
    // Rise
    sp.sprite.position.y += sp.riseSpeed * (1 - lifeRatio * 0.5);
    // Drift sideways with wobble
    sp.sprite.position.x += sp.driftX + Math.sin(t * sp.wobbleSpeed + sp.wobblePhase) * sp.wobbleAmt * 0.1;
    sp.sprite.position.z += sp.driftZ;
    // Scale up as it rises — bigger puffs
    var sc = 0.1 + lifeRatio * 0.7;
    sp.sprite.scale.set(sc, sc * (1.3 + lifeRatio * 0.6), 1);
    // Fade: appear quickly, linger, fade out — MORE OPAQUE
    if (lifeRatio < 0.08) {
      sp.mat.opacity = lifeRatio * 7;
    } else if (lifeRatio > 0.5) {
      sp.mat.opacity = (1 - lifeRatio) * 1.2;
    } else {
      sp.mat.opacity = 0.55;
    }
  }

  // Heat haze drift
  for (var i = 0; i < hazeSprites.length; i++) {
    var h = hazeSprites[i];
    h.sway += h.swaySpeed;
    h.sprite.position.x = h.baseX + Math.sin(h.sway) * h.swayAmt;
    h.baseX += h.drift;
    if (h.baseX > 15) h.baseX = -15;
  }

  // Sunlight variation (passing clouds)
  sunLight.intensity = 1.4 + Math.sin(t * 0.3) * 0.1;

  // Lantern flicker
  lantern1.intensity = 0.35 + Math.sin(t * 3.7) * 0.04 + Math.sin(t * 7.1) * 0.02;
  lantern2.intensity = 0.35 + Math.sin(t * 4.1) * 0.04 + Math.sin(t * 6.3) * 0.02;

  // Incense ember glow pulse
  incenseGlow.intensity = 0.15 + Math.sin(t * 2.3) * 0.05 + Math.sin(t * 5.7) * 0.03;
  incenseEmber.material.color.setHex(Math.sin(t * 3) > 0 ? 0xcc4400 : 0xdd5510);

  // Cigarette ember flicker
  ember1.material.color.setHex(Math.sin(t * 4.5 + 1) > 0.3 ? 0xff6620 : 0xcc4410);
  ember2.material.color.setHex(Math.sin(t * 3.8 + 2) > 0.2 ? 0xff6620 : 0xcc4410);

  renderer.render(scene, camera);
}

animate();
</script>
