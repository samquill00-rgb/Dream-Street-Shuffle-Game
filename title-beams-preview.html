<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Title Beams Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
body, html { margin:0; padding:0; background:black; min-height:100vh; overflow:hidden; }
</style>
</head>
<body>

<!-- Three angled light beams from different edges -->
<div style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;">
<svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="none">
<defs>
  <!-- Beam 1: upper-left, angling down-right -->
  <linearGradient id="beam1g" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#8a9bae" stop-opacity="0.22"/>
    <stop offset="40%" stop-color="#8a9bae" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#8a9bae" stop-opacity="0"/>
  </linearGradient>
  <!-- Beam 2: right side, angling left -->
  <linearGradient id="beam2g" x1="1" y1="0" x2="0" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#8a9bae" stop-opacity="0.18"/>
    <stop offset="35%" stop-color="#8a9bae" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#8a9bae" stop-opacity="0"/>
  </linearGradient>
  <!-- Beam 3: lower-left, angling up-right -->
  <linearGradient id="beam3g" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
    <stop offset="0%" stop-color="#8a9bae" stop-opacity="0.16"/>
    <stop offset="45%" stop-color="#8a9bae" stop-opacity="0.05"/>
    <stop offset="100%" stop-color="#8a9bae" stop-opacity="0"/>
  </linearGradient>
</defs>

<!-- Beam 1: from upper-left corner, narrow shaft angling down across -->
<polygon points="0,80 0,140 650,520 620,470" fill="url(#beam1g)"/>
<polygon points="0,60 0,160 680,540 600,450" fill="url(#beam1g)" opacity="0.4"/>

<!-- Beam 2: from right edge, mid-height, cutting left and slightly down -->
<polygon points="1000,320 1000,380 300,580 330,540" fill="url(#beam2g)"/>
<polygon points="1000,300 1000,400 270,600 350,520" fill="url(#beam2g)" opacity="0.4"/>

<!-- Beam 3: from lower-left, angling up across -->
<polygon points="0,850 0,920 700,500 670,460" fill="url(#beam3g)"/>
<polygon points="0,830 0,940 730,520 650,440" fill="url(#beam3g)" opacity="0.4"/>

</svg>
</div>

<!-- Title content (same as in game) -->
<div style="text-align: center; margin-top: 35vh; color: #d4c4b0; position: relative; z-index: 1;">
<div style="font-family: 'Playfair Display', Georgia, serif; font-size: 3.5em; letter-spacing: 0.1em; line-height: 1.3; text-shadow: 0 0 30px rgba(212, 165, 116, 0.4);">DREAM STREET<br>SHUFFLE</div>
<div style="font-family: 'Crimson Text', Georgia, serif; font-size: 1.2em; margin-top: 1.5em; color: #a08060;">by Three Blue Posts</div>
<div style="margin-top: 3em; font-family: 'Crimson Text', Georgia, serif;"><a href="#" style="color: #d4c4b0; text-decoration: none;">Begin</a></div>
</div>

</body>
</html>
