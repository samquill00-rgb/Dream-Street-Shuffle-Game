<!DOCTYPE html>
<html>
<head>
<style>
body { background: #0a0a12; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 40px; }
.container { display: flex; gap: 60px; align-items: flex-start; }
.label { color: #c8a86a; font-family: monospace; text-align: center; margin-bottom: 10px; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
<div>
<div class="label">REBUILT from second reference</div>
<svg xmlns="http://www.w3.org/2000/svg" width="145" height="720" style="overflow:visible;">
<defs>
  <radialGradient id="lampGlow" cx="55%" cy="6%" r="45%">
    <stop offset="0%" stop-color="#d4a060" stop-opacity="0.55"/>
    <stop offset="25%" stop-color="#c89060" stop-opacity="0.25"/>
    <stop offset="60%" stop-color="#c89060" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#c89060" stop-opacity="0"/>
  </radialGradient>
</defs>

<!-- Warm glow behind lantern -->
<rect x="-10" y="-40" width="180" height="250" fill="url(#lampGlow)"/>

<g fill="none" stroke="#c8a86a" stroke-linecap="round" stroke-linejoin="round">

  <!-- === FINIAL (small circle at very top) === -->
  <circle cx="90" cy="26" r="3.5" stroke-width="1.5"/>

  <!-- Short stem below finial, with a tiny drip/bead -->
  <line x1="90" y1="29.5" x2="90" y2="38" stroke-width="1.2"/>
  <!-- Tiny drip dots on stem (visible in reference) -->
  <circle cx="90" cy="34" r="1" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- === LANTERN HOUSING — rectangular with peaked roof === -->
  <!-- Peaked roof (triangle) -->
  <line x1="90" y1="38" x2="72" y2="56" stroke-width="1.8"/>
  <line x1="90" y1="38" x2="108" y2="56" stroke-width="1.8"/>
  <!-- Top rail -->
  <line x1="70" y1="56" x2="110" y2="56" stroke-width="1.6"/>
  <!-- Left side -->
  <line x1="72" y1="56" x2="72" y2="108" stroke-width="1.6"/>
  <!-- Right side -->
  <line x1="108" y1="56" x2="108" y2="108" stroke-width="1.6"/>
  <!-- Bottom rail -->
  <line x1="70" y1="108" x2="110" y2="108" stroke-width="1.6"/>

  <!-- Mullions inside the glass (cross pattern) -->
  <!-- Vertical centre mullion -->
  <line x1="90" y1="56" x2="90" y2="108" stroke-width="1.0"/>
  <!-- Horizontal centre mullion -->
  <line x1="72" y1="82" x2="108" y2="82" stroke-width="1.0"/>

  <!-- === ARM — gentle single curve bowing LEFT from lantern to post === -->
  <!-- The arm starts at lantern bottom-centre, curves out to the left, -->
  <!-- then sweeps back right to meet the main post -->
  <path d="M90,108 C88,130 60,155 58,180 C56,210 80,230 105,240" stroke-width="2.2"/>

  <!-- Small scroll/butterfly where arm meets post -->
  <!-- Left loop -->
  <path d="M94,236 C86,228 78,228 78,236 C78,244 86,244 94,236" stroke-width="1.2"/>
  <!-- Right loop -->
  <path d="M106,236 C114,228 122,228 122,236 C122,244 114,244 106,236" stroke-width="1.2"/>

  <!-- === MAIN POST — straight vertical line on the RIGHT side === -->
  <line x1="100" y1="244" x2="100" y2="700" stroke-width="2.8"/>

  <!-- === FIRST DECORATIVE ELEMENT (upper) — on LEFT side of post === -->
  <!-- Small scroll above -->
  <path d="M88,370 C80,362 74,362 74,370 C74,378 80,378 88,370" stroke-width="1.1"/>
  <!-- Horizontal ellipse collar -->
  <ellipse cx="100" cy="380" rx="14" ry="4.5" stroke-width="1.3"/>

  <!-- === SECOND DECORATIVE ELEMENT (lower) — on LEFT side of post === -->
  <!-- Small scroll above -->
  <path d="M88,510 C80,502 74,502 74,510 C74,518 80,518 88,510" stroke-width="1.1"/>
  <!-- Horizontal ellipse collar -->
  <ellipse cx="100" cy="520" rx="14" ry="4.5" stroke-width="1.3"/>

  <!-- === BASE FOOT — small rectangle at bottom === -->
  <rect x="90" y="694" width="20" height="6" rx="1" stroke-width="1.3"/>

</g>
</svg>
</div>
</div>
</body>
</html>
