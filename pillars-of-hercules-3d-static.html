<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Pillars of Hercules — Greek Street, Soho, 1973</title>
<style>
* { margin: 0; padding: 0; }
body { background: #000; overflow: hidden; }
canvas { display: block; }
#datestamp {
  position: absolute; top: 18px; right: 24px;
  font: 14px monospace; color: rgba(255,140,50,0.55);
  pointer-events: none;
}
#location {
  position: absolute; bottom: 18px; left: 50%;
  transform: translateX(-50%);
  font: 12px 'Courier New', monospace; color: rgba(200,180,140,0.4);
  letter-spacing: 2px; pointer-events: none;
}
</style>
</head>
<body>
<div id="datestamp">23.11.73</div>
<div id="location">GREEK STREET, SOHO</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// SCENE SETUP
// ============================================================
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a12);
scene.fog = new THREE.Fog(0x0a0a12, 5, 40);

var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);

// ============================================================
// LAYOUT EXPLANATION
// ============================================================
// The Pillars of Hercules faces the camera straight on.
// Facade runs along X (roughly x=-4 to x=4), facing +Z.
// Camera is at +Z looking back at the building.
// Alleyway is on the LEFT side (negative X).
// Neighbouring buildings: cream/yellow to left of alley, pink/brown to right.
// Building body extends into -Z (behind facade).

camera.position.set(0, 3.5, 16);
camera.lookAt(0, 5, 0);

var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping || THREE.LinearToneMapping;
renderer.toneMappingExposure = 0.55;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// MATERIALS
// ============================================================
var darkTimber = new THREE.MeshStandardMaterial({ color: 0x2a2018, roughness: 0.92 });
var whitePlaster = new THREE.MeshStandardMaterial({ color: 0xc8b89a, roughness: 0.95 });
var mahogany = new THREE.MeshStandardMaterial({ color: 0x3d1e14, roughness: 0.82 });
var mahoganyDark = new THREE.MeshStandardMaterial({ color: 0x2e1510, roughness: 0.88 });
var pavementMat = new THREE.MeshStandardMaterial({ color: 0x2e2e2c, roughness: 0.7, metalness: 0.15 });
var roadMat = new THREE.MeshStandardMaterial({ color: 0x141412, roughness: 0.55, metalness: 0.2 });
var windowFrame = new THREE.MeshStandardMaterial({ color: 0x8a7e60, roughness: 0.88 });
var darkGlass = new THREE.MeshStandardMaterial({ color: 0x0a0a12, roughness: 0.3, metalness: 0.2 });
var goldMat = new THREE.MeshStandardMaterial({ color: 0xa88830, roughness: 0.5, metalness: 0.3 });

// ============================================================
// HELPER: canvas texture
// ============================================================
function makeCanvasTexture(w, h, drawFunc) {
  var c = document.createElement('canvas');
  c.width = w; c.height = h;
  var cx = c.getContext('2d');
  drawFunc(cx, w, h);
  var tex = new THREE.CanvasTexture(c);
  tex.minFilter = THREE.LinearFilter;
  return tex;
}

function placeMesh(group, geo, mat, x, y, z) {
  var m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  group.add(m);
  return m;
}

// ============================================================
// GROUND
// ============================================================
var ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), pavementMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Greek Street road (runs along Z in front of the pub)
var road = new THREE.Mesh(new THREE.PlaneGeometry(8, 60), roadMat);
road.rotation.x = -Math.PI / 2;
road.position.set(0, -0.01, 10);
road.receiveShadow = true;
scene.add(road);

// Wet road surface — just stopped raining, everything glistening
var wetMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a1a, roughness: 0.1, metalness: 0.6, transparent: true, opacity: 0.3
});
var wetRoad = new THREE.Mesh(new THREE.PlaneGeometry(20, 20), wetMat);
wetRoad.rotation.x = -Math.PI / 2;
wetRoad.position.set(0, 0.01, 8);
scene.add(wetRoad);

// Wet pavement sheen (closer to buildings — rain-slicked flagstones)
var wetPaveMat = new THREE.MeshStandardMaterial({
  color: 0x222228, roughness: 0.12, metalness: 0.55, transparent: true, opacity: 0.25
});
var wetPave = new THREE.Mesh(new THREE.PlaneGeometry(30, 4), wetPaveMat);
wetPave.rotation.x = -Math.PI / 2;
wetPave.position.set(0, 0.08, 2);
scene.add(wetPave);

// ============================================================
// THE PILLARS OF HERCULES
// ============================================================
var pub = new THREE.Group();

// ---- WHITE PLASTER BASE WALL (behind the timber) ----
// Main building body: x from -1.5 to 4, facade at z=0 facing +Z
// Building depth goes into -Z
var plasterWall = new THREE.Mesh(new THREE.BoxGeometry(5.5, 9, 7), whitePlaster);
plasterWall.position.set(1.25, 8, -3.5);
pub.add(plasterWall);

// ---- TWIN GABLES AT THE TOP ----
// These are the distinctive peaked roofs at the very top

// Left gable
var gableFrameL = new THREE.Mesh(new THREE.BoxGeometry(2.4, 1.6, 0.25), darkTimber);
gableFrameL.position.set(-0.2, 13.3, 0.15);
pub.add(gableFrameL);
var gableTopL = new THREE.Mesh(new THREE.ConeGeometry(1.6, 1.4, 4), darkTimber);
gableTopL.position.set(-0.2, 14.6, 0.15);
gableTopL.rotation.y = Math.PI / 4;
pub.add(gableTopL);
// White infill
var gableFillL = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 1.2), whitePlaster);
gableFillL.position.set(-0.2, 13.3, 0.32);
pub.add(gableFillL);

// Right gable
var gableFrameR = new THREE.Mesh(new THREE.BoxGeometry(2.4, 1.6, 0.25), darkTimber);
gableFrameR.position.set(2.7, 13.3, 0.15);
pub.add(gableFrameR);
var gableTopR = new THREE.Mesh(new THREE.ConeGeometry(1.6, 1.4, 4), darkTimber);
gableTopR.position.set(2.7, 14.6, 0.15);
gableTopR.rotation.y = Math.PI / 4;
pub.add(gableTopR);
var gableFillR = new THREE.Mesh(new THREE.PlaneGeometry(1.8, 1.2), whitePlaster);
gableFillR.position.set(2.7, 13.3, 0.32);
pub.add(gableFillR);

// Small gable windows
var gableWinMatL = new THREE.MeshBasicMaterial({ color: 0xffd699, transparent: true, opacity: 0.3 });
placeMesh(pub, new THREE.PlaneGeometry(0.5, 0.8), gableWinMatL, -0.2, 13.3, 0.35);
placeMesh(pub, new THREE.BoxGeometry(0.6, 0.9, 0.04), darkTimber, -0.2, 13.3, 0.3);
var gableWinMatR = new THREE.MeshBasicMaterial({ color: 0xffd699, transparent: true, opacity: 0.25 });
placeMesh(pub, new THREE.PlaneGeometry(0.5, 0.8), gableWinMatR, 2.7, 13.3, 0.35);
placeMesh(pub, new THREE.BoxGeometry(0.6, 0.9, 0.04), darkTimber, 2.7, 13.3, 0.3);

// ---- HORIZONTAL TIMBER BEAMS (floor divisions) ----
// Clean main beams at each floor level — matching guide proportions
var beamHeights = [3.7, 7.0, 9.5, 12.5];
for (var bi = 0; bi < beamHeights.length; bi++) {
  var beam = new THREE.Mesh(new THREE.BoxGeometry(5.8, 0.18, 0.15), darkTimber);
  beam.position.set(1.25, beamHeights[bi], 0.22);
  pub.add(beam);
}

// ---- VERTICAL TIMBER POSTS ----
// 5 evenly-spaced structural posts (matching guide: edges + centre + quarters)
var postXs = [-1.3, 0.0, 1.25, 2.5, 3.8];
for (var pi = 0; pi < postXs.length; pi++) {
  // Lower section (1st + 2nd floor)
  var post1 = new THREE.Mesh(new THREE.BoxGeometry(0.15, 5.6, 0.15), darkTimber);
  post1.position.set(postXs[pi], 6.5, 0.22);
  pub.add(post1);
  // Upper section (3rd floor)
  var post2 = new THREE.Mesh(new THREE.BoxGeometry(0.15, 2.8, 0.15), darkTimber);
  post2.position.set(postXs[pi], 11, 0.22);
  pub.add(post2);
}

// ---- DECORATIVE X-BRACES (Tudor cross pattern) ----
// Placed only at the outer bays and one central — clean, orderly layout
function addXBrace(cx, cy, w, h) {
  var diagLen = Math.sqrt(w * w + h * h);
  var d1 = new THREE.Mesh(new THREE.BoxGeometry(0.08, diagLen, 0.1), darkTimber);
  d1.position.set(cx, cy, 0.22);
  d1.rotation.z = Math.atan2(w, h);
  pub.add(d1);
  var d2 = new THREE.Mesh(new THREE.BoxGeometry(0.08, diagLen, 0.1), darkTimber);
  d2.position.set(cx, cy, 0.22);
  d2.rotation.z = -Math.atan2(w, h);
  pub.add(d2);
}
// 2nd floor: X-braces in outer bays only
addXBrace(-0.65, 8.2, 0.8, 2.0);
addXBrace(3.15, 8.2, 0.8, 2.0);
// 3rd floor: X-braces in outer bays + one central
addXBrace(-0.65, 11, 0.8, 2.5);
addXBrace(3.15, 11, 0.8, 2.5);
addXBrace(1.25, 11, 1.0, 2.5);

// ---- DIAMOND PATTERN TIMBER (decorative panels between windows) ----
function addDiamond(cx, cy, size) {
  var d = new THREE.Mesh(new THREE.BoxGeometry(0.06, size * 1.4, 0.08), darkTimber);
  d.position.set(cx, cy, 0.24);
  d.rotation.z = Math.PI / 4;
  pub.add(d);
  var d2 = new THREE.Mesh(new THREE.BoxGeometry(0.06, size * 1.4, 0.08), darkTimber);
  d2.position.set(cx, cy, 0.24);
  d2.rotation.z = -Math.PI / 4;
  pub.add(d2);
}
// Diamonds only in the inner bays (between the X-braces) — 4 total
addDiamond(0.6, 8.2, 0.6);
addDiamond(1.9, 8.2, 0.6);
addDiamond(0.6, 11, 0.6);
addDiamond(1.9, 11, 0.6);

// ---- UPPER FLOOR WINDOWS (leaded glass style) ----
var sillMat = new THREE.MeshStandardMaterial({ color: 0xc8c0b0, roughness: 0.8 });

// 2nd floor windows — with sills, lintels, and glazing bars
for (var w2x = -0.2; w2x <= 2.8; w2x += 1.0) {
  var isLit = Math.random() < 0.6;
  // Glass glow
  var w2 = new THREE.Mesh(new THREE.PlaneGeometry(0.65, 1.2),
    new THREE.MeshBasicMaterial({ color: 0xffd699, transparent: true, opacity: isLit ? 0.45 : 0.2 }));
  w2.position.set(w2x, 10.8, 0.32);
  pub.add(w2);
  // Timber frame
  var w2f = new THREE.Mesh(new THREE.BoxGeometry(0.75, 1.3, 0.04), darkTimber);
  w2f.position.set(w2x, 10.8, 0.28);
  pub.add(w2f);
  // Glazing bars (leaded glass pattern — 2 vertical, 2 horizontal)
  placeMesh(pub, new THREE.BoxGeometry(0.02, 1.2, 0.02), darkTimber, w2x - 0.15, 10.8, 0.34);
  placeMesh(pub, new THREE.BoxGeometry(0.02, 1.2, 0.02), darkTimber, w2x + 0.15, 10.8, 0.34);
  placeMesh(pub, new THREE.BoxGeometry(0.65, 0.02, 0.02), darkTimber, w2x, 10.5, 0.34);
  placeMesh(pub, new THREE.BoxGeometry(0.65, 0.02, 0.02), darkTimber, w2x, 11.1, 0.34);
  // Stone sill below
  placeMesh(pub, new THREE.BoxGeometry(0.85, 0.06, 0.12), sillMat, w2x, 10.15, 0.3);
  // Timber lintel above
  placeMesh(pub, new THREE.BoxGeometry(0.85, 0.08, 0.1), darkTimber, w2x, 11.45, 0.28);
}

// 1st floor windows (bigger, more warm light — the main pub floors)
for (var w1x = -0.2; w1x <= 2.8; w1x += 1.0) {
  var isLit1 = Math.random() < 0.7;
  // Glass glow
  var w1 = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 1.4),
    new THREE.MeshBasicMaterial({ color: 0xffd699, transparent: true, opacity: isLit1 ? 0.5 : 0.2 }));
  w1.position.set(w1x, 5.5, 0.32);
  pub.add(w1);
  // Timber frame
  var w1f = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.5, 0.04), darkTimber);
  w1f.position.set(w1x, 5.5, 0.28);
  pub.add(w1f);
  // Glazing bars (cross pattern — more detailed leaded glass)
  placeMesh(pub, new THREE.BoxGeometry(0.02, 1.4, 0.02), darkTimber, w1x, 5.5, 0.34);
  placeMesh(pub, new THREE.BoxGeometry(0.02, 1.4, 0.02), darkTimber, w1x - 0.18, 5.5, 0.34);
  placeMesh(pub, new THREE.BoxGeometry(0.02, 1.4, 0.02), darkTimber, w1x + 0.18, 5.5, 0.34);
  placeMesh(pub, new THREE.BoxGeometry(0.7, 0.02, 0.02), darkTimber, w1x, 5.5, 0.34);
  placeMesh(pub, new THREE.BoxGeometry(0.7, 0.02, 0.02), darkTimber, w1x, 5.15, 0.34);
  placeMesh(pub, new THREE.BoxGeometry(0.7, 0.02, 0.02), darkTimber, w1x, 5.85, 0.34);
  // Stone sill below
  placeMesh(pub, new THREE.BoxGeometry(0.9, 0.07, 0.14), sillMat, w1x, 4.75, 0.3);
  // Timber lintel above
  placeMesh(pub, new THREE.BoxGeometry(0.9, 0.1, 0.1), darkTimber, w1x, 6.28, 0.28);
}

// ---- HERCULES FIGURE (mounted between upper floors) ----
var hercBody = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.06, 0.5, 6), goldMat);
hercBody.position.set(1.25, 7.5, 0.35);
pub.add(hercBody);
var hercHead = new THREE.Mesh(new THREE.SphereGeometry(0.09, 6, 6), goldMat);
hercHead.position.set(1.25, 7.85, 0.35);
pub.add(hercHead);
// Arms outstretched
var hercArm = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 0.05), goldMat);
hercArm.position.set(1.25, 7.6, 0.35);
pub.add(hercArm);

// ---- PLANTER BOX (overflowing greenery above fascia) ----
var planterBoxMat = new THREE.MeshStandardMaterial({ color: 0x2a2018, roughness: 0.8 });
var planterBox = new THREE.Mesh(new THREE.BoxGeometry(5.6, 0.35, 0.5), planterBoxMat);
planterBox.position.set(1.25, 4.0, 0.5);
pub.add(planterBox);

// Lush greenery — multiple spheres for bushy look
var leafMat = new THREE.MeshStandardMaterial({ color: 0x2a5a1a, roughness: 0.8 });
var leafMat2 = new THREE.MeshStandardMaterial({ color: 0x3a6a2a, roughness: 0.8 });
var leafMat3 = new THREE.MeshStandardMaterial({ color: 0x1a4a0a, roughness: 0.8 });
for (var li = -1.2; li <= 3.8; li += 0.4) {
  var bushMat = [leafMat, leafMat2, leafMat3][Math.floor(Math.random() * 3)];
  var bush = new THREE.Mesh(
    new THREE.SphereGeometry(0.2 + Math.random() * 0.15, 6, 6), bushMat
  );
  bush.position.set(li, 4.35 + Math.random() * 0.15, 0.6 + Math.random() * 0.2);
  bush.scale.y = 0.7 + Math.random() * 0.3;
  pub.add(bush);
}
// Trailing ivy below the planter
for (var iv = -0.8; iv <= 3.5; iv += 0.9) {
  var ivy = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.3 + Math.random() * 0.3, 0.05),
    new THREE.MeshStandardMaterial({ color: 0x1a4a0a, roughness: 0.9 }));
  ivy.position.set(iv, 3.65 - Math.random() * 0.1, 0.55);
  pub.add(ivy);
}

// ---- CREAM FASCIA "No7 PILLARS OF HERCULES No7" ----
var fasciaC = document.createElement('canvas');
fasciaC.width = 640; fasciaC.height = 64;
var fctx = fasciaC.getContext('2d');
// Cream background
fctx.fillStyle = '#e8dcc8';
fctx.fillRect(0, 0, 640, 64);
// Dark border top and bottom
fctx.fillStyle = '#3a1a10';
fctx.fillRect(0, 0, 640, 4);
fctx.fillRect(0, 60, 640, 4);
// Dark red/maroon text
fctx.fillStyle = '#6a1a10';
fctx.font = 'bold 30px Georgia, serif';
fctx.textAlign = 'center';
fctx.fillText('No7    PILLARS  OF  HERCULES    No7', 320, 42);
// Pointing hand decorations
fctx.font = '22px Georgia, serif';
fctx.fillText('\u261E', 120, 42);
fctx.fillText('\u261C', 520, 42);

var fasciaTex = new THREE.CanvasTexture(fasciaC);
var fascia = new THREE.Mesh(new THREE.BoxGeometry(5.4, 0.5, 0.18),
  new THREE.MeshBasicMaterial({ map: fasciaTex }));
fascia.position.set(1.25, 3.55, 0.5);
pub.add(fascia);

// ---- SMALL VICTORIAN LAMPS on fascia ----
var lampLightsOnPub = [];
for (var lx = -1.0; lx <= 3.5; lx += 4.5) {
  var lampBracket = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.3, 0.2),
    new THREE.MeshStandardMaterial({ color: 0x1a1a18, roughness: 0.8 }));
  lampBracket.position.set(lx, 3.75, 0.6);
  pub.add(lampBracket);
  var lampGlobe = new THREE.Mesh(new THREE.SphereGeometry(0.08, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0xffe8aa, transparent: true, opacity: 0.8 }));
  lampGlobe.position.set(lx, 3.95, 0.7);
  pub.add(lampGlobe);
  var lampL = new THREE.PointLight(0xffd080, 0.5, 5);
  lampL.position.set(lx, 3.95, 0.8);
  lampL.userData.baseIntensity = 0.5;
  pub.add(lampL);
  lampLightsOnPub.push(lampL);
}

// ---- DARK MAROON AWNING below fascia ----
var awning = new THREE.Mesh(new THREE.BoxGeometry(4.5, 0.25, 0.5),
  new THREE.MeshStandardMaterial({ color: 0x4a1015, roughness: 0.7 }));
awning.position.set(1.5, 3.15, 0.7);
pub.add(awning);

// ---- RICH MAHOGANY PUB ENTRANCE (right side of ground floor) ----
// The pub front extends from the alley right edge to the right of the building
var pubFront = new THREE.Mesh(new THREE.BoxGeometry(5.2, 3.2, 0.3), mahoganyDark);
pubFront.position.set(1.5, 1.6, 0.45);
pub.add(pubFront);

// Ornate mahogany frame around entrance
placeMesh(pub, new THREE.BoxGeometry(0.18, 3.2, 0.35), mahogany, -1.05, 1.6, 0.6);
placeMesh(pub, new THREE.BoxGeometry(0.18, 3.2, 0.35), mahogany, 4.0, 1.6, 0.6);
placeMesh(pub, new THREE.BoxGeometry(5.3, 0.18, 0.35), mahogany, 1.5, 3.15, 0.6);

// ---- Kickboard / plinth at very bottom of mahogany section ----
placeMesh(pub, new THREE.BoxGeometry(5.3, 0.3, 0.12), mahoganyDark, 1.5, 0.15, 0.65);

// Multiple ornate Victorian window panels — with richer detail
for (var px = 0.5; px <= 3.5; px += 0.7) {
  // Warm glass glow — lit pub interior visible
  var pGlass = new THREE.Mesh(new THREE.PlaneGeometry(0.48, 1.8),
    new THREE.MeshBasicMaterial({ color: 0xffd699, transparent: true, opacity: 0.7 }));
  pGlass.position.set(px, 1.6, 0.62);
  pub.add(pGlass);
  // Dark wood dividers between panels
  var pDiv = new THREE.Mesh(new THREE.BoxGeometry(0.06, 2.4, 0.1), mahogany);
  pDiv.position.set(px + 0.3, 1.5, 0.58);
  pub.add(pDiv);
  // Horizontal glazing bars (multiple for ornate pattern)
  placeMesh(pub, new THREE.BoxGeometry(0.48, 0.03, 0.04), mahogany, px, 1.0, 0.63);
  placeMesh(pub, new THREE.BoxGeometry(0.48, 0.03, 0.04), mahogany, px, 1.5, 0.63);
  placeMesh(pub, new THREE.BoxGeometry(0.48, 0.03, 0.04), mahogany, px, 2.0, 0.63);
  // Vertical glazing bar in each panel
  placeMesh(pub, new THREE.BoxGeometry(0.02, 1.8, 0.04), mahogany, px, 1.6, 0.63);
  // Small decorative panel below the glass (solid wood)
  placeMesh(pub, new THREE.BoxGeometry(0.48, 0.35, 0.06), mahoganyDark, px, 0.5, 0.6);
  // Moulding frame around each panel
  placeMesh(pub, new THREE.BoxGeometry(0.52, 0.04, 0.04), mahogany, px, 0.32, 0.62);
  placeMesh(pub, new THREE.BoxGeometry(0.52, 0.04, 0.04), mahogany, px, 0.7, 0.62);
}

// Pub door — richer with transom, mouldings, step
placeMesh(pub, new THREE.BoxGeometry(0.85, 2.3, 0.1), mahoganyDark, 0.8, 1.15, 0.62);
// Door panels (recessed detail)
placeMesh(pub, new THREE.BoxGeometry(0.32, 0.7, 0.04),
  new THREE.MeshStandardMaterial({ color: 0x301510, roughness: 0.8 }), 0.8, 0.7, 0.68);
// Glass panel in upper half of door — warm glow from inside
placeMesh(pub, new THREE.BoxGeometry(0.6, 1.0, 0.06),
  new THREE.MeshBasicMaterial({ color: 0xffd699, transparent: true, opacity: 0.65 }),
  0.8, 1.6, 0.65);
// Glazing bar on door glass
placeMesh(pub, new THREE.BoxGeometry(0.02, 1.0, 0.02), mahogany, 0.8, 1.6, 0.69);
placeMesh(pub, new THREE.BoxGeometry(0.6, 0.02, 0.02), mahogany, 0.8, 1.6, 0.69);
// Fanlight / transom above door — glowing
placeMesh(pub, new THREE.BoxGeometry(0.85, 0.3, 0.06),
  new THREE.MeshBasicMaterial({ color: 0xffd080, transparent: true, opacity: 0.5 }),
  0.8, 2.5, 0.65);
placeMesh(pub, new THREE.BoxGeometry(0.88, 0.04, 0.04), mahogany, 0.8, 2.35, 0.66);
// Door handle (brass)
placeMesh(pub, new THREE.BoxGeometry(0.04, 0.14, 0.06), goldMat, 1.08, 1.2, 0.7);
// Door step (stone)
placeMesh(pub, new THREE.BoxGeometry(1.0, 0.08, 0.25), sillMat, 0.8, 0.04, 0.8);

// Decorative brackets under awning
for (var bx = 0.8; bx <= 3.2; bx += 1.2) {
  placeMesh(pub, new THREE.BoxGeometry(0.06, 0.35, 0.06), mahogany, bx, 3.0, 0.7);
}

// Brick base/step running along the ground floor
var brickBase = new THREE.Mesh(new THREE.BoxGeometry(5.3, 0.12, 0.5),
  new THREE.MeshStandardMaterial({ color: 0x6a3028, roughness: 0.85 }));
brickBase.position.set(1.5, 0.06, 0.7);
pub.add(brickBase);

// ---- THE ALLEYWAY (left side — the distinctive passage) ----
// Dark archway cut into the building — narrow passage through to another street
var alleyWidth = 2.2;
var alleyX = -2.2; // centre of alley

// Alley void — built from individual planes so glow can show through
// Back wall (the far end of tunnel — receives the glow light)
var alleyDarkMat = new THREE.MeshStandardMaterial({ color: 0x14120e, roughness: 0.88 });
var alleyBackWall = new THREE.Mesh(new THREE.PlaneGeometry(alleyWidth, 3.5), alleyDarkMat);
alleyBackWall.position.set(alleyX, 1.75, -3.5);
pub.add(alleyBackWall);

var silhouettes = [];

function makeSilhouetteTex(seed) {
  return makeCanvasTexture(256, 256, function(cx, w, h) {
    // Warm amber interior glow background
    var bg = cx.createRadialGradient(w/2, h * 0.4, 10, w/2, h * 0.5, w);
    bg.addColorStop(0, 'rgba(200, 140, 50, 0.5)');
    bg.addColorStop(0.5, 'rgba(160, 100, 30, 0.3)');
    bg.addColorStop(1, 'rgba(80, 50, 15, 0.15)');
    cx.fillStyle = bg;
    cx.fillRect(0, 0, w, h);

    var figureCount = 1 + Math.floor(seed * 2.5);
    for (var f = 0; f < figureCount; f++) {
      var fx = (w / (figureCount + 1)) * (f + 1);
      var baseY = h * 0.98;
      var headR = 14 + seed * 6;
      var shoulderW = 35 + seed * 15;

      cx.fillStyle = 'rgba(10, 5, 0, 0.85)';

      // Body
      cx.beginPath();
      cx.moveTo(fx - shoulderW / 2, baseY - h * 0.35);
      cx.lineTo(fx + shoulderW / 2, baseY - h * 0.35);
      cx.lineTo(fx + shoulderW / 2 + 8, baseY);
      cx.lineTo(fx - shoulderW / 2 - 8, baseY);
      cx.closePath();
      cx.fill();

      // Shoulders
      cx.beginPath();
      cx.ellipse(fx, baseY - h * 0.38, shoulderW / 2 + 5, 14, 0, 0, Math.PI, true);
      cx.fill();

      // Neck
      cx.fillRect(fx - 6, baseY - h * 0.48, 12, h * 0.1);

      // Head
      cx.beginPath();
      cx.arc(fx + (f - 1) * 4, baseY - h * 0.52, headR, 0, Math.PI * 2);
      cx.fill();

      // Raised arm with pint
      if ((seed > 0.4 && f === 0) || (seed > 0.6 && f === 1)) {
        cx.fillStyle = 'rgba(10, 5, 0, 0.8)';
        cx.beginPath();
        cx.moveTo(fx + shoulderW / 2, baseY - h * 0.38);
        cx.lineTo(fx + shoulderW / 2 + 12, baseY - h * 0.6);
        cx.lineTo(fx + shoulderW / 2 + 22, baseY - h * 0.6);
        cx.lineTo(fx + shoulderW / 2 + 10, baseY - h * 0.35);
        cx.closePath();
        cx.fill();
        cx.fillRect(fx + shoulderW / 2 + 8, baseY - h * 0.7, 16, 22);
        cx.fillStyle = 'rgba(180, 130, 40, 0.4)';
        cx.fillRect(fx + shoulderW / 2 + 10, baseY - h * 0.68, 12, 14);
      }
    }
  });
}

// ============================================================
// ANIMATION LOOP
// ============================================================
var clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();

  // Fog drift
  for (var i = 0; i < fogSprites.length; i++) {
    var f = fogSprites[i];
    f.sway += f.swaySpeed;
    f.sprite.position.x = f.baseX + Math.sin(f.sway) * f.swayAmt;
    f.baseX += f.drift;
    // Wrap fog that drifts too far
    if (f.baseX > 25) f.baseX = -25;
  }

  // Flickering pub lights
  for (var i = 0; i < lampLightsOnPub.length; i++) {
    var ll = lampLightsOnPub[i];
    ll.intensity = ll.userData.baseIntensity + Math.sin(t * 3 + i) * 0.08 + Math.sin(t * 7.3 + i * 2) * 0.04;
  }

  // Street lamp flicker (dual-frequency for naturalistic gas flicker)
  for (var i = 0; i < streetLampLights.length; i++) {
    var base = streetLampLights[i].userData.baseIntensity || 3;
    streetLampLights[i].intensity = base + Math.sin(t * 2.5 + i * 1.5) * 0.15 + Math.sin(t * 5.7 + i * 3) * 0.08;
  }

  // Pub interior glow pulse
  pubGlow.intensity = 1.2 + Math.sin(t * 1.5) * 0.18;
  pubGlow2.intensity = 0.6 + Math.sin(t * 1.8 + 0.5) * 0.1;
  pubGlow3.intensity = 0.35 + Math.sin(t * 2.0 + 1.0) * 0.06;
  doorLight.intensity = 0.8 + Math.sin(t * 2.2) * 0.12;
  pavementSpill.intensity = 0.3 + Math.sin(t * 1.2) * 0.05;

  // Silhouette sway
  for (var i = 0; i < silhouettes.length; i++) {
    var s = silhouettes[i];
    s.mesh.position.x = s.baseX + Math.sin(t * s.swaySpeed + s.swayPhase) * s.swayAmt;
  }

  // Alley light flicker (subtle, eerie)
  alleyLight.intensity = 0.25 + Math.sin(t * 1.8) * 0.05 + Math.sin(t * 4.1) * 0.03;
  alleyLight2.intensity = 0.15 + Math.sin(t * 2.5 + 1) * 0.03;
  alleyEndGlow.intensity = 1.2 + Math.sin(t * 0.8) * 0.15;
  alleyEndGlow2.intensity = 0.6 + Math.sin(t * 1.1 + 0.5) * 0.08;

  renderer.render(scene, camera);
}
