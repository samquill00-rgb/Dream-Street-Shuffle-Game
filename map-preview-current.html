<!DOCTYPE html>
<html><head><style>
body { background: #1a1612; display: flex; justify-content: center; padding: 20px; }
.soho-map {
  background: rgba(20, 18, 15, 0.95);
  border: 1px solid #5a4a3a;
  padding: 8px;
  display: inline-block;
}
</style>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Crimson+Text:ital,wght@0,400;1,400&family=Courier+Prime&display=swap" rel="stylesheet">
</head><body>
<div class="soho-map">
<svg viewBox="0 0 480 580" width="440" height="530">
<defs>
<filter id="vg" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/><feBlend in="SourceGraphic" mode="multiply"/></filter>
<radialGradient id="lp"><stop offset="0%" stop-color="rgba(212,165,116,0.38)"/><stop offset="100%" stop-color="rgba(212,165,116,0)"/></radialGradient>
<linearGradient id="fg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(30,28,25,0.4)"/><stop offset="30%" stop-color="rgba(10,9,8,0)"/><stop offset="75%" stop-color="rgba(10,9,8,0)"/><stop offset="100%" stop-color="rgba(30,28,25,0.5)"/></linearGradient>
<linearGradient id="fg2" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="rgba(30,28,25,0.35)"/><stop offset="20%" stop-color="rgba(10,9,8,0)"/><stop offset="80%" stop-color="rgba(10,9,8,0)"/><stop offset="100%" stop-color="rgba(30,28,25,0.35)"/></linearGradient>
<pattern id="bw" width="6" height="6" patternUnits="userSpaceOnUse"><rect width="2" height="2" x="1" y="1" fill="rgba(180,155,110,0.06)"/><rect width="2" height="2" x="4" y="4" fill="rgba(180,155,110,0.04)"/></pattern>
</defs>

<!-- Background -->
<rect width="480" height="620" fill="#110e0a"/>
<rect width="480" height="620" fill="url(#bw)"/>

<!-- Title -->

<!-- Building blocks -->
<rect x="50" y="100" width="60" height="170" rx="1" fill="rgba(38,33,26,0.65)" stroke="rgba(90,75,55,0.35)" stroke-width="0.5"/>
<rect x="130" y="100" width="70" height="170" rx="1" fill="rgba(35,30,24,0.7)" stroke="rgba(90,75,55,0.40)" stroke-width="0.5"/>

<rect x="130" y="300" width="70" height="120" rx="1" fill="rgba(38,33,26,0.65)" stroke="rgba(90,75,55,0.40)" stroke-width="0.5"/>
<rect x="220" y="300" width="70" height="120" rx="1" fill="rgba(35,30,24,0.6)" stroke="rgba(90,75,55,0.40)" stroke-width="0.5"/>
<rect x="310" y="300" width="60" height="120" rx="1" fill="rgba(32,28,22,0.55)" stroke="rgba(90,75,55,0.35)" stroke-width="0.5"/>
<rect x="130" y="450" width="160" height="75" rx="1" fill="rgba(30,26,20,0.5)" stroke="rgba(90,75,55,0.25)" stroke-width="0.5"/>

<g opacity="0.10"><rect x="230" y="115" width="4" height="5" fill="#d4a574"/><rect x="245" y="115" width="4" height="5" fill="#d4a574"/><rect x="260" y="115" width="4" height="5" fill="#d4a574"/><rect x="275" y="115" width="4" height="5" fill="#d4a574"/><rect x="230" y="140" width="4" height="5" fill="#d4a574"/><rect x="245" y="140" width="4" height="5" fill="#d4a574"/><rect x="260" y="140" width="4" height="5" fill="#d4a574"/><rect x="275" y="140" width="4" height="5" fill="#d4a574"/></g>
<g opacity="0.08"><rect x="320" y="120" width="4" height="5" fill="#d4a574"/><rect x="335" y="120" width="4" height="5" fill="#d4a574"/><rect x="350" y="120" width="4" height="5" fill="#d4a574"/><rect x="320" y="145" width="4" height="5" fill="#d4a574"/><rect x="335" y="145" width="4" height="5" fill="#d4a574"/><rect x="350" y="145" width="4" height="5" fill="#d4a574"/></g>

<!-- Streets - vertical (glow + line) -->
<line x1="40" y1="75" x2="40" y2="570" stroke="rgba(212,165,116,0.15)" stroke-width="6"/>
<line x1="40" y1="75" x2="40" y2="570" stroke="rgba(212,165,116,0.35)" stroke-width="1.5"/>
<line x1="120" y1="70" x2="120" y2="575" stroke="rgba(212,165,116,0.20)" stroke-width="8"/>

<line x1="210" y1="65" x2="210" y2="580" stroke="rgba(212,165,116,0.55)" stroke-width="2"/>
<line x1="300" y1="70" x2="300" y2="575" stroke="rgba(212,165,116,0.20)" stroke-width="8"/>
<line x1="300" y1="70" x2="300" y2="575" stroke="rgba(212,165,116,0.50)" stroke-width="2"/>
<line x1="380" y1="75" x2="380" y2="570" stroke="rgba(212,165,116,0.15)" stroke-width="6"/>
<line x1="380" y1="75" x2="380" y2="570" stroke="rgba(212,165,116,0.35)" stroke-width="1.5"/>
<line x1="445" y1="90" x2="445" y2="550" stroke="rgba(212,165,116,0.10)" stroke-width="5"/>

<!-- Streets - horizontal -->
<line x1="25" y1="280" x2="460" y2="280" stroke="rgba(212,165,116,0.22)" stroke-width="8"/>

<line x1="120" y1="435" x2="380" y2="435" stroke="rgba(212,165,116,0.14)" stroke-width="6"/>

<!-- Street labels -->
<text x="40" y="42" text-anchor="middle" fill="rgba(212,165,116,0.50)" font-family="Playfair Display,Georgia,serif" font-size="9" letter-spacing="1">WARDOUR</text>
<text x="120" y="60" text-anchor="middle" fill="rgba(212,165,116,0.75)" font-family="Playfair Display,Georgia,serif" font-size="12" letter-spacing="3">FRITH ST</text>
<text x="210" y="55" text-anchor="middle" fill="rgba(212,165,116,0.90)" font-family="Playfair Display,Georgia,serif" font-size="13" letter-spacing="3">DEAN ST</text>
<text x="300" y="60" text-anchor="middle" fill="rgba(212,165,116,0.75)" font-family="Playfair Display,Georgia,serif" font-size="12" letter-spacing="3">GREEK ST</text>
<text x="400" y="42" text-anchor="middle" fill="rgba(212,165,116,0.50)" font-family="Playfair Display,Georgia,serif" font-size="9" letter-spacing="1">MANETTE</text>
<text x="240" y="275" text-anchor="middle" fill="rgba(212,165,116,0.65)" font-family="Playfair Display,Georgia,serif" font-size="11" letter-spacing="3">OLD COMPTON ST</text>

<text x="240" y="536" text-anchor="middle" fill="rgba(212,165,116,0.45)" font-family="Playfair Display,Georgia,serif" font-size="10" letter-spacing="2">SHAFTESBURY AVE</text>
<text x="210" y="42" text-anchor="middle" fill="rgba(212,165,116,0.40)" font-family="Playfair Display,Georgia,serif" font-size="8" letter-spacing="1">&#9650; CENTRE POINT</text>
<text x="240" y="605" text-anchor="middle" fill="rgba(212,165,116,0.40)" font-family="Playfair Display,Georgia,serif" font-size="8" letter-spacing="1">&#9660; LEICESTER SQ</text>

<!-- Venues - showing all three states for reference -->
<!-- Trisha's - unvisited -->
<g transform="translate(300,120)"><circle r="4" fill="rgba(110,95,72,0.40)"/><text x="16" y="5" fill="rgba(110,95,72,0.32)" font-family="Crimson Text,Georgia,serif" font-size="12">Trisha's</text></g>

<!-- Colony Room - HERE (pulsing) -->
<g transform="translate(210,200)"><circle r="22" fill="rgba(212,165,116,0.12)"/><circle r="12" fill="rgba(212,165,116,0.22)"/><circle r="10" fill="none" stroke="rgba(255,210,120,0.85)" stroke-width="1.5"><animate attributeName="r" values="10;28;10" dur="2.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.85;0;0.85" dur="2.5s" repeatCount="indefinite"/></circle><circle r="7" fill="#f5c858" stroke="rgba(255,240,160,0.6)" stroke-width="1.2"/><text x="16" y="-12" fill="rgba(255,230,100,0.9)" font-family="Courier Prime,Courier,monospace" font-size="7" letter-spacing="2" font-weight="700">YOU</text><text x="16" y="5" fill="#f5d070" font-family="Crimson Text,Georgia,serif" font-size="14" font-style="italic">Colony Room</text></g>

<!-- Ronnie's - unvisited -->
<g transform="translate(120,240)"><circle r="4" fill="rgba(110,95,72,0.40)"/><text x="-16" y="5" text-anchor="end" fill="rgba(110,95,72,0.32)" font-family="Crimson Text,Georgia,serif" font-size="12">Ronnie's</text></g>

<rect width="480" height="620" fill="none" stroke="rgba(10,9,8,0.85)" stroke-width="15" pointer-events="none"/>
</svg>
</div>
