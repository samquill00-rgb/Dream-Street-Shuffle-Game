<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maritime Interlude — Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(180deg, #0a0908 0%, #0d0f14 50%, #0a0908 100%);
    color: #d4c4b0;
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 1.25em;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3em 1em;
  }

  .passage {
    max-width: 560px;
    width: 100%;
  }

  p { margin: 0.7em 0; }

  a {
    color: #d4a574;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: all 0.4s ease;
    text-shadow: 0 0 8px rgba(212, 165, 116, 0.3);
    display: inline-block;
    margin: 0.3em 0;
  }
  a:hover {
    color: #ffd699;
    border-bottom: 1px solid #d4a574;
    text-shadow: 0 0 10px rgba(255, 214, 153, 0.6), 0 0 20px rgba(212, 165, 116, 0.4);
  }

  /* ===== MARITIME ===== */
  @keyframes waveSlide {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  @keyframes lampFadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes stormFlicker {
    0%, 100% { text-shadow: 0 0 18px rgba(100, 150, 210, 0.6), 0 0 40px rgba(60, 100, 180, 0.3); }
    30%       { text-shadow: 0 0 30px rgba(140, 190, 255, 0.9), 0 0 60px rgba(80, 130, 220, 0.5); }
    60%       { text-shadow: 0 0 12px rgba(80, 120, 190, 0.5), 0 0 25px rgba(50, 90, 160, 0.2); }
  }

  /* Lightning keyframes — clusters with long silences between */
  @keyframes lightningStrike {
    0%,    5.9%  { opacity: 0; }
    6%           { opacity: 0.75; }
    6.25%        { opacity: 0; }
    6.5%         { opacity: 0.5; }
    6.65%        { opacity: 0; }
    6.9%,  27.8% { opacity: 0; }
    27.9%        { opacity: 0.9; }
    28.05%       { opacity: 0; }
    28.2%,  51.4%{ opacity: 0; }
    51.5%        { opacity: 0.6; }
    51.65%       { opacity: 0; }
    51.8%        { opacity: 0.85; }
    51.95%       { opacity: 0; }
    52.1%,  73.7%{ opacity: 0; }
    73.8%        { opacity: 1; }
    73.95%       { opacity: 0; }
    74.1%        { opacity: 0.4; }
    74.2%,  91.4%{ opacity: 0; }
    91.5%        { opacity: 0.8; }
    91.65%       { opacity: 0; }
    91.8%        { opacity: 0.6; }
    91.9%, 100%  { opacity: 0; }
  }

  .maritime-scene {
    position: relative;
  }

  .maritime-lamp {
    position: absolute;
    top: 0; right: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: radial-gradient(ellipse 45% 30% at 100% 0%,
      rgba(255, 220, 140, 0.16) 0%,
      rgba(220, 180, 90, 0.07) 50%,
      transparent 100%);
    animation: lampFadeIn 3s ease-out forwards;
    opacity: 0;
  }

  .maritime-lightning {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(210, 230, 255, 0.45);
    opacity: 0;
    pointer-events: none;
    animation: lightningStrike 18s linear infinite;
  }

  .maritime-svg-wrap {
    display: block;
    width: 100%;
    overflow: hidden;
    margin: 0.8em 0;
    height: 18px;
  }

  .maritime-svg-wrap svg {
    display: block;
    width: 200%;
    height: 18px;
    animation: waveSlide 7s linear infinite;
  }

  .maritime-svg-wrap.slow svg {
    animation: waveSlide 11s linear infinite reverse;
    opacity: 0.6;
  }

  .ne-plus-ultra {
    display: block;
    text-align: center;
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.6em;
    font-weight: 700;
    letter-spacing: 0.35em;
    color: #c8ddf0;
    animation: stormFlicker 2.8s ease-in-out infinite;
    margin: 1em 0;
  }

  .links { margin-top: 1.4em; }
</style>
</head>
<body>
<div class="passage">
<div class="maritime-scene">
  <div class="maritime-lamp"></div>
  <div class="maritime-lightning"></div>

  <span class="maritime-svg-wrap">
    <svg viewBox="0 0 1200 18" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,9 C25,2 50,16 75,9 C100,2 125,16 150,9 C175,2 200,16 225,9 C250,2 275,16 300,9 C325,2 350,16 375,9 C400,2 425,16 450,9 C475,2 500,16 525,9 C550,2 575,16 600,9 C625,2 650,16 675,9 C700,2 725,16 750,9 C775,2 800,16 825,9 C850,2 875,16 900,9 C925,2 950,16 975,9 C1000,2 1025,16 1050,9 C1075,2 1100,16 1125,9 C1150,2 1175,16 1200,9"
            fill="none" stroke="#4a7090" stroke-width="1.5" opacity="0.8"/>
    </svg>
  </span>

  <p>Turning onto Greek Street, you find yourself at sea and in a storm.</p>

  <span class="maritime-svg-wrap slow">
    <svg viewBox="0 0 1200 18" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,12 C30,4 60,16 90,12 C120,4 150,16 180,12 C210,4 240,16 270,12 C300,4 330,16 360,12 C390,4 420,16 450,12 C480,4 510,16 540,12 C570,4 600,16 630,12 C660,4 690,16 720,12 C750,4 780,16 810,12 C840,4 870,16 900,12 C930,4 960,16 990,12 C1020,4 1050,16 1080,12 C1110,4 1140,16 1170,12 C1200,4 1200,16 1200,12"
            fill="none" stroke="#3a5a78" stroke-width="1.2" opacity="0.9"/>
    </svg>
  </span>

  <p>The broiling waters shred your ship till it's leaf-tobacco, toss it like a stub.</p>

  <span class="maritime-svg-wrap">
    <svg viewBox="0 0 1200 18" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,9 C25,2 50,16 75,9 C100,2 125,16 150,9 C175,2 200,16 225,9 C250,2 275,16 300,9 C325,2 350,16 375,9 C400,2 425,16 450,9 C475,2 500,16 525,9 C550,2 575,16 600,9 C625,2 650,16 675,9 C700,2 725,16 750,9 C775,2 800,16 825,9 C850,2 875,16 900,9 C925,2 950,16 975,9 C1000,2 1025,16 1050,9 C1075,2 1100,16 1125,9 C1150,2 1175,16 1200,9"
            fill="none" stroke="#4a7090" stroke-width="1.5" opacity="0.8"/>
    </svg>
  </span>

  <p>A big hand splits the sky and a big voice booms:</p>

  <span class="ne-plus-ultra">NE. PLUS. ULTRA.</span>

  <p>Do you keep going?</p>

  <div class="links">
    <a href="#">Yes</a><br>
    <a href="#">No</a>
  </div>
</div>
</div>
</body>
</html>
