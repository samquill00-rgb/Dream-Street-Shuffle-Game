<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #0a0a12; padding: 40px; font-family: Georgia, serif; color: #d4c8b0; max-width: 650px; margin: 0 auto; }
  .carthage-coast { margin-bottom: 1.2em; }
  .carthage-pyre { margin-bottom: 1.2em; }
  p { line-height: 1.7; }
</style>
</head>
<body>

<h3 style="color:#8ac8dc;">Coast of Carthage — shore + ruins:</h3>

<svg class="carthage-coast" viewBox="0 0 500 60" width="100%" height="60" preserveAspectRatio="none">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="ccSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1a1a3a" stop-opacity="0.6"/>
      <stop offset="60%"  stop-color="#c89050" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d4a060" stop-opacity="0.1"/>
    </linearGradient>
    <!-- Sea gradient -->
    <linearGradient id="ccSea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a5080" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1a3050" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Sand -->
    <linearGradient id="ccSand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c8a870" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a08050" stop-opacity="0.2"/>
    </linearGradient>
    <!-- Fade edges -->
    <linearGradient id="ccFade" x1="0" x2="1">
      <stop offset="0%"   stop-color="#0a0a12" stop-opacity="1"/>
      <stop offset="8%"   stop-color="#0a0a12" stop-opacity="0"/>
      <stop offset="92%"  stop-color="#0a0a12" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a12" stop-opacity="1"/>
    </linearGradient>
    <!-- Column stone -->
    <linearGradient id="ccStone" x1="0" x2="1">
      <stop offset="0%"   stop-color="#a09878" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#c8b898" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a09878" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect x="0" y="0" width="500" height="32" fill="url(#ccSky)"/>
  <!-- Horizon glow -->
  <ellipse cx="250" cy="32" rx="200" ry="8" fill="#d4a060" opacity="0.15"/>
  <!-- Sea -->
  <rect x="0" y="28" width="500" height="14" fill="url(#ccSea)"/>
  <!-- Gentle waves -->
  <path d="M0,32 Q30,30 60,33 T120,32 T180,33 T240,31 T300,33 T360,32 T420,33 T500,32" fill="none" stroke="#5a8ab8" stroke-width="0.6" opacity="0.45"/>
  <path d="M0,35 Q25,33 50,36 T100,34 T150,36 T200,34 T250,36 T300,34 T350,36 T400,34 T450,36 T500,35" fill="none" stroke="#4a7aa8" stroke-width="0.4" opacity="0.3"/>
  <!-- Sand/shore -->
  <rect x="0" y="40" width="500" height="20" fill="url(#ccSand)"/>
  <!-- Shore line -->
  <path d="M0,42 Q40,40 80,42 T160,41 T240,42 T320,40 T400,42 T500,41" fill="none" stroke="#c8a870" stroke-width="0.8" opacity="0.5"/>

  <!-- LEFT RUIN — broken column -->
  <rect x="62" y="10" width="5" height="32" fill="#a09878" opacity="0.5"/>
  <rect x="60" y="8" width="9" height="3" rx="0.5" fill="#b0a888" opacity="0.55"/>
  <!-- Fallen capital piece -->
  <rect x="52" y="38" width="8" height="4" rx="1" fill="#a09878" opacity="0.35" transform="rotate(-12,56,40)"/>
  <!-- Column fluting hint -->
  <line x1="63" y1="12" x2="63" y2="40" stroke="#8a8268" stroke-width="0.4" opacity="0.4"/>
  <line x1="66" y1="12" x2="66" y2="40" stroke="#8a8268" stroke-width="0.4" opacity="0.4"/>

  <!-- RIGHT RUIN — taller broken column -->
  <rect x="425" y="4" width="6" height="38" fill="#a09878" opacity="0.45"/>
  <rect x="422" y="2" width="12" height="3" rx="0.5" fill="#b0a888" opacity="0.5"/>
  <!-- Crack -->
  <path d="M427,15 L429,20 L427,25" fill="none" stroke="#706850" stroke-width="0.5" opacity="0.5"/>
  <!-- Fallen block nearby -->
  <rect x="436" y="36" width="10" height="5" rx="1" fill="#a09878" opacity="0.3" transform="rotate(8,441,38)"/>

  <!-- CENTRE — distant ruin silhouette -->
  <rect x="238" y="18" width="3" height="14" fill="#706880" opacity="0.25"/>
  <rect x="248" y="20" width="3" height="12" fill="#706880" opacity="0.2"/>
  <path d="M236,18 L254,18" fill="none" stroke="#706880" stroke-width="1" opacity="0.18"/>

  <!-- Stars -->
  <circle cx="80"  cy="6"  r="0.6" fill="#c8c8e0" opacity="0.4"/>
  <circle cx="180" cy="4"  r="0.5" fill="#c8c8e0" opacity="0.35"/>
  <circle cx="320" cy="7"  r="0.7" fill="#c8c8e0" opacity="0.4"/>
  <circle cx="410" cy="3"  r="0.5" fill="#c8c8e0" opacity="0.3"/>
  <circle cx="150" cy="10" r="0.4" fill="#c8c8e0" opacity="0.25"/>
  <circle cx="370" cy="9"  r="0.4" fill="#c8c8e0" opacity="0.25"/>

  <!-- Edge fade -->
  <rect x="0" y="0" width="500" height="60" fill="url(#ccFade)"/>
</svg>

<p>You bottled it but you've found safe harbour in Carthage, which is not like you remember it at all. These days it is swamped with Romans.</p>

<hr style="border-color:#333;margin:3em 0;">

<h3 style="color:#d4a060;">Dido / Pyre — fire + ruins:</h3>

<svg class="carthage-pyre" viewBox="0 0 500 95" width="100%" height="95" preserveAspectRatio="none">
  <defs>
    <!-- Fire glow — larger radial, centred on pyre -->
    <radialGradient id="cpGlow" cx="50%" cy="85%" r="70%">
      <stop offset="0%"   stop-color="#d4600a" stop-opacity="0.4"/>
      <stop offset="30%"  stop-color="#c84a08" stop-opacity="0.2"/>
      <stop offset="60%"  stop-color="#401808" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0a12" stop-opacity="0"/>
    </radialGradient>
    <!-- Top fade — flames dissolve into background -->
    <linearGradient id="cpTopFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a0a12" stop-opacity="1"/>
      <stop offset="35%"  stop-color="#0a0a12" stop-opacity="0.6"/>
      <stop offset="60%"  stop-color="#0a0a12" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a12" stop-opacity="0"/>
    </linearGradient>
    <!-- Fade edges (left/right) -->
    <linearGradient id="cpFade" x1="0" x2="1">
      <stop offset="0%"   stop-color="#0a0a12" stop-opacity="1"/>
      <stop offset="8%"   stop-color="#0a0a12" stop-opacity="0"/>
      <stop offset="92%"  stop-color="#0a0a12" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0a12" stop-opacity="1"/>
    </linearGradient>
    <!-- Ground char -->
    <linearGradient id="cpGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a2010" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a0a08" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Dark ground -->
  <rect x="0" y="77" width="500" height="18" fill="url(#cpGround)"/>

  <!-- Fire glow wash -->
  <rect x="0" y="0" width="500" height="95" fill="url(#cpGlow)"/>

  <!-- Pyre base — stacked logs -->
  <rect x="195" y="77" width="110" height="6" rx="1" fill="#3a2818" opacity="0.6"/>
  <rect x="205" y="72" width="90"  height="6" rx="1" fill="#4a3020" opacity="0.5"/>
  <rect x="215" y="67" width="70"  height="6" rx="1" fill="#5a3828" opacity="0.45"/>

  <!-- Flames — 6 layers, outer to inner, reaching high -->
  <!-- Layer 1: outermost wide glow -->
  <path d="M220,67 Q210,50 225,28 Q230,40 240,18 Q248,35 250,8 Q255,30 262,14 Q268,38 275,22 Q280,45 285,67Z"
        fill="#8a2800" opacity="0.35"/>
  <!-- Layer 2: main fire body -->
  <path d="M225,67 Q218,48 232,22 Q238,36 245,10 Q250,28 255,6 Q260,25 268,16 Q272,40 278,67Z"
        fill="#c04808" opacity="0.45"/>
  <!-- Layer 3: bright orange -->
  <path d="M230,67 Q224,45 237,18 Q242,32 248,8 Q253,28 258,12 Q264,35 270,67Z"
        fill="#d4600a" opacity="0.5"/>
  <!-- Layer 4: hot orange-yellow -->
  <path d="M235,67 Q230,42 242,20 Q246,34 250,12 Q254,30 258,18 Q262,40 265,67Z"
        fill="#e88020" opacity="0.5"/>
  <!-- Layer 5: bright yellow core -->
  <path d="M240,67 Q237,44 246,24 Q249,36 252,18 Q255,34 258,26 Q259,42 260,67Z"
        fill="#ffa040" opacity="0.45"/>
  <!-- Layer 6: white-hot inner core -->
  <path d="M245,67 Q243,48 249,30 Q251,42 253,34 Q254,48 255,67Z"
        fill="#ffc868" opacity="0.4"/>

  <!-- Secondary flicker — left tongue -->
  <path d="M222,67 Q216,52 224,35 Q228,45 230,38 Q229,50 232,67Z"
        fill="#c04808" opacity="0.3"/>
  <!-- Secondary flicker — right tongue -->
  <path d="M268,67 Q272,50 276,32 Q274,44 278,40 Q276,52 275,67Z"
        fill="#c04808" opacity="0.3"/>

  <!-- Dido — thin silhouette: clear head, slim body, feet -->
  <!-- Round head -->
  <circle cx="228" cy="61" r="4.5" fill="#1a0a06" opacity="0.55"/>
  <!-- Slim body — just a thin bar from neck to ankles -->
  <rect x="232" y="63" width="32" height="3" rx="1" fill="#1a0a06" opacity="0.5"/>
  <!-- Feet — two small angled shapes pointing up -->
  <path d="M264,63 L266,63 L266,58 L264,58 Z" fill="#1a0a06" opacity="0.5"/>
  <path d="M267,63 L269,63 L269,59 L267,59 Z" fill="#1a0a06" opacity="0.45"/>

  <!-- Sparks / embers rising — scattered high -->
  <circle cx="245" cy="4"  r="0.8" fill="#ffa030" opacity="0.4"/>
  <circle cx="260" cy="7"  r="0.6" fill="#ff8020" opacity="0.35"/>
  <circle cx="238" cy="10" r="0.7" fill="#ffc050" opacity="0.4"/>
  <circle cx="268" cy="3"  r="0.5" fill="#ff6010" opacity="0.3"/>
  <circle cx="252" cy="2"  r="0.6" fill="#ffc050" opacity="0.35"/>
  <circle cx="230" cy="6"  r="0.5" fill="#ff8020" opacity="0.3"/>
  <circle cx="272" cy="12" r="0.9" fill="#ffa030" opacity="0.35"/>
  <circle cx="242" cy="16" r="0.5" fill="#ffc050" opacity="0.3"/>
  <circle cx="256" cy="14" r="0.4" fill="#ff6010" opacity="0.25"/>

  <!-- LEFT RUIN — scorched broken column -->
  <rect x="80" y="30" width="5" height="47" fill="#705848" opacity="0.45"/>
  <rect x="78" y="28" width="9" height="3" rx="0.5" fill="#806858" opacity="0.5"/>
  <!-- Char marks -->
  <path d="M82,45 L84,55" stroke="#3a2010" stroke-width="0.8" opacity="0.4"/>
  <!-- Fallen piece -->
  <rect x="70" y="74" width="9" height="4" rx="1" fill="#705848" opacity="0.3" transform="rotate(-15,74,76)"/>

  <!-- RIGHT RUIN — taller scorched column -->
  <rect x="405" y="22" width="6" height="55" fill="#705848" opacity="0.4"/>
  <rect x="402" y="20" width="12" height="3" rx="0.5" fill="#806858" opacity="0.45"/>
  <!-- Heat shimmer lines -->
  <path d="M408,35 Q410,42 407,50 Q410,58 408,65" fill="none" stroke="#d4600a" stroke-width="0.4" opacity="0.2"/>
  <!-- Fallen arch fragment -->
  <path d="M415,72 Q420,65 430,72" fill="none" stroke="#705848" stroke-width="1.5" opacity="0.3"/>

  <!-- Distant ruin silhouettes -->
  <rect x="140" y="48" width="3" height="29" fill="#503828" opacity="0.25"/>
  <rect x="350" y="42" width="3" height="35" fill="#503828" opacity="0.2"/>
  <path d="M348,42 L356,42" stroke="#503828" stroke-width="0.8" opacity="0.15"/>

  <!-- Ground embers -->
  <circle cx="180" cy="82" r="0.8" fill="#d4600a" opacity="0.25"/>
  <circle cx="320" cy="80" r="0.6" fill="#c84a08" opacity="0.2"/>
  <circle cx="160" cy="84" r="0.5" fill="#ff8020" opacity="0.15"/>
  <circle cx="340" cy="83" r="0.7" fill="#d4600a" opacity="0.2"/>

  <!-- Top fade — flames dissolve into darkness -->
  <rect x="0" y="0" width="500" height="95" fill="url(#cpTopFade)"/>
  <!-- Edge fade (left/right) -->
  <rect x="0" y="0" width="500" height="95" fill="url(#cpFade)"/>
</svg>

<p>On the pyre, Dido is burning where she has burnt for 2,000 years.</p>

</body>
</html>
