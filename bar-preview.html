<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Memory Game - Ronnie Scott's</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0908;
            color: #d4a574;
            font-family: Georgia, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            color: #d4a574;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
            color: #8a7aaa;
            font-style: italic;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            background: rgba(44, 26, 18, 0.5);
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #3a2a22;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-size: 14px;
            color: #d4a574;
        }

        .control-group input[type="range"] {
            width: 150px;
            cursor: pointer;
        }

        .sobriety-value {
            font-weight: bold;
            color: #d4a574;
            min-width: 40px;
            text-align: right;
        }

        .control-group button {
            background: #2a1a12;
            color: #d4a574;
            border: 1px solid #8a7aaa;
            padding: 8px 16px;
            font-family: Georgia, serif;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s ease;
        }

        .control-group button:hover {
            background: #3a2a22;
            border-color: #d4a574;
            text-shadow: 0 0 8px rgba(212, 165, 116, 0.5);
        }

        /* PP Arena Styles */
        .pp-arena {
            position: relative;
            width: 560px;
            height: 400px;
            margin: 0 auto;
            background: #0c0814;
            border: 2px solid #3a2a22;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.9), inset 0 0 30px rgba(138, 122, 170, 0.1);
            overflow: hidden;
        }

        .pp-score {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            color: #d4a574;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }

        #bar-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #bar-narrative {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            font-size: 14px;
            color: #d4a574;
            max-height: 80px;
            overflow-y: auto;
            text-align: center;
            z-index: 20;
            pointer-events: none;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
            line-height: 1.4;
        }

        #bar-end {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 30;
            pointer-events: auto;
        }

        .bar-button {
            background: #2a1a12;
            color: #d4a574;
            border: 1px solid #8a7aaa;
            padding: 12px 28px;
            font-family: Georgia, serif;
            font-size: 14px;
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s ease;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
        }

        .bar-button:hover {
            background: #3a2a22;
            border-color: #d4a574;
            text-shadow: 0 0 8px rgba(212, 165, 116, 0.5);
        }

        .bar-button:active {
            transform: scale(0.98);
        }

        #pre-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 8, 20, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 20px;
        }

        #pre-bar.hidden {
            display: none;
        }

        .order-display {
            color: #d4a574;
            font-size: 15px;
            line-height: 1.8;
            margin: 20px 0;
            text-align: center;
            max-width: 400px;
        }

        .speaker {
            font-weight: bold;
            color: #8a7aaa;
            font-style: italic;
        }

        .go-button {
            margin-top: 30px;
        }

        #sob-data-bar {
            display: none;
        }

        /* Utility Classes */
        .success-flash {
            animation: successFlash 0.6s ease-out;
        }

        .error-flash {
            animation: errorFlash 0.6s ease-out;
        }

        @keyframes successFlash {
            0% {
                background: rgba(100, 200, 100, 0.4);
            }
            100% {
                background: rgba(12, 8, 20, 0);
            }
        }

        @keyframes errorFlash {
            0%, 100% {
                background: rgba(12, 8, 20, 0);
            }
            50% {
                background: rgba(200, 100, 100, 0.3);
            }
        }

        @keyframes wobble {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                transform: translate(2px, 1px) rotate(0.5deg);
            }
            50% {
                transform: translate(-2px, 0px) rotate(-0.5deg);
            }
            75% {
                transform: translate(1px, -1px) rotate(0.3deg);
            }
        }

        .wobble-effect {
            animation: wobble 0.4s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎺 THE BAR 🎺</h1>
        <p class="subtitle">Ronnie Scott's Jazz Club, 1973 — Remember the Orders</p>

        <div class="controls">
            <div class="control-group" style="font-size: 11px; color: #666; margin-right: 10px;">[TEST]</div>
            <div class="control-group">
                <label for="sobriety-slider">Sobriety:</label>
                <input type="range" id="sobriety-slider" min="0" max="100" value="55">
                <span class="sobriety-value" id="sobriety-display">55</span>
            </div>
            <div class="control-group">
                <button id="reset-button">Reset Game</button>
            </div>
        </div>

        <div class="pp-arena" id="bar-arena">
            <div class="pp-score" id="bar-round-display">🎸 THE BAR 🎸</div>
            <canvas id="bar-canvas" width="560" height="400"></canvas>
            <div id="pre-bar">
                <div style="text-align: center;">
                    <p style="font-size: 16px; margin-bottom: 20px;">Three musicians need drinks.</p>
                    <p style="font-size: 14px; margin-bottom: 5px;">Remember their orders:</p>
                </div>
                <div class="order-display" id="order-text"></div>
                <button class="bar-button go-button" id="go-button">Go to the bar</button>
            </div>
            <div id="bar-narrative"></div>
            <div id="bar-end"></div>
        </div>

        <div id="sob-data-bar">55</div>
    </div>

    <script>
        // ====== BAR GAME CLASS ======
        class BarGame {
            constructor(canvasId, sobriety) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.sobriety = sobriety;

                // Game state — starts in 'selecting' since the overlay handles 'order' phase
                this.phase = 'selecting';
                this.currentRound = 0;
                // 4 rounds: bourbon, glass, lime, scotch
                this.roundNames = ['bottle', 'glass', 'lime', 'scotch'];
                this.selections = [null, null, null, null];
                // Correct answers: Wild Turkey(0), Tulip(1), Fresh Lime(0), The Macallan(1)
                this.correct = [0, 1, 0, 1];
                this.isAnimating = false;

                // Canvas state
                this.mouseX = 0;
                this.mouseY = 0;
                this.hoveredItem = null;
                this.selectedItem = null;
                this.selectionTime = 0;

                // Round 0 — Bourbon bottles: { name, x, w, h, label, color }
                this.bottles = [
                    { name: 'Wild Turkey', x: 80, w: 50, h: 120, color: '#8b4513', label: 'bird' },
                    { name: 'Jack Daniel\'s', x: 220, w: 45, h: 130, color: '#1a1a1a', label: 'square' },
                    { name: 'Maker\'s Mark', x: 360, w: 48, h: 125, color: '#9d3d2a', label: 'wax' }
                ];

                // Round 1 — Glasses: { name, x, w, h, shape }
                this.glasses = [
                    { name: 'Tumbler', x: 80, w: 50, h: 80, shape: 'tumbler' },
                    { name: 'Tulip', x: 220, w: 35, h: 95, shape: 'tulip' },
                    { name: 'Highball', x: 360, w: 40, h: 110, shape: 'highball' }
                ];

                // Round 2 — Limes
                this.limes = [
                    { name: 'Fresh Lime', x: 140, w: 60, h: 60, type: 'fresh' },
                    { name: 'Bottled Lime Juice', x: 360, w: 50, h: 90, type: 'bottled' }
                ];

                // Round 3 — Scotch bottles for the pianist
                this.scotches = [
                    { name: 'Johnnie Walker', x: 60, w: 48, h: 130, color: '#1a1a1a', label: 'JW', accent: '#c9a961' },
                    { name: 'The Macallan', x: 190, w: 50, h: 120, color: '#5a2d0c', label: 'Mac', accent: '#d4a574' },
                    { name: 'Glenfiddich', x: 330, w: 46, h: 125, color: '#2d5a0c', label: 'Glen', accent: '#8bc34a' }
                ];

                // Event listeners
                this.canvas.addEventListener('mousemove', (e) => this.handleMouseMove(e));
                this.canvas.addEventListener('click', (e) => this.handleClick(e));

                // Update round display
                document.getElementById('bar-round-display').textContent = '🎸 Guitarist\u2019s bourbon? 🎸';

                // Clear any previous result
                document.getElementById('bar-narrative').innerHTML = '';
                document.getElementById('bar-end').innerHTML = '';

                // Start animation loop
                this.animate();
            }

            handleMouseMove(e) {
                const rect = this.canvas.getBoundingClientRect();
                // Scale mouse coords from CSS size to canvas internal size
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                this.mouseX = (e.clientX - rect.left) * scaleX;
                this.mouseY = (e.clientY - rect.top) * scaleY;
                this.updateHoveredItem();
            }

            handleClick(e) {
                if (this.phase !== 'selecting' || this.isAnimating) return;

                // Update mouse position from click too (in case mousemove didn't fire)
                const rect = this.canvas.getBoundingClientRect();
                const scaleX = this.canvas.width / rect.width;
                const scaleY = this.canvas.height / rect.height;
                this.mouseX = (e.clientX - rect.left) * scaleX;
                this.mouseY = (e.clientY - rect.top) * scaleY;

                const items = this.getCurrentRoundItems();
                items.forEach((item, idx) => {
                    const bounds = this.getItemBounds(item);
                    if (
                        this.mouseX >= bounds.x &&
                        this.mouseX <= bounds.x + bounds.w &&
                        this.mouseY >= bounds.y &&
                        this.mouseY <= bounds.y + bounds.h
                    ) {
                        this.selectItem(idx);
                    }
                });
            }

            updateHoveredItem() {
                if (this.phase !== 'selecting') {
                    this.hoveredItem = null;
                    return;
                }

                const items = this.getCurrentRoundItems();
                let hovered = null;
                items.forEach((item, idx) => {
                    const bounds = this.getItemBounds(item);
                    if (
                        this.mouseX >= bounds.x &&
                        this.mouseX <= bounds.x + bounds.w &&
                        this.mouseY >= bounds.y &&
                        this.mouseY <= bounds.y + bounds.h
                    ) {
                        hovered = idx;
                    }
                });
                this.hoveredItem = hovered;
            }

            getCurrentRoundItems() {
                if (this.currentRound === 0) return this.bottles;
                if (this.currentRound === 1) return this.glasses;
                if (this.currentRound === 2) return this.limes;
                return this.scotches;
            }

            getItemBounds(item) {
                return { x: item.x, y: 240, w: item.w, h: item.h };
            }

            selectItem(idx) {
                this.selections[this.currentRound] = idx;
                this.selectedItem = idx;
                this.selectionTime = Date.now();
                this.isAnimating = true;

                const isCorrect = idx === this.correct[this.currentRound];

                // Show brief right/wrong feedback on the round display
                const narrativeDiv = document.getElementById('bar-narrative');
                if (isCorrect) {
                    narrativeDiv.innerHTML = '<em style="color:#4CFF00;">Right.</em>';
                } else {
                    const wrongMsgs = [
                        '"The bird. I said the bird."',
                        '"The tulip. I said the tulip."',
                        '"Fresh lime. Not bottled."',
                        '"The Macallan. I said The Macallan."'
                    ];
                    narrativeDiv.innerHTML = '<em style="color:#FF6B6B;">' + wrongMsgs[this.currentRound] + '</em>';
                }

                // Always advance to the next round after a pause
                setTimeout(() => {
                    narrativeDiv.innerHTML = '';
                    this.currentRound++;
                    if (this.currentRound < 4) {
                        this.isAnimating = false;
                        this.selectedItem = null;
                        this.hoveredItem = null;
                        const hints = ['Guitarist\u2019s bourbon?', 'Guitarist\u2019s glass?', 'Moe\u2019s lime?', 'Pianist\u2019s scotch?'];
                        document.getElementById('bar-round-display').textContent = '🎸 ' + hints[this.currentRound] + ' 🎸';
                    } else {
                        this.phase = 'feedback';
                        this.showResult();
                    }
                }, 1000);
            }

            showResult() {
                // Count how many of the 4 selections were correct
                let score = 0;
                for (let i = 0; i < 4; i++) {
                    if (this.selections[i] === this.correct[i]) score++;
                }

                const narrativeDiv = document.getElementById('bar-narrative');
                const endDiv = document.getElementById('bar-end');
                const roundDisplay = document.getElementById('bar-round-display');

                if (score === 4) {
                    this.canvas.classList.add('success-flash');
                    roundDisplay.textContent = '★ PERFECT ★';
                    narrativeDiv.innerHTML = `<em>"Fresh lime," says Moe. "Tulip," nods the guitarist. The pianist raises his Macallan. "Wait for this," says Moe.</em>`;
                    narrativeDiv.style.color = '#4CFF00';
                } else if (score >= 3) {
                    this.canvas.classList.add('error-flash');
                    roundDisplay.textContent = '☆ CLOSE ☆';
                    narrativeDiv.innerHTML = `<em>${score} out of 4. Nearly had it.</em>`;
                    narrativeDiv.style.color = '#d4a574';
                } else {
                    this.canvas.classList.add('error-flash');
                    roundDisplay.textContent = '✗ WRONG ✗';
                    narrativeDiv.innerHTML = `<em>${score} out of 4. They look at you like you've never been in a bar.</em>`;
                    narrativeDiv.style.color = '#FF6B6B';
                }

                setTimeout(() => {
                    const continueBtn = document.createElement('button');
                    continueBtn.className = 'bar-button';
                    continueBtn.textContent = score === 4 ? 'Continue' : 'Try Again';
                    continueBtn.onclick = () => {
                        // Reset the overlay for a fresh round
                        document.getElementById('pre-bar').classList.remove('hidden');
                        document.getElementById('bar-narrative').innerHTML = '';
                        document.getElementById('bar-end').innerHTML = '';
                        document.getElementById('bar-round-display').textContent = '🎸 THE BAR 🎸';
                    };
                    endDiv.appendChild(continueBtn);
                }, 2000);

                this.phase = 'result';
            }

            stop() {
                this.stopped = true;
            }

            animate() {
                if (this.stopped) return;
                requestAnimationFrame(() => this.animate());
                this.draw();
            }

            draw() {
                // Clear canvas
                this.ctx.fillStyle = '#0c0814';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // Apply wobble effect if sobriety is low
                if (this.sobriety < 50 && this.phase === 'selecting') {
                    this.ctx.save();
                    const wobbleAmount = (this.sobriety < 30) ? 4 : 2;
                    const wobble = Math.sin(Date.now() / 200) * wobbleAmount;
                    this.ctx.translate(wobble, wobble * 0.5);
                }

                // Draw bar counter
                this.drawBar(this.ctx);

                // Draw current round items
                if (this.phase === 'selecting') {
                    if (this.currentRound === 0) {
                        this.drawBottles(this.ctx);
                    } else if (this.currentRound === 1) {
                        this.drawGlasses(this.ctx);
                    } else if (this.currentRound === 2) {
                        this.drawLimes(this.ctx);
                    } else {
                        this.drawScotches(this.ctx);
                    }

                    // Draw round progress dots
                    for (let i = 0; i < 4; i++) {
                        this.ctx.beginPath();
                        this.ctx.arc(245 + i * 25, 75, 4, 0, Math.PI * 2);
                        if (i < this.currentRound) {
                            this.ctx.fillStyle = '#4CFF00'; // completed
                        } else if (i === this.currentRound) {
                            this.ctx.fillStyle = '#d4a574'; // current
                        } else {
                            this.ctx.fillStyle = '#3a2a22'; // upcoming
                        }
                        this.ctx.fill();
                    }

                    // Draw hovered item name
                    if (this.hoveredItem !== null) {
                        const items = this.getCurrentRoundItems();
                        this.ctx.fillStyle = '#8a7aaa';
                        this.ctx.font = 'bold 14px Georgia';
                        this.ctx.textAlign = 'center';
                        this.ctx.fillText(items[this.hoveredItem].name, this.canvas.width / 2, 380);
                    }
                }

                if (this.sobriety < 50 && this.phase === 'selecting') {
                    this.ctx.restore();
                }
            }

            drawBar(ctx) {
                // Bar counter top
                ctx.fillStyle = '#2a1a12';
                ctx.fillRect(0, 180, this.canvas.width, 220);

                // Polished edge
                ctx.fillStyle = '#4a3a32';
                ctx.fillRect(0, 178, this.canvas.width, 4);

                // Background shelves (darker)
                ctx.fillStyle = '#1a1008';
                ctx.fillRect(0, 0, this.canvas.width, 180);

                // Subtle amber backlight
                const gradient = ctx.createLinearGradient(0, 0, 0, 180);
                gradient.addColorStop(0, 'rgba(212, 165, 116, 0.05)');
                gradient.addColorStop(1, 'rgba(138, 122, 170, 0.08)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, this.canvas.width, 180);
            }

            // Shared bottle drawing helper used by both bourbon and scotch rounds
            drawBottleShape(ctx, x, y, w, h, color) {
                ctx.fillStyle = color;
                const neckW = 10;
                const neckH = 25;
                const cx = x + w / 2;

                ctx.beginPath();
                ctx.moveTo(cx - neckW / 2, y);
                ctx.lineTo(cx - neckW / 2, y + neckH);
                ctx.quadraticCurveTo(x, y + neckH + 5, x + 3, y + neckH + 15);
                ctx.lineTo(x + 3, y + h - 5);
                ctx.quadraticCurveTo(x + 3, y + h, x + 8, y + h);
                ctx.lineTo(x + w - 8, y + h);
                ctx.quadraticCurveTo(x + w - 3, y + h, x + w - 3, y + h - 5);
                ctx.lineTo(x + w - 3, y + neckH + 15);
                ctx.quadraticCurveTo(x + w, y + neckH + 5, cx + neckW / 2, y + neckH);
                ctx.lineTo(cx + neckW / 2, y);
                ctx.closePath();
                ctx.fill();

                // Cap
                ctx.fillStyle = '#555';
                ctx.fillRect(cx - neckW / 2 - 1, y - 3, neckW + 2, 5);
            }

            drawBottles(ctx) {
                this.bottles.forEach((bottle, idx) => {
                    const isHovered = this.hoveredItem === idx;
                    const isSelected = this.selectedItem === idx;
                    const isCorrect = idx === this.correct[0];

                    ctx.save();

                    if (isHovered) {
                        ctx.shadowColor = 'rgba(212, 165, 116, 0.6)';
                        ctx.shadowBlur = 20;
                    }

                    if (this.selectedItem !== null && !isSelected) {
                        ctx.globalAlpha = 0.3;
                    }

                    const x = bottle.x;
                    const y = 240;

                    this.drawBottleShape(ctx, x, y, bottle.w, bottle.h, bottle.color);

                    // Label background
                    ctx.fillStyle = bottle.label === 'bird' ? '#c9a961' : bottle.label === 'square' ? '#2a2a2a' : '#8b0000';
                    const labelY = y + bottle.h / 3;
                    const labelH = bottle.h / 3;
                    ctx.fillRect(x + 5, labelY, bottle.w - 10, labelH);

                    // Label detail
                    ctx.fillStyle = '#d4a574';
                    ctx.font = 'bold 9px Georgia';
                    ctx.textAlign = 'center';

                    if (bottle.label === 'bird') {
                        this.drawBirdLabel(ctx, x + bottle.w / 2, labelY + labelH / 2);
                    } else if (bottle.label === 'square') {
                        ctx.fillText('JD', x + bottle.w / 2, labelY + labelH / 2 + 2);
                    } else if (bottle.label === 'wax') {
                        ctx.fillStyle = '#8b0000';
                        ctx.beginPath();
                        ctx.ellipse(x + bottle.w / 2, y - 8, 7, 5, 0, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#d4a574';
                        ctx.fillText('MM', x + bottle.w / 2, labelY + labelH / 2 + 2);
                    }

                    if (isSelected) {
                        ctx.strokeStyle = isCorrect ? '#4CFF00' : '#FF4444';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x - 5, y - 20, bottle.w + 10, bottle.h + 25);
                    }

                    ctx.restore();
                });
            }

            drawBirdLabel(ctx, x, y) {
                ctx.save();
                ctx.fillStyle = '#1a1a1a';

                // Fanned tail feathers (left side, radiating upward)
                const tailX = x - 6;
                const tailY = y + 2;
                for (let i = -2; i <= 2; i++) {
                    ctx.beginPath();
                    ctx.moveTo(tailX, tailY);
                    const angle = -Math.PI / 2 + i * 0.35;
                    ctx.lineTo(tailX + Math.cos(angle) * 10, tailY + Math.sin(angle) * 10);
                    ctx.lineTo(tailX + Math.cos(angle + 0.15) * 9, tailY + Math.sin(angle + 0.15) * 9);
                    ctx.closePath();
                    ctx.fill();
                }

                // Round body
                ctx.beginPath();
                ctx.ellipse(x + 1, y + 2, 5, 4, 0.2, 0, Math.PI * 2);
                ctx.fill();

                // Neck (curving up from body)
                ctx.beginPath();
                ctx.moveTo(x + 4, y);
                ctx.quadraticCurveTo(x + 7, y - 3, x + 6, y - 6);
                ctx.lineTo(x + 4.5, y - 5);
                ctx.quadraticCurveTo(x + 5.5, y - 2, x + 3, y + 1);
                ctx.closePath();
                ctx.fill();

                // Head
                ctx.beginPath();
                ctx.arc(x + 5.5, y - 7, 2, 0, Math.PI * 2);
                ctx.fill();

                // Beak (pointing right)
                ctx.beginPath();
                ctx.moveTo(x + 7.5, y - 7.5);
                ctx.lineTo(x + 10, y - 7);
                ctx.lineTo(x + 7.5, y - 6.5);
                ctx.closePath();
                ctx.fill();

                // Wattle (little red dangle under beak)
                ctx.fillStyle = '#8b0000';
                ctx.beginPath();
                ctx.ellipse(x + 6.5, y - 5.5, 0.8, 1.2, 0, 0, Math.PI * 2);
                ctx.fill();

                // Legs
                ctx.strokeStyle = '#1a1a1a';
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.moveTo(x, y + 5);
                ctx.lineTo(x - 1, y + 8);
                ctx.moveTo(x + 2, y + 5);
                ctx.lineTo(x + 3, y + 8);
                ctx.stroke();

                ctx.restore();
            }

            drawGlasses(ctx) {
                this.glasses.forEach((glass, idx) => {
                    const isHovered = this.hoveredItem === idx;
                    const isSelected = this.selectedItem === idx;
                    const isCorrect = idx === this.correct[1];

                    ctx.save();

                    if (isHovered) {
                        ctx.shadowColor = 'rgba(212, 165, 116, 0.6)';
                        ctx.shadowBlur = 20;
                    }

                    if (this.selectedItem !== null && !isSelected) {
                        ctx.globalAlpha = 0.3;
                    }

                    const x = glass.x;
                    const y = 240;

                    ctx.strokeStyle = '#d4a574';
                    ctx.lineWidth = 2;
                    ctx.fillStyle = 'rgba(212, 165, 116, 0.1)';

                    if (glass.shape === 'tumbler') {
                        ctx.beginPath();
                        ctx.moveTo(x + 8, y);
                        ctx.lineTo(x + 8, y + glass.h - 5);
                        ctx.quadraticCurveTo(x + glass.w / 2, y + glass.h, x + glass.w - 8, y + glass.h - 5);
                        ctx.lineTo(x + glass.w - 8, y);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    } else if (glass.shape === 'tulip') {
                        ctx.beginPath();
                        ctx.moveTo(x + 8, y + 15);
                        ctx.quadraticCurveTo(x + 5, y + 20, x + 10, y + glass.h - 5);
                        ctx.lineTo(x + glass.w - 10, y + glass.h - 5);
                        ctx.quadraticCurveTo(x + glass.w - 5, y + 20, x + glass.w - 8, y + 15);
                        ctx.quadraticCurveTo(x + glass.w / 2, y, x + glass.w / 2, y);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    } else if (glass.shape === 'highball') {
                        ctx.beginPath();
                        ctx.moveTo(x + 10, y);
                        ctx.lineTo(x + 10, y + glass.h - 5);
                        ctx.quadraticCurveTo(x + glass.w / 2, y + glass.h, x + glass.w - 10, y + glass.h - 5);
                        ctx.lineTo(x + glass.w - 10, y);
                        ctx.closePath();
                        ctx.fill();
                        ctx.stroke();
                    }

                    // Rim highlight
                    ctx.strokeStyle = 'rgba(212, 165, 116, 0.5)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.ellipse(x + glass.w / 2, y + 2, glass.w / 2 - 2, 2, 0, 0, Math.PI);
                    ctx.stroke();

                    if (isSelected) {
                        ctx.strokeStyle = isCorrect ? '#4CFF00' : '#FF4444';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x - 5, y - 10, glass.w + 10, glass.h + 20);
                    }

                    ctx.restore();
                });
            }

            drawLimes(ctx) {
                this.limes.forEach((lime, idx) => {
                    const isHovered = this.hoveredItem === idx;
                    const isSelected = this.selectedItem === idx;
                    const isCorrect = idx === this.correct[2];

                    ctx.save();

                    if (isHovered) {
                        ctx.shadowColor = 'rgba(212, 165, 116, 0.6)';
                        ctx.shadowBlur = 20;
                    }

                    if (this.selectedItem !== null && !isSelected) {
                        ctx.globalAlpha = 0.3;
                    }

                    const x = lime.x;
                    const y = 240;

                    if (lime.type === 'fresh') {
                        ctx.fillStyle = '#2d8659';
                        ctx.beginPath();
                        ctx.moveTo(x + lime.w / 2, y);
                        ctx.lineTo(x + lime.w, y + 20);
                        ctx.quadraticCurveTo(x + lime.w, y + lime.h, x + lime.w / 2, y + lime.h + 10);
                        ctx.quadraticCurveTo(x, y + lime.h, x, y + 20);
                        ctx.closePath();
                        ctx.fill();

                        ctx.fillStyle = '#4CAF50';
                        ctx.beginPath();
                        ctx.ellipse(x + lime.w / 3, y + lime.h / 3, 8, 5, 0.3, 0, Math.PI * 2);
                        ctx.fill();

                        ctx.strokeStyle = '#1a5a3a';
                        ctx.lineWidth = 1;
                        for (let i = 0; i < 5; i++) {
                            ctx.beginPath();
                            ctx.moveTo(x + lime.w / 2 - i * 5, y);
                            ctx.lineTo(x + i * 5, y + lime.h);
                            ctx.stroke();
                        }
                    } else {
                        ctx.fillStyle = '#2a2a2a';
                        ctx.beginPath();
                        ctx.moveTo(x + 5, y);
                        ctx.lineTo(x + lime.w - 5, y);
                        ctx.lineTo(x + lime.w - 5, y + lime.h - 8);
                        ctx.quadraticCurveTo(x + lime.w / 2, y + lime.h, x + 5, y + lime.h - 8);
                        ctx.closePath();
                        ctx.fill();

                        ctx.strokeStyle = 'rgba(212, 165, 116, 0.3)';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(x + 8, y + 5);
                        ctx.lineTo(x + 8, y + lime.h - 10);
                        ctx.stroke();

                        ctx.fillStyle = '#2d8659';
                        ctx.fillRect(x + 3, y + lime.h / 3, lime.w - 6, lime.h / 4);

                        ctx.fillStyle = '#d4a574';
                        ctx.font = 'bold 7px Georgia';
                        ctx.textAlign = 'center';
                        ctx.fillText('LIME', x + lime.w / 2, y + lime.h / 2 + 1);

                        ctx.fillStyle = '#c9a961';
                        ctx.beginPath();
                        ctx.ellipse(x + lime.w / 2, y - 3, lime.w / 2 - 2, 3, 0, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    if (isSelected) {
                        ctx.strokeStyle = isCorrect ? '#4CFF00' : '#FF4444';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x - 5, y - 10, lime.w + 10, lime.h + 20);
                    }

                    ctx.restore();
                });
            }

            drawScotches(ctx) {
                this.scotches.forEach((scotch, idx) => {
                    const isHovered = this.hoveredItem === idx;
                    const isSelected = this.selectedItem === idx;
                    const isCorrect = idx === this.correct[3];

                    ctx.save();

                    if (isHovered) {
                        ctx.shadowColor = 'rgba(212, 165, 116, 0.6)';
                        ctx.shadowBlur = 20;
                    }

                    if (this.selectedItem !== null && !isSelected) {
                        ctx.globalAlpha = 0.3;
                    }

                    const x = scotch.x;
                    const y = 240;

                    // Draw bottle using shared shape
                    this.drawBottleShape(ctx, x, y, scotch.w, scotch.h, scotch.color);

                    // Label
                    const labelY = y + scotch.h / 3;
                    const labelH = scotch.h / 3;
                    ctx.fillStyle = scotch.accent;
                    ctx.fillRect(x + 5, labelY, scotch.w - 10, labelH);

                    // Label text
                    ctx.fillStyle = scotch.color;
                    ctx.font = 'bold 9px Georgia';
                    ctx.textAlign = 'center';
                    ctx.fillText(scotch.label, x + scotch.w / 2, labelY + labelH / 2 + 3);

                    if (isSelected) {
                        ctx.strokeStyle = isCorrect ? '#4CFF00' : '#FF4444';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(x - 5, y - 20, scotch.w + 10, scotch.h + 25);
                    }

                    ctx.restore();
                });
            }
        }

        // ====== INITIALIZATION ======
        window.startBarGame = function() {
            // Stop previous game if one exists
            if (window.currentBarGame) {
                window.currentBarGame.stop();
            }
            // Hide the order overlay
            document.getElementById('pre-bar').classList.add('hidden');
            // Read sobriety from the slider (preview) or sob-data span (in-game)
            const sobriety = parseInt(document.getElementById('sobriety-display').textContent) || 55;
            document.getElementById('sob-data-bar').textContent = sobriety;
            // Remove any flash classes from previous games
            const canvas = document.getElementById('bar-canvas');
            canvas.classList.remove('success-flash', 'error-flash');
            // Create and store the game instance
            window.currentBarGame = new BarGame('bar-canvas', sobriety);
        };

        // ====== EVENT LISTENERS ======
        document.getElementById('sobriety-slider').addEventListener('input', (e) => {
            document.getElementById('sobriety-display').textContent = e.target.value;
            document.getElementById('sob-data-bar').textContent = e.target.value;
        });

        document.getElementById('reset-button').addEventListener('click', () => {
            location.reload();
        });

        document.getElementById('go-button').addEventListener('click', window.startBarGame);

        // ====== LOAD INITIAL STATE ======
        window.addEventListener('load', () => {
            const orderText = document.getElementById('order-text');
            orderText.innerHTML = `
                <span class="speaker">Guitarist:</span> Bourbon — the one with the bird on the label. Tulip glass.<br><br>
                <span class="speaker">Moe de Alcousin:</span> Moscow Mule — fresh lime, mind you.<br><br>
                <span class="speaker">Pianist:</span> Scotch. The Macallan. Neat.
            `;
            document.getElementById('bar-round-display').textContent = '🎸 THE BAR 🎸';
        });
    </script>
</body>
</html>
