<meta charset="utf-8">
<title>Pillars of Hercules — Atmosphere Preview</title>
<style>
body {
  background: #1a0a08;
  color: #c8a86a;
  font-family: 'EB Garamond', 'Garamond', Georgia, serif;
  font-size: 1.1em;
  line-height: 1.7;
  display: flex;
  justify-content: center;
  padding: 2em;
}
.container {
  max-width: 600px;
  width: 100%;
}
.verse {
  font-style: italic;
  margin: 1em 0;
  padding-left: 2em;
  opacity: 0.75;
}
tw-link, .link {
  color: #8ac8dc;
  cursor: pointer;
  text-decoration: none;
  border-bottom: 1px solid rgba(138,200,220,0.3);
}

/* ── PILLARS OF HERCULES (updated atmospheric CSS) ─────────────────── */
.pillars-scene { position: relative; padding: 0 2.4em; min-height: 280px; overflow: hidden; }
.pillar { position: absolute; bottom: 0; height: 280px; width: 34px; z-index: 1; }
.pillar.left  { left: 0;  clip-path: inset(30% 0 0 0); }
.pillar.right { right: 0; clip-path: inset(8% 0 0 0); transform: scaleX(-1); }
.pillars-lattice { display:block; width:100%; margin-bottom:0.8em;
  filter: drop-shadow(0 4px 12px rgba(200,160,80,0.18));
}

/* Gaslight ambient glow */
.pillars-light {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 55% 35% at 50% 0%,
      rgba(210,170,90,0.14) 0%,
      rgba(200,155,75,0.06) 45%,
      transparent 72%),
    radial-gradient(ellipse 25% 45% at 12% 50%,
      rgba(180,145,70,0.05) 0%,
      transparent 65%),
    radial-gradient(ellipse 25% 45% at 88% 50%,
      rgba(180,145,70,0.05) 0%,
      transparent 65%);
  animation: pillarsGaslight 4s ease-in-out infinite alternate;
}
@keyframes pillarsGaslight {
  0%   { opacity: 0.65; }
  25%  { opacity: 0.9; }
  50%  { opacity: 0.55; }
  75%  { opacity: 1; }
  100% { opacity: 0.7; }
}

/* Tobacco smoke haze */
.pillars-smoke {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0;
  background: linear-gradient(
    180deg,
    rgba(140,120,90,0.09) 0%,
    rgba(125,110,80,0.04) 25%,
    transparent 55%
  );
  animation: pillarsSmoke 9s ease-in-out infinite alternate;
}
@keyframes pillarsSmoke {
  0%   { opacity: 0.4; transform: translateY(0); }
  100% { opacity: 1; transform: translateY(-4px); }
}

/* Dust motes */
.pillars-dust {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 0; overflow: hidden;
}
.pillars-dust span {
  position: absolute;
  width: 2px; height: 2px;
  border-radius: 50%;
  background: rgba(215,195,145,0.55);
  box-shadow: 0 0 3px rgba(210,185,130,0.25);
  animation: dustFloat linear infinite;
}
@keyframes dustFloat {
  0%   { transform: translateY(0) translateX(0); opacity: 0; }
  8%   { opacity: 0.65; }
  50%  { transform: translateY(-55px) translateX(8px); opacity: 0.4; }
  85%  { opacity: 0.2; }
  100% { transform: translateY(-120px) translateX(-5px); opacity: 0; }
}

.lily-glimpse { color: #d4a574; font-style: italic; }
.lore-box { border: 1px solid rgba(200,168,106,0.3); padding: 1em; margin: 1em 0; }
</style>
