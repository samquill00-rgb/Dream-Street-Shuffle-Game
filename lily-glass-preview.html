<!DOCTYPE html>
<html>
<head>
<style>
body { background: #0a0908; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" width="130" height="380" viewBox="0 0 130 380" style="overflow:visible;">
<defs>
  <!-- Amber glass glow -->
  <radialGradient id="lgGlow" cx="50%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#d4a060" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#d4a060" stop-opacity="0"/>
  </radialGradient>
  <!-- Green glass fill for leaves -->
  <linearGradient id="lgLeaf" x1="0" y1="0" x2="0.3" y2="1">
    <stop offset="0%" stop-color="#4a6a3a" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#2a4a1a" stop-opacity="0.45"/>
  </linearGradient>
  <!-- White bell glass fill -->
  <radialGradient id="lgBell" cx="50%" cy="30%" r="60%">
    <stop offset="0%" stop-color="#f0ece0" stop-opacity="0.50"/>
    <stop offset="60%" stop-color="#d8d0c0" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#c0b8a0" stop-opacity="0.25"/>
  </radialGradient>
  <!-- Lead came colour -->
  <linearGradient id="lgLead" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#3a3832"/>
    <stop offset="100%" stop-color="#2a2826"/>
  </linearGradient>
</defs>

<!-- Faint amber glow behind the panel -->
<rect x="-20" y="-20" width="170" height="420" fill="url(#lgGlow)" opacity="0.6"/>

<!-- Panel border — art nouveau arch shape -->
<path d="M12,370 L12,40 Q12,8 40,8 L90,8 Q118,8 118,40 L118,370 Z"
      fill="rgba(15,12,8,0.75)" stroke="url(#lgLead)" stroke-width="2.5"/>

<!-- Interior glass — faint warm amber -->
<path d="M16,366 L16,42 Q16,14 42,14 L88,14 Q114,14 114,42 L114,366 Z"
      fill="rgba(180,140,80,0.06)"/>

<!-- === LEAD CAME DIVISIONS (Art Nouveau flowing lines) === -->
<g stroke="url(#lgLead)" stroke-width="1.8" fill="none" stroke-linecap="round">
  <!-- Horizontal divisions -->
  <path d="M16,70 Q45,64 65,70 Q90,76 114,70"/>
  <path d="M16,130 Q50,124 65,130 Q85,136 114,130"/>
  <path d="M16,200 Q40,194 65,200 Q95,206 114,200"/>
  <path d="M16,280 Q55,274 65,280 Q80,286 114,280"/>
  <path d="M16,330 Q45,326 65,330 Q90,334 114,330"/>
  <!-- Vertical flowing divider -->
  <path d="M65,14 Q62,50 65,70 Q68,100 63,130 Q58,160 65,200 Q72,240 65,280 Q58,310 65,330 Q68,350 65,366"/>
</g>

<!-- === LILY OF THE VALLEY — Main Stem === -->
<g>
  <!-- Arching stem -->
  <path d="M58,95 Q55,120 50,145 Q44,175 42,200 Q40,225 44,250 Q48,270 55,285"
        fill="none" stroke="#5a7a4a" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>

  <!-- Leaves — two long art nouveau curves -->
  <!-- Left leaf -->
  <path d="M60,90 Q30,130 28,170 Q26,195 35,210 Q42,200 48,170 Q54,135 60,100 Z"
        fill="url(#lgLeaf)" stroke="#3a5a2a" stroke-width="0.8" opacity="0.8"/>
  <!-- Leaf vein -->
  <path d="M58,95 Q38,145 33,190" fill="none" stroke="#3a5a2a" stroke-width="0.5" opacity="0.5"/>

  <!-- Right leaf -->
  <path d="M62,88 Q82,115 88,150 Q92,175 85,195 Q78,185 74,155 Q68,120 62,95 Z"
        fill="url(#lgLeaf)" stroke="#3a5a2a" stroke-width="0.8" opacity="0.8"/>
  <!-- Leaf vein -->
  <path d="M63,92 Q80,130 86,172" fill="none" stroke="#3a5a2a" stroke-width="0.5" opacity="0.5"/>

  <!-- === BELLS (lily of the valley flowers) === -->
  <!-- Bell 1 — top -->
  <path d="M50,148 Q46,142 42,148 Q38,155 42,160 Q46,164 50,160 Q54,155 50,148 Z"
        fill="url(#lgBell)" stroke="#8a8878" stroke-width="0.8" opacity="0.85"/>
  <path d="M43,160 L42,163 M46,161 L46,165 M49,160 L50,163"
        stroke="#c0b8a0" stroke-width="0.4" opacity="0.5"/>

  <!-- Bell 2 -->
  <path d="M46,170 Q42,164 38,170 Q34,177 38,182 Q42,186 46,182 Q50,177 46,170 Z"
        fill="url(#lgBell)" stroke="#8a8878" stroke-width="0.8" opacity="0.8"/>
  <path d="M39,182 L38,185 M42,183 L42,187 M45,182 L46,185"
        stroke="#c0b8a0" stroke-width="0.4" opacity="0.5"/>

  <!-- Bell 3 -->
  <path d="M43,192 Q39,186 35,192 Q31,199 35,204 Q39,208 43,204 Q47,199 43,192 Z"
        fill="url(#lgBell)" stroke="#8a8878" stroke-width="0.8" opacity="0.75"/>
  <path d="M36,204 L35,207 M39,205 L39,209 M42,204 L43,207"
        stroke="#c0b8a0" stroke-width="0.4" opacity="0.5"/>

  <!-- Bell 4 -->
  <path d="M42,215 Q38,209 34,215 Q30,222 34,227 Q38,231 42,227 Q46,222 42,215 Z"
        fill="url(#lgBell)" stroke="#8a8878" stroke-width="0.8" opacity="0.7"/>

  <!-- Bell 5 — lowest, slightly smaller -->
  <path d="M45,238 Q42,233 39,238 Q36,244 39,248 Q42,251 45,248 Q48,244 45,238 Z"
        fill="url(#lgBell)" stroke="#8a8878" stroke-width="0.8" opacity="0.6"/>

  <!-- Small connecting stems from main stem to each bell -->
  <path d="M50,145 Q48,146 47,148" fill="none" stroke="#5a7a4a" stroke-width="0.8" opacity="0.6"/>
  <path d="M48,167 Q46,168 44,170" fill="none" stroke="#5a7a4a" stroke-width="0.8" opacity="0.6"/>
  <path d="M46,189 Q44,190 41,192" fill="none" stroke="#5a7a4a" stroke-width="0.8" opacity="0.6"/>
  <path d="M44,212 Q42,213 40,215" fill="none" stroke="#5a7a4a" stroke-width="0.8" opacity="0.6"/>
  <path d="M46,235 Q44,236 43,238" fill="none" stroke="#5a7a4a" stroke-width="0.8" opacity="0.6"/>
</g>

<!-- === ADDITIONAL ART NOUVEAU DETAILS === -->
<g stroke="#3a3832" stroke-width="0.6" fill="none" opacity="0.35">
  <!-- Small decorative curves in upper panes -->
  <path d="M25,30 Q35,22 45,30"/>
  <path d="M78,30 Q88,22 98,30"/>
  <!-- Small whiplash curves in lower panes -->
  <path d="M25,305 Q35,295 50,305 Q60,312 75,305"/>
  <path d="M30,345 Q50,338 70,345 Q85,350 100,345"/>
  <!-- Corner rosettes (tiny) -->
  <circle cx="28" cy="50" r="4" opacity="0.25"/>
  <circle cx="100" cy="50" r="4" opacity="0.25"/>
  <circle cx="28" cy="350" r="3" opacity="0.2"/>
  <circle cx="100" cy="350" r="3" opacity="0.2"/>
</g>

<!-- Subtle light catch on the glass -->
<ellipse cx="45" cy="170" rx="25" ry="50" fill="rgba(255,240,200,0.04)"/>
</svg>
</body>
</html>
