ctx.strokeStyle=SKIN_SHADOW;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx-21,cy+11);ctx.lineTo(cx-26,cy+7);ctx.stroke();ctx.beginPath();ctx.moveTo(cx-21,cy+12);ctx.lineTo(cx-27,cy+11);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+21,cy+11);ctx.lineTo(cx+26,cy+7);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+21,cy+12);ctx.lineTo(cx+27,cy+11);ctx.stroke();

ctx.fillStyle='rgba(100,70,55,0.15)';

for(var i=0;i<p.length;i++){ctx.beginPath();ctx.arc(p[i][0],p[i][1],p[i][2],0,Math.PI*2);ctx.fill();}

ctx.strokeStyle=SKIN_OUTLINE;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx-1,cy+12);ctx.quadraticCurveTo(cx-5,cy+22,cx-7,cy+26);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+2,cy+12);ctx.quadraticCurveTo(cx+3,cy+22,cx+6,cy+26);ctx.stroke();ctx.beginPath();ctx.moveTo(cx-10,cy+28);ctx.quadraticCurveTo(cx,cy+31,cx+10,cy+28);ctx.stroke();

ctx.strokeStyle=SKIN_SHADOW;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(cx-10,cy+27);ctx.quadraticCurveTo(cx-14,cy+32,cx-15,cy+38);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+10,cy+27);ctx.quadraticCurveTo(cx+14,cy+32,cx+15,cy+38);ctx.stroke();

// Stubble
ctx.fillStyle='rgba(50,35,25,0.25)';
for(var i=0;i<200;i++){var sx=cx+(Math.random()-0.5)*62;var sy=cy+28+Math.random()*18;var dx=Math.abs(sx-cx);if(dx<34&&sy>cy+28){ctx.beginPath();ctx.arc(sx,sy,0.7+Math.random()*0.3,0,Math.PI*2);ctx.fill();}}

for(var j=0;j<60;j++){var sx2=cx+(Math.random()-0.5)*30;var sy2=cy+34+Math.random()*10;if(Math.abs(sy2-(cy+37))>1.5){ctx.beginPath();ctx.arc(sx2,sy2,0.5+Math.random()*0.3,0,Math.PI*2);ctx.fill();}}

// Fists
function drawFist(s){
  ctx.fillStyle=SKIN;ctx.beginPath();
  ctx.moveTo(cx+s*94,cy+124);ctx.lineTo(cx+s*64,cy+122);

  ctx.strokeStyle='rgba(42,30,20,0.35)';ctx.lineWidth=0.5;
  for(var h=0;h<6;h++){var hx=cx+s*(64+Math.random()*28);var hy=cy+120+Math.random()*4;ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(hx+Math.random(),hy-3-Math.random()*2);ctx.stroke();}
}
drawFist(-1);drawFist(1);
ctx.strokeStyle='#c48080';ctx.lineWidth=0.8;ctx.beginPath();ctx.moveTo(cx+80,cy+123);ctx.lineTo(cx+84,cy+126);ctx.stroke();
