<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Soho Map — Neon Noir Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');

  body {
    background: #0a0908;
    color: #d4c4b0;
    font-family: 'Crimson Text', Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2em;
  }
  h2 { color: #e8d5b7; font-family: 'Playfair Display', Georgia, serif; margin-bottom: 0.3em; }
  p.sub { opacity: 0.4; font-size: 0.8em; margin-bottom: 2em; }

  .map-container {
    background: rgba(10, 9, 8, 0.95);
    border: 1px solid rgba(90, 74, 58, 0.4);
    padding: 1.2em;
    max-width: 380px;
  }

  .map-svg {
    width: 100%;
    height: auto;
    display: block;
  }

  /* Toggles for the preview — click the buttons to light up venues */
  .controls {
    margin-top: 1.5em;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5em;
    justify-content: center;
  }
  .controls button {
    background: #1a1815;
    color: #8a7a68;
    border: 1px solid #3a3025;
    padding: 0.3em 0.8em;
    font-family: 'Crimson Text', Georgia, serif;
    font-size: 0.85em;
    cursor: pointer;
    transition: all 0.3s;
  }
  .controls button.lit {
    color: #ffd699;
    border-color: #d4a574;
    background: #2a2015;
    box-shadow: 0 0 8px rgba(212, 165, 116, 0.3);
  }
</style>
</head>
<body>

<h2>Soho — 23.11.73</h2>
<p class="sub">Click venue names below to toggle visited state</p>

<div class="map-container">
  <svg class="map-svg" viewBox="0 0 340 440" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Glow filter for lit venues -->
      <filter id="venue-glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <!-- Subtle glow for street names -->
      <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="1.5" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>

      <!-- Rain/fog texture overlay -->
      <pattern id="fog" patternUnits="userSpaceOnUse" width="340" height="440">
        <rect width="340" height="440" fill="url(#fog-grad)"/>
      </pattern>
      <linearGradient id="fog-grad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(30,28,25,0.3)"/>
        <stop offset="40%" stop-color="rgba(10,9,8,0)"/>
        <stop offset="70%" stop-color="rgba(10,9,8,0)"/>
        <stop offset="100%" stop-color="rgba(30,28,25,0.4)"/>
      </linearGradient>

      <!-- Radial glow for each lit venue -->
      <radialGradient id="light-pool">
        <stop offset="0%" stop-color="rgba(212, 165, 116, 0.15)"/>
        <stop offset="100%" stop-color="rgba(212, 165, 116, 0)"/>
      </radialGradient>
    </defs>

    <!-- Background -->
    <rect width="340" height="440" fill="#0a0908"/>

    <!-- Faint building blocks — irregular shapes suggesting the Soho grid -->
    <!-- Between Frith & Dean, north of Old Compton -->
    <rect x="90" y="55" width="50" height="135" rx="1" fill="rgba(25,22,18,0.8)" stroke="rgba(50,42,35,0.15)" stroke-width="0.5"/>
    <!-- Between Dean & Greek, north of Old Compton -->
    <rect x="160" y="55" width="50" height="135" rx="1" fill="rgba(22,20,16,0.8)" stroke="rgba(50,42,35,0.15)" stroke-width="0.5"/>
    <!-- Between Frith & Dean, south of Old Compton -->
    <rect x="90" y="215" width="50" height="100" rx="1" fill="rgba(25,22,18,0.7)" stroke="rgba(50,42,35,0.15)" stroke-width="0.5"/>
    <!-- Between Dean & Greek, south of Old Compton -->
    <rect x="160" y="215" width="50" height="100" rx="1" fill="rgba(22,20,16,0.7)" stroke="rgba(50,42,35,0.15)" stroke-width="0.5"/>
    <!-- Southern block -->
    <rect x="90" y="340" width="120" height="60" rx="1" fill="rgba(20,18,15,0.6)" stroke="rgba(50,42,35,0.1)" stroke-width="0.5"/>
    <!-- East of Greek, north -->
    <rect x="230" y="55" width="45" height="135" rx="1" fill="rgba(20,18,15,0.7)" stroke="rgba(50,42,35,0.12)" stroke-width="0.5"/>
    <!-- East of Greek, south -->
    <rect x="230" y="215" width="45" height="100" rx="1" fill="rgba(22,20,16,0.6)" stroke="rgba(50,42,35,0.12)" stroke-width="0.5"/>

    <!-- Streets — slightly irregular, like rain-wet tarmac -->
    <!-- Frith Street (vertical, left) -->
    <line x1="82" y1="40" x2="82" y2="410" stroke="rgba(212, 165, 116, 0.08)" stroke-width="8"/>
    <line x1="82" y1="40" x2="82" y2="410" stroke="rgba(212, 165, 116, 0.06)" stroke-width="2"/>

    <!-- Dean Street (vertical, centre) -->
    <line x1="152" y1="25" x2="152" y2="420" stroke="rgba(212, 165, 116, 0.1)" stroke-width="8"/>
    <line x1="152" y1="25" x2="152" y2="420" stroke="rgba(212, 165, 116, 0.07)" stroke-width="2"/>

    <!-- Greek Street (vertical, right) -->
    <line x1="222" y1="40" x2="222" y2="410" stroke="rgba(212, 165, 116, 0.08)" stroke-width="8"/>
    <line x1="222" y1="40" x2="222" y2="410" stroke="rgba(212, 165, 116, 0.06)" stroke-width="2"/>

    <!-- Old Compton Street (horizontal) -->
    <line x1="40" y1="200" x2="300" y2="200" stroke="rgba(212, 165, 116, 0.09)" stroke-width="8"/>
    <line x1="40" y1="200" x2="300" y2="200" stroke="rgba(212, 165, 116, 0.06)" stroke-width="2"/>

    <!-- Wardour Street hint (far left) -->
    <line x1="35" y1="60" x2="35" y2="400" stroke="rgba(212, 165, 116, 0.03)" stroke-width="5"/>

    <!-- Bateman Street hint (cross street, south) -->
    <line x1="82" y1="325" x2="222" y2="325" stroke="rgba(212, 165, 116, 0.04)" stroke-width="5"/>

    <!-- Street names -->
    <text x="82" y="35" text-anchor="middle" fill="rgba(212, 165, 116, 0.3)" font-family="'Playfair Display', Georgia, serif" font-size="9" letter-spacing="3" filter="url(#text-glow)">FRITH ST</text>
    <text x="152" y="20" text-anchor="middle" fill="rgba(212, 165, 116, 0.4)" font-family="'Playfair Display', Georgia, serif" font-size="9" letter-spacing="3" filter="url(#text-glow)">DEAN ST</text>
    <text x="222" y="35" text-anchor="middle" fill="rgba(212, 165, 116, 0.3)" font-family="'Playfair Display', Georgia, serif" font-size="9" letter-spacing="3" filter="url(#text-glow)">GREEK ST</text>
    <text x="170" y="195" text-anchor="middle" fill="rgba(212, 165, 116, 0.25)" font-family="'Playfair Display', Georgia, serif" font-size="8" letter-spacing="2">OLD COMPTON ST</text>

    <!-- Centre Point landmark (top) -->
    <text x="152" y="10" text-anchor="middle" fill="rgba(212, 165, 116, 0.15)" font-family="'Playfair Display', Georgia, serif" font-size="7" letter-spacing="2">▲ CENTRE POINT</text>

    <!-- ========== VENUE MARKERS ========== -->
    <!-- Positioned based on real 1973 Soho addresses -->
    <!-- North = top of map (low y), South = bottom (high y) -->
    <!-- Old Compton St runs horizontally at y=200 -->

    <!-- ===== NORTH OF OLD COMPTON STREET ===== -->

    <!-- Lackland's (fictional — Frith St, north end) -->
    <g id="venue-lackland" class="venue">
      <circle class="light-pool" cx="82" cy="100" r="25" fill="url(#light-pool)" opacity="0"/>
      <circle class="venue-dot" cx="82" cy="100" r="4" fill="#2a2520" stroke="#4a4035" stroke-width="1"/>
      <text class="venue-label" x="69" y="104" text-anchor="end" fill="#4a4035" font-family="'Crimson Text', Georgia, serif" font-size="10">Lackland's</text>
    </g>

    <!-- Pillars of Hercules (7 Greek St — north of Old Compton) -->
    <g id="venue-pillars" class="venue">
      <circle class="light-pool" cx="222" cy="110" r="25" fill="url(#light-pool)" opacity="0"/>
      <circle class="venue-dot" cx="222" cy="110" r="4" fill="#2a2520" stroke="#4a4035" stroke-width="1"/>
      <text class="venue-label" x="235" y="114" fill="#4a4035" font-family="'Crimson Text', Georgia, serif" font-size="10">Pillars</text>
    </g>

    <!-- Colony Room (41 Dean St — north of Old Compton) -->
    <g id="venue-colony" class="venue">
      <circle class="light-pool" cx="152" cy="130" r="25" fill="url(#light-pool)" opacity="0"/>
      <circle class="venue-dot" cx="152" cy="130" r="4" fill="#2a2520" stroke="#4a4035" stroke-width="1"/>
      <text class="venue-label" x="165" y="134" fill="#4a4035" font-family="'Crimson Text', Georgia, serif" font-size="10">Colony Room</text>
    </g>

    <!-- Coach and Horses (29 Greek St — right on the corner of Greek St & Old Compton) -->
    <g id="venue-coach" class="venue">
      <circle class="light-pool" cx="222" cy="200" r="25" fill="url(#light-pool)" opacity="0"/>
      <circle class="venue-dot" cx="222" cy="200" r="4" fill="#2a2520" stroke="#4a4035" stroke-width="1"/>
      <text class="venue-label" x="235" y="204" fill="#4a4035" font-family="'Crimson Text', Georgia, serif" font-size="10">Coach</text>
    </g>

    <!-- Ronnie Scott's (47 Frith St — near Old Compton) -->
    <g id="venue-ronnies" class="venue">
      <circle class="light-pool" cx="82" cy="165" r="25" fill="url(#light-pool)" opacity="0"/>
      <circle class="venue-dot" cx="82" cy="165" r="4" fill="#2a2520" stroke="#4a4035" stroke-width="1"/>
      <text class="venue-label" x="69" y="169" text-anchor="end" fill="#4a4035" font-family="'Crimson Text', Georgia, serif" font-size="10">Ronnie's</text>
    </g>

    <!-- ===== SOUTH OF OLD COMPTON STREET ===== -->

    <!-- The French (49 Dean St — south of Old Compton) -->
    <g id="venue-french" class="venue">
      <circle class="light-pool" cx="152" cy="255" r="25" fill="url(#light-pool)" opacity="0"/>
      <circle class="venue-dot" cx="152" cy="255" r="4" fill="#2a2520" stroke="#4a4035" stroke-width="1"/>
      <text class="venue-label" x="165" y="259" fill="#4a4035" font-family="'Crimson Text', Georgia, serif" font-size="10">The French</text>
    </g>

    <!-- Trisha's (57 Greek St — north of Old Compton, on Greek St, above Pillars) -->
    <g id="venue-trishas" class="venue">
      <circle class="light-pool" cx="222" cy="70" r="25" fill="url(#light-pool)" opacity="0"/>
      <circle class="venue-dot" cx="222" cy="70" r="4" fill="#2a2520" stroke="#4a4035" stroke-width="1"/>
      <text class="venue-label" x="235" y="74" fill="#4a4035" font-family="'Crimson Text', Georgia, serif" font-size="10">Trisha's</text>
    </g>

    <!-- ===== FAR SOUTH ===== -->

    <!-- Cecil Court (south, off the main Soho grid) -->
    <g id="venue-cecil" class="venue">
      <circle class="light-pool" cx="110" cy="400" r="25" fill="url(#light-pool)" opacity="0"/>
      <circle class="venue-dot" cx="110" cy="400" r="4" fill="#2a2520" stroke="#4a4035" stroke-width="1"/>
      <text class="venue-label" x="123" y="404" fill="#4a4035" font-family="'Crimson Text', Georgia, serif" font-size="10">Cecil Court</text>
    </g>

    <!-- Fog overlay -->
    <rect width="340" height="440" fill="url(#fog-grad)" pointer-events="none"/>

    <!-- Vignette edges -->
    <rect width="340" height="440" fill="none" stroke="rgba(10,9,8,0.8)" stroke-width="40" pointer-events="none"/>
  </svg>
</div>

<div class="controls">
  <button onclick="toggleVenue('venue-french', this)">The French</button>
  <button onclick="toggleVenue('venue-colony', this)">Colony Room</button>
  <button onclick="toggleVenue('venue-coach', this)">Coach & Horses</button>
  <button onclick="toggleVenue('venue-pillars', this)">Pillars</button>
  <button onclick="toggleVenue('venue-ronnies', this)">Ronnie's</button>
  <button onclick="toggleVenue('venue-trishas', this)">Trisha's</button>
  <button onclick="toggleVenue('venue-lackland', this)">Lackland's</button>
  <button onclick="toggleVenue('venue-cecil', this)">Cecil Court</button>
</div>

<script>
function toggleVenue(id, btn) {
  const g = document.getElementById(id);
  const pool = g.querySelector('.light-pool');
  const dot = g.querySelector('.venue-dot');
  const label = g.querySelector('.venue-label');
  const isLit = dot.getAttribute('fill') === '#d4a574';

  if (isLit) {
    // Turn off
    pool.setAttribute('opacity', '0');
    dot.setAttribute('fill', '#2a2520');
    dot.setAttribute('stroke', '#4a4035');
    dot.removeAttribute('filter');
    label.setAttribute('fill', '#4a4035');
    btn.classList.remove('lit');
  } else {
    // Light up
    pool.setAttribute('opacity', '1');
    dot.setAttribute('fill', '#d4a574');
    dot.setAttribute('stroke', '#ffd699');
    dot.setAttribute('filter', 'url(#venue-glow)');
    label.setAttribute('fill', '#d4a574');
    btn.classList.add('lit');
  }
}
</script>

</body>
</html>
